name: Update Myfxbook Sentiment — v1.3

# Runs every hour, 24/7, Mon–Sun.
#
# ⚠️  API LIMIT: Myfxbook free tier = 100 requests/24h.
#     Each run = 3 calls (login + outlook + logout).
#     Running every 60 min × 24h × 7d = 24 runs/day = 72 calls/day ✅ (within limit)
#     DO NOT use every 15 min: 96 runs/day × 3 = 288 calls → exceeds limit 2.8x.
#
# ✅ Lives in the PUBLIC repo (globalinvesting.github.io) — unlimited free minutes.
#    No PAT_TOKEN needed: GITHUB_TOKEN with contents: write is enough
#    because the workflow and output data live in the same repo.
#
# GRACEFUL DEGRADATION (v1.3):
#    If Myfxbook API returns 403 (GitHub Actions IPs may be blocked by the provider),
#    the script exits 0 (non-fatal). Existing myfxbook.json is preserved with
#    apiBlocked=true. The dashboard automatically falls back to COT / Dukascopy sources.
#    The workflow run will show as SUCCESS — no email notifications for API blocks.
#
# SECRETS REQUIRED (set in repo Settings → Secrets → Actions):
#   MYFXBOOK_EMAIL    — email address of your Myfxbook account
#   MYFXBOOK_PASSWORD — password of your Myfxbook account
#
# OUTPUT: sentiment-data/myfxbook.json (committed to repo, served via GitHub Pages)
#
# NOTE: Retail positioning changes very slowly (community-accumulated data).
#       Updating every hour is more than sufficient — no quality loss vs 15 min.

on:
  schedule:
    - cron: '0 * * * *'    # every hour on the hour, all days, all week
  workflow_dispatch:        # manual trigger from GitHub UI

# Opt into Node.js 24 now to avoid deprecation warnings from actions/* packages.
# actions/checkout@v4 and actions/setup-python@v5 currently run on Node.js 20,
# which will be removed from GitHub Actions runners on 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-myfxbook-sentiment
  cancel-in-progress: false   # never cancel an in-progress fetch — wait

permissions:
  contents: write             # required for git push to the same repo

jobs:
  fetch-myfxbook-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create output directory
        run: mkdir -p sentiment-data

      - name: Fetch Myfxbook community outlook
        env:
          MYFXBOOK_EMAIL:    ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
          SITE_PATH: .
        run: python3 scripts/fetch_myfxbook_sentiment.py

      - name: Commit and push sentiment data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment-data/myfxbook.json
          if git diff --staged --quiet; then
            echo "No changes to commit (data unchanged)"
            exit 0
          fi
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
          git commit -m "Sentiment update — ${TIMESTAMP}"
          for i in 1 2 3; do
            git push && echo "Push succeeded" && exit 0
            echo "Push rejected (attempt $i) — rebasing..."
            git fetch origin main
            git rebase origin/main
          done
          echo "All push attempts failed — data not published."
          exit 1
