name: Update Myfxbook Sentiment

on:
  schedule:
    - cron: '20 * * * *'   # hourly at :20
  workflow_dispatch:

concurrency:
  group: update-myfxbook-sentiment
  cancel-in-progress: false

jobs:
  fetch-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch sentiment data
        env:
          MYFXBOOK_EMAIL:    ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
          OUTPUT_PATH:       sentiment-data/myfxbook.json
        run: python3 scripts/fetch_myfxbook_sentiment.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment-data/myfxbook.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sentiment update — $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
