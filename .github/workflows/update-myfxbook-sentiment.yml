name: Update Myfxbook Sentiment — v1.4

# Runs every hour, 24/7, Mon–Sun.
#
# API LIMIT: Myfxbook free tier = 100 requests/24h.
#   Each run = 3 calls (login + outlook + logout).
#   Running every 60 min × 24h = 24 runs/day = 72 calls/day (within limit).
#   DO NOT use every 15 min: 96 runs/day × 3 = 288 calls — exceeds limit.
#
# Lives in the PUBLIC repo (globalinvesting.github.io) — unlimited free minutes.
#   No PAT_TOKEN needed: GITHUB_TOKEN with contents: write is sufficient
#   because the workflow and output data live in the same repo.
#
# CLOUDFLARE WORKER PROXY (v1.4):
#   Myfxbook blocks GitHub Actions IP ranges at the Cloudflare WAF level.
#   This workflow routes all Myfxbook API calls through a Cloudflare Worker
#   that acts as a proxy from CF's own edge IP range (not on the denylist).
#   Architecture: GHA → CF Worker → Myfxbook → Worker → GHA
#
# GRACEFUL DEGRADATION (v1.4):
#   If the Worker or Myfxbook returns an unrecoverable error, the script
#   exits 0 (non-fatal). Existing myfxbook.json is preserved with
#   apiBlocked=true. The dashboard automatically falls back to Dukascopy.
#   Workflow run shows as SUCCESS — no spurious failure notifications.
#
# SECRETS REQUIRED (set in repo Settings → Secrets → Actions):
#   MYFXBOOK_EMAIL    — email address of your Myfxbook account
#   MYFXBOOK_PASSWORD — password of your Myfxbook account
#   CF_WORKER_URL     — URL of deployed Cloudflare Worker
#                       e.g. https://myfxbook-proxy.YOUR_SUBDOMAIN.workers.dev
#   CF_WORKER_SECRET  — shared secret (must match WORKER_SECRET in CF Worker env vars)
#
# OUTPUT: sentiment-data/myfxbook.json (committed to repo, served via GitHub Pages)

on:
  schedule:
    - cron: '0 * * * *'    # every hour on the hour, all days, all week
  workflow_dispatch:        # manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-myfxbook-sentiment
  cancel-in-progress: false   # never cancel an in-progress fetch — wait

permissions:
  contents: write             # required for git push to the same repo

jobs:
  fetch-myfxbook-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create output directory
        run: mkdir -p sentiment-data

      - name: Fetch Myfxbook community outlook via CF Worker
        env:
          MYFXBOOK_EMAIL:    ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
          CF_WORKER_URL:     ${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET:  ${{ secrets.CF_WORKER_SECRET }}
          SITE_PATH: .
        run: python3 scripts/fetch_myfxbook_sentiment.py

      - name: Commit and push sentiment data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment-data/myfxbook.json
          if git diff --staged --quiet; then
            echo "No changes to commit (data unchanged)"
            exit 0
          fi
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
          git commit -m "Sentiment update — ${TIMESTAMP}"
          for i in 1 2 3; do
            git push && echo "Push succeeded" && exit 0
            echo "Push rejected (attempt $i) — rebasing..."
            git fetch origin main
            git rebase origin/main
          done
          echo "All push attempts failed — data not published."
          exit 1
