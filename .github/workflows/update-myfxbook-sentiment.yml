name: Update Myfxbook Sentiment — v1.6

# Runs every hour, 24/7, Mon–Sun.
#
# API LIMIT: Myfxbook free tier = 100 requests/24h.
#   Each run = 1 call (outlook only — no login/logout).
#   Running every 60 min × 24h = 24 runs/day = 24 calls/day (well within limit).
#
# Lives in the PUBLIC repo (globalinvesting.github.io) — unlimited free minutes.
#   No PAT_TOKEN needed: GITHUB_TOKEN with contents: write is sufficient
#   because the workflow and output data live in the same repo.
#
# CLOUDFLARE WORKER PROXY (v1.6 — pre-authenticated session token):
#   Myfxbook blocks login requests from Cloudflare Workers IP ranges.
#   Solution: the session token is obtained once per month by the user
#   opening the login URL in their browser, and stored as a GitHub secret.
#   The Worker only calls get-community-outlook (not blocked from CF IPs).
#   Architecture: GHA → CF Worker (session token) → Myfxbook outlook → GHA
#
# SESSION TOKEN RENEWAL (once per month):
#   Open in browser: https://www.myfxbook.com/api/login.json?email=E&password=P
#   Copy the "session" value → update GitHub secret MYFXBOOK_SESSION.
#
# GRACEFUL DEGRADATION:
#   If the token expires or the Worker errors, the script exits 0 (non-fatal).
#   Existing myfxbook.json is preserved with apiBlocked=true. The dashboard
#   automatically falls back to Dukascopy.
#
# SECRETS REQUIRED (set in repo Settings → Secrets → Actions):
#   MYFXBOOK_SESSION  — session token from manual browser login (renew monthly)
#   CF_WORKER_URL     — URL of deployed Cloudflare Worker
#                       e.g. https://myfxbook-proxy.YOUR_SUBDOMAIN.workers.dev
#   CF_WORKER_SECRET  — shared secret (must match WORKER_SECRET in CF Worker env vars)
#
# SECRETS TO DELETE (no longer needed):
#   MYFXBOOK_EMAIL, MYFXBOOK_PASSWORD
#
# OUTPUT: sentiment-data/myfxbook.json (committed to repo, served via GitHub Pages)

on:
  schedule:
    - cron: '0 * * * *'    # every hour on the hour, all days, all week
  workflow_dispatch:        # manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-myfxbook-sentiment
  cancel-in-progress: false   # never cancel an in-progress fetch — wait

permissions:
  contents: write             # required for git push to the same repo

jobs:
  fetch-myfxbook-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create output directory
        run: mkdir -p sentiment-data

      - name: Fetch Myfxbook community outlook via CF Worker
        env:
          MYFXBOOK_SESSION: ${{ secrets.MYFXBOOK_SESSION }}
          CF_WORKER_URL:    ${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
          SITE_PATH: .
        run: python3 scripts/fetch_myfxbook_sentiment.py

      - name: Detect apiBlocked and set output flag
        id: blocked_check
        run: |
          BLOCKED=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('sentiment-data/myfxbook.json'))
              print('true' if d.get('apiBlocked') else 'false')
          except Exception:
              print('false')
          ")
          echo "api_blocked=${BLOCKED}" >> $GITHUB_OUTPUT
          if [ "$BLOCKED" = "true" ]; then
            echo "::warning::Myfxbook API blocked — login manual requerido en myfxbook.com"
          fi

      - name: Check email secrets configured
        id: email_check
        if: steps.blocked_check.outputs.api_blocked == 'true'
        env:
          NOTIFY_TO:       ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_FROM:     ${{ secrets.NOTIFY_EMAIL_FROM }}
          NOTIFY_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
        run: |
          if [ -n "$NOTIFY_TO" ] && [ -n "$NOTIFY_FROM" ] && [ -n "$NOTIFY_PASSWORD" ]; then
            echo "email_configured=true" >> $GITHUB_OUTPUT
          else
            echo "email_configured=false" >> $GITHUB_OUTPUT
            echo "::notice::NOTIFY_EMAIL_* secrets not configured — skipping alert email."
          fi

      - name: Send immediate alert on Myfxbook API block
        if: |
          steps.blocked_check.outputs.api_blocked == 'true' &&
          steps.email_check.outputs.email_configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_FROM }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "FX Dashboard Monitor <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          subject: "FX Dashboard — Myfxbook bloqueado, accion requerida"
          body: |
            La API de Myfxbook rechazo el login automatico.

            Causa mas probable: Myfxbook detecto el patron automatizado y requiere
            verificacion manual antes de volver a permitir acceso via API.

            ACCION REQUERIDA:
            1. Entra a https://www.myfxbook.com desde tu navegador
            2. Hace login con las credenciales habituales
            3. Completa cualquier CAPTCHA o verificacion de seguridad que aparezca
            4. Una vez logueado correctamente, el proximo run del workflow (cada hora)
               reanudara automaticamente.

            El dashboard esta mostrando los ultimos datos cacheados con fallback a Dukascopy.

            Run que detecto el bloqueo:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Commit and push sentiment data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment-data/myfxbook.json
          if git diff --staged --quiet; then
            echo "No changes to commit (data unchanged)"
            exit 0
          fi
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
          git commit -m "Sentiment update — ${TIMESTAMP}"
          for i in 1 2 3; do
            git push && echo "Push succeeded" && exit 0
            echo "Push rejected (attempt $i) — rebasing..."
            git fetch origin main
            git rebase origin/main
          done
          echo "All push attempts failed — data not published."
          exit 1
