name: Update Intraday Quotes — v1.5 (Twelve Data + Alpha Vantage)

# ESTRATEGIA DE TRIGGER — v1.5
#
# El cron nativo de GitHub Actions (schedule) NO es confiable para intervalos cortos:
# en la práctica salta ejecuciones bajo carga del sistema de GitHub.
#
# Solución: cron-job.org (gratuito) actúa como reloj externo y dispara este workflow
# exactamente cada 5 minutos vía HTTP POST al endpoint de repository_dispatch.
#
# FLUJO:
#   cron-job.org (cada 5 min)
#     → POST https://api.github.com/repos/<owner>/<repo>/dispatches
#     → event_type: "trigger-intraday-quotes"
#     → Este workflow se ejecuta ✅
#
# El schedule de GitHub se mantiene como RED DE SEGURIDAD (fallback),
# pero corriendo solo cada 5 min — así si cron-job.org falla, el gap máximo es 5 min.
#
# ✅ Duración promedio del job: ~30 seg → sin riesgo de solapamiento a 5 min de intervalo.
#
# SETUP REQUERIDO (una sola vez):
#   1. Crear un Personal Access Token (PAT) en GitHub:
#      → GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
#      → Permissions: "Actions" = Read and Write  (o "workflows" + "contents")
#      → Guardar el token como secret CRONJOB_PAT en este repo
#
#   2. Crear un job en https://cron-job.org con:
#      → URL:    https://api.github.com/repos/<OWNER>/<REPO>/dispatches
#      → Method: POST
#      → Headers:
#            Authorization: Bearer <tu-PAT>
#            Accept: application/vnd.github+json
#            Content-Type: application/json
#            X-GitHub-Api-Version: 2022-11-28
#      → Body:   {"event_type":"trigger-intraday-quotes"}
#      → Schedule: cada 5 minutos
#
# ✅ cron-job.org free tier: hasta 60 jobs, ejecuciones cada 1 min mínimo — más que suficiente.
# ✅ yfinance sin límite formal. Twelve Data fallback: < 10 calls/día del free tier (800/día).
#
# API usage estimate (24/7 a 5 min):
#   288 runs/día × 1 batch yfinance call = 288 calls yfinance (sin límite formal) ✅
#   Twelve Data: solo fallback gold → estimado < 10 calls/día ✅

on:
  repository_dispatch:
    types: [trigger-intraday-quotes]   # ← disparado por cron-job.org cada 5 min exactos

  # schedule eliminado (v7.14.4): el cron de GitHub cada 15 min colisionaba con
  # cron-job.org cada 5 min → dos runs simultáneos intentaban push al mismo
  # quotes.json → git rebase fallaba las 4 veces → exit 1 → email de fallo repetido.
  # cron-job.org es suficiente como reloj primario. Si falla, el gap máximo es
  # el intervalo configurado en cron-job.org (5 min) — completamente aceptable.
  #
  # (v7.14.5): el exit 1 del paso de push fue reemplazado por exit 0.
  # Un fallo de push no es fatal: el siguiente run (5 min) trae datos frescos.
  # exit 1 → GitHub envía email de fallo; exit 0 → silencioso. Sin impacto en datos.

  workflow_dispatch:                   # trigger manual desde GitHub UI

concurrency:
  group: update-intraday-quotes
  cancel-in-progress: false            # no cancelar un fetch en curso — esperar

permissions:
  contents: write                      # necesario para hacer git push al mismo repo

jobs:
  fetch-intraday-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests --break-system-packages

      - name: Create output directory
        run: mkdir -p intraday-data

      - name: Fetch intraday quotes
        env:
          TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SITE_PATH: .
        run: python3 scripts/fetch_intraday_quotes.py

      - name: Commit and push quotes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the freshly-fetched file to a temp path so we can safely reset
          # the working tree without losing our new data in the retry loop.
          cp intraday-data/quotes.json /tmp/quotes_fresh.json

          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          # Push loop — up to 5 attempts to handle concurrent-run collisions.
          #
          # Per-attempt strategy (no rebase — avoids "unstaged changes" errors):
          #   1. Hard-reset to current remote HEAD so git history is clean.
          #   2. Re-apply the fresh file (our data always wins — it is the newest).
          #   3. Commit only if there is a real diff vs remote HEAD.
          #   4. Push.  If rejected, another run beat us in the window — loop.
          #
          # Exit 0 on all paths: a push collision is not a real failure.
          # The next cron-job.org dispatch (≤5 min) will carry fresh data.
          # Exiting with non-zero would trigger GitHub failure emails on every
          # concurrent-run collision, which is the problem this block fixes.

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"

            # Sync local HEAD to remote without rebasing
            git fetch origin main
            git reset --hard origin/main

            # Re-apply our freshly-fetched data
            cp /tmp/quotes_fresh.json intraday-data/quotes.json
            git add intraday-data/quotes.json

            if git diff --staged --quiet; then
              echo "No changes vs remote HEAD — data already current, skipping commit."
              exit 0
            fi

            git commit -m "📈 Intraday quotes — ${TIMESTAMP}"

            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi

            echo "Push rejected on attempt $i — another run committed first. Retrying in $((i * 2))s..."
            sleep $((i * 2))
          done

          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
