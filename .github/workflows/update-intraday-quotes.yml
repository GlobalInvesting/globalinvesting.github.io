name: Update Intraday Quotes — v1.6 (Twelve Data + Alpha Vantage)

# TRIGGER STRATEGY — v1.5
#
# GitHub Actions' native cron (schedule) is NOT reliable for short intervals:
# in practice it skips runs under GitHub system load.
#
# Solution: cron-job.org (free) acts as an external clock and dispatches this
# workflow exactly every 5 minutes via HTTP POST to the repository_dispatch endpoint.
#
# FLOW:
#   cron-job.org (every 5 min)
#     → POST https://api.github.com/repos/<owner>/<repo>/dispatches
#     → event_type: "trigger-intraday-quotes"
#     → This workflow runs ✅
#
# GitHub's schedule is kept as a SAFETY NET (fallback),
# but running only every 5 min — so if cron-job.org fails, the max gap is 5 min.
#
# ✅ Average job duration: ~30 sec → no overlap risk at a 5-min interval.
#
# ONE-TIME SETUP REQUIRED:
#   1. Create a Personal Access Token (PAT) on GitHub:
#      → GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
#      → Permissions: "Actions" = Read and Write  (or "workflows" + "contents")
#      → Save the token as secret CRONJOB_PAT in this repo
#
#   2. Create a job at https://cron-job.org with:
#      → URL:    https://api.github.com/repos/<OWNER>/<REPO>/dispatches
#      → Method: POST
#      → Headers:
#            Authorization: Bearer <your-PAT>
#            Accept: application/vnd.github+json
#            Content-Type: application/json
#            X-GitHub-Api-Version: 2022-11-28
#      → Body:   {"event_type":"trigger-intraday-quotes"}
#      → Schedule: every 5 minutes
#
# ✅ cron-job.org free tier: up to 60 jobs, runs every 1 min minimum — more than enough.
# ✅ yfinance has no formal rate limit. Twelve Data fallback: < 10 calls/day of the free tier (800/day).
#
# API usage estimate (24/7 at 5 min):
#   288 runs/day × 1 batch yfinance call = 288 yfinance calls (no formal limit) ✅
#   Twelve Data: gold fallback only → estimated < 10 calls/day ✅
#
# fetch_intraday_quotes.py lives in the private globalinvesting-scripts repo
# (explicit checkout via SCRIPTS_PAT) to protect the fetcher's proprietary logic
# and API keys (Twelve Data, Alpha Vantage). Actions minutes are consumed
# in this public repo → unlimited and at no cost.

on:
  repository_dispatch:
    types: [trigger-intraday-quotes]   # ← dispatched by cron-job.org every 5 min exactly

  # schedule: SAFETY NET (v7.58.6) — only kicks in when cron-job.org is down.
  #
  # History:
  #   v7.14.4: schedule removed because GitHub's cron collided with cron-job.org
  #            → two simultaneous runs → git rebase failed → repeated failure emails.
  #   v7.14.5: exit 1 on push replaced with exit 0. Simultaneous runs no longer cause failures.
  #   v7.58.6: schedule restored as fallback. The push-loop + concurrency:
  #            cancel-in-progress:false already serializes simultaneous runs without errors.
  #            If cron-job.org goes down (expired PAT, suspended account, etc.), quotes.json
  #            freezes indefinitely — the dashboard shows stale data forever.
  #            GitHub's schedule covers that gap: at most ~15 min of stale data
  #            instead of hours or days. Doesn't send failure emails (exit 0 in the push-loop).
  #
  # Frequency: */5 is the minimum GitHub allows. In practice it runs every 5–15 min
  # under load, which is acceptable as a fallback (not as the primary clock).
  # Outside FX trading hours (Saturday 21:00 UTC – Sunday 21:00 UTC) runs still fire,
  # but fetch_intraday_quotes.py writes weekend data with no real changes —
  # the push-loop detects "No changes vs remote HEAD" and exits 0 without a commit.
  schedule:
    - cron: '*/5 * * * *'             # fallback: runs every 5 min if cron-job.org goes down

  workflow_dispatch:                   # manual trigger from the GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 → 24 opt-in (mandatory before June 2 2026)

concurrency:
  group: update-intraday-quotes
  cancel-in-progress: false            # no cancelar un fetch en curso — esperar

permissions:
  contents: write                      # necesario para hacer git push al mismo repo

jobs:
  fetch-intraday-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private scripts
        uses: actions/checkout@v4
        with:
          repository: GlobalInvesting/globalinvesting-scripts
          token: ${{ secrets.SCRIPTS_PAT }}
          path: private-scripts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests --break-system-packages

      - name: Create output directory
        run: mkdir -p intraday-data

      - name: Fetch intraday quotes
        env:
          TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SITE_PATH: .
        run: python3 private-scripts/fetch_intraday_quotes.py

      - name: Commit and push quotes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the freshly-fetched file to a temp path so we can safely reset
          # the working tree without losing our new data in the retry loop.
          cp intraday-data/quotes.json /tmp/quotes_fresh.json

          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          # Push loop — up to 5 attempts to handle concurrent-run collisions.
          #
          # Per-attempt strategy (no rebase — avoids "unstaged changes" errors):
          #   1. Hard-reset to current remote HEAD so git history is clean.
          #   2. Re-apply the fresh file (our data always wins — it is the newest).
          #   3. Commit only if there is a real diff vs remote HEAD.
          #   4. Push.  If rejected, another run beat us in the window — loop.
          #
          # Exit 0 on all paths: a push collision is not a real failure.
          # The next cron-job.org dispatch (≤5 min) will carry fresh data.
          # Exiting with non-zero would trigger GitHub failure emails on every
          # concurrent-run collision, which is the problem this block fixes.

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"

            # Sync local HEAD to remote without rebasing
            git fetch origin main
            git reset --hard origin/main

            # Re-apply our freshly-fetched data
            cp /tmp/quotes_fresh.json intraday-data/quotes.json
            git add intraday-data/quotes.json

            if git diff --staged --quiet; then
              echo "No changes vs remote HEAD — data already current, skipping commit."
              exit 0
            fi

            git commit -m "📈 Intraday quotes — ${TIMESTAMP}"

            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi

            echo "Push rejected on attempt $i — another run committed first. Retrying in $((i * 2))s..."
            sleep $((i * 2))
          done

          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
