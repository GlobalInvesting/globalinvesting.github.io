name: Update Intraday Quotes — v1.2 (Twelve Data + Alpha Vantage)

# Runs every 15 minutes, 24/7, Mon–Sun.
#
# ✅ yfinance (fuente principal) no tiene límite de API duro — es scraping de Yahoo Finance.
#    Twelve Data (fallback gold) — free tier: 800 calls/día.
#      96 runs/día × 1 call/run (solo si yfinance falla en gold) = en la práctica < 10 calls/día ✅
#    Alpha Vantage (fallback secundario) — 25 calls/día free, casi nunca se activa ✅
#
# ✅ Lives in the PUBLIC repo (globalinvesting.github.io) — unlimited free minutes.
#    No PAT_TOKEN needed: GITHUB_TOKEN con permissions: contents: write alcanza
#    porque el workflow y el repo destino son el mismo.
#
# API usage estimate (24/7):
#   96 runs/día × 1 batch yfinance call = 96 calls yfinance (sin límite formal) ✅
#   Twelve Data: solo fallback para XAU/USD si yfinance falla → estimado < 5 calls/día ✅

on:
  schedule:
    - cron: '0,15,30,45 * * * *'   # cada 15 min, todas las horas, todos los días
  workflow_dispatch:                 # trigger manual desde GitHub UI

concurrency:
  group: update-intraday-quotes
  cancel-in-progress: false         # no cancelar un fetch en curso — esperar

permissions:
  contents: write                   # necesario para hacer git push al mismo repo

jobs:
  fetch-intraday-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests --break-system-packages

      - name: Create output directory
        run: mkdir -p intraday-data

      - name: Fetch intraday quotes
        env:
          TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SITE_PATH: .
        run: python3 scripts/fetch_intraday_quotes.py

      - name: Commit and push quotes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add intraday-data/quotes.json
          if git diff --staged --quiet; then
            echo "No changes to commit (data unchanged)\""
          else
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "📈 Intraday quotes — ${TIMESTAMP}"
            git pull --rebase origin main || true
            git push
          fi
