name: Backfill Economic Calendar (12 months)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-inject FRED/OECD events (overwrites corrupted backfill data)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run backfill
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FLAGS="--force"
            echo "Running with --force flag (will overwrite existing FRED/OECD events)"
          fi
          python scripts/backfill_economic_calendar.py $FLAGS

      - name: Print summary
        run: |
          echo ""
          echo "========================================="
          echo "    ECONOMIC CALENDAR BACKFILL SUMMARY"
          echo "========================================="
          python3 - << 'PYEOF'
          import json
          from datetime import datetime, timezone, timedelta

          with open("calendar-data/calendar.json") as f:
              cal = json.load(f)

          events = cal["events"]
          now = datetime.now(timezone.utc)
          d90 = (now - timedelta(days=90)).strftime("%Y-%m-%d")
          d365 = (now - timedelta(days=365)).strftime("%Y-%m-%d")

          with_actual = [e for e in events if e.get("actual") not in (None, "")]
          in_90d = [e for e in with_actual if e.get("dateISO", "") >= d90]
          in_365d = [e for e in with_actual if e.get("dateISO", "") >= d365]

          from collections import Counter
          by_ccy = Counter(e["currency"] for e in with_actual)

          print(f"  Total events:         {len(events)}")
          print(f"  With actuals:         {len(with_actual)}")
          print(f"  In 90d window:        {len(in_90d)}")
          print(f"  In 365d window:       {len(in_365d)}")
          print(f"  Date range:           {cal.get('rangeFrom')} → {cal.get('rangeTo')}")
          print()
          print("  Coverage by currency (events with actuals):")
          for ccy in sorted(by_ccy.keys()):
              ccy_events = [e for e in with_actual if e["currency"] == ccy]
              dates = sorted(e["dateISO"] for e in ccy_events)
              print(f"    {ccy}: {by_ccy[ccy]:3d} events  {dates[0] if dates else 'n/a'} → {dates[-1] if dates else 'n/a'}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "--- Push attempt $attempt ---"
            git fetch origin main
            git reset --hard origin/main
            # Re-run the script to regenerate against the fresh main
            FLAGS=""
            if [ "${{ inputs.force }}" = "true" ]; then
              FLAGS="--force"
            fi
            FRED_API_KEY="${{ secrets.FRED_API_KEY }}" FINNHUB_API_KEY="${{ secrets.FINNHUB_API_KEY }}" python scripts/backfill_economic_calendar.py $FLAGS || true

            git add calendar-data/calendar.json
            if git diff --cached --quiet; then
              echo "No changes vs remote HEAD — nothing to commit."
              break
            fi

            FORCE_STR=""
            if [ "${{ inputs.force }}" = "true" ]; then FORCE_STR=" (--force)"; fi
            git commit -m "Economic calendar backfill $(date -u '+%Y-%m-%d %H:%M') UTC${FORCE_STR}"

            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              break
            fi

            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "Push failed, retrying in 5s..."
              sleep 5
            else
              echo "All push attempts failed"
              exit 1
            fi
          done
