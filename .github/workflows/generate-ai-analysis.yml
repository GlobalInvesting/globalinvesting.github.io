name: Generate AI Analysis
on:
  workflow_run:
    # D-02/D-03 FIX: Disparado tras Update Economic Data (06:00 UTC).
    # El schedule se corre a las 08:00 UTC para garantizar que fx-performance
    # (07:00 UTC) ya haya completado antes de generar el análisis AI.
    workflows: ["Update Economic Data"]
    types: [completed]
  schedule:
    - cron: '0 8 * * 1-5'  # 08:00 UTC — después de fx-performance (07:00 UTC)
  workflow_dispatch:

# FIX R-01: Concurrency group para evitar ejecuciones simultáneas.
concurrency:
  group: generate-ai-analysis
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # D-02/D-03 FIX: Pull latest data para asegurarse de tener cot-data/ y
      # fx-performance/ actualizados antes de generar el análisis AI.
      - name: Pull latest data
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name || 'main' }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        # FIX B-02: Versiones fijadas via requirements.txt
        run: pip install -r scripts/requirements.txt
      - name: Generate AI analysis
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
        run: python scripts/generate_ai_analysis.py
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-analysis/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update AI analysis [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
