name: Fetch Forex News

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests python-dateutil

      - name: Create output directory
        run: mkdir -p news-data

      - name: Run fetch script
        run: python scripts/fetch_news.py

      - name: Commit news-data/news.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data/news.json
          git diff --cached --quiet && echo "Sin cambios, nada que commitear." && exit 0
          git commit -m "chore: update news.json [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          # Reintentar push hasta 3 veces con pull --rebase por si otro job commiteó antes
          for i in 1 2 3; do
            git push && break
            echo "Push rechazado (intento $i), haciendo pull --rebase..."
            git pull --rebase origin main
          done
