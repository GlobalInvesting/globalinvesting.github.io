name: Fetch Forex News
# PUBLIC STUB — schedules + mode determination only.
# All fetch logic lives in the private reusable workflow.
on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'   # every 10 min — NEWS_MODE=fast
    - cron: '5 * * * *'                   # hourly at :05 — NEWS_MODE=full
  workflow_dispatch:
    inputs:
      news_mode:
        description: 'NEWS_MODE override: fast or full'
        required: false
        default: 'full'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: forex-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  determine-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - name: Determine NEWS_MODE
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.news_mode }}"
            MODE="${MODE:-full}"
          else
            MINUTE=$(date -u +%M)
            [ "$MINUTE" = "05" ] && MODE="full" || MODE="fast"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "NEWS_MODE=$MODE"

  fetch-news:
    needs: determine-mode
    uses: GlobalInvesting/globalinvesting-scripts/.github/workflows/forex-news.yml@main
    with:
      news_mode: ${{ needs.determine-mode.outputs.mode }}
    secrets: inherit
