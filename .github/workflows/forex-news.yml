name: Fetch and Generate Forex Summaries
on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC → 03:00 MVD  | Pre-apertura europea
    - cron: '0 12 * * *'   # 12:00 UTC → 09:00 MVD  | Pre-apertura americana + overlap Europa/NY
    - cron: '0 21 * * *'   # 21:00 UTC → 18:00 MVD  | Cierre NY + pre-apertura asiática
    - cron: '30 22 * * 0'   # Domingos 22:30 UTC → antes de apertura semanal
  workflow_dispatch:

# FIX R-01: Concurrency group para evitar race conditions.
# Si dos ejecuciones solapan (ej: cron + workflow_dispatch), la segunda espera
# a que termine la primera antes de arrancar. cancel-in-progress: false asegura
# que la segunda no se cancele, sino que espere su turno.
concurrency:
  group: forex-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # FIX B-02: Versiones fijadas via requirements.txt para reproducibilidad.
        run: pip install -r scripts/requirements.txt

      - name: Create output directories
        run: mkdir -p news-data

      - name: Fetch news from RSS feeds
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Generate per-currency analysis summaries
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
        run: python scripts/generate_summaries.py

      - name: Commit updated news data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data/news.json news-data/summaries.json
          git diff --cached --quiet && echo "Sin cambios." && exit 0
          git commit -m "chore: fetch + summaries AI [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          for i in 1 2 3; do
            git push && break
            echo "Push rechazado (intento $i), haciendo pull --rebase..."
            git pull --rebase origin main
          done
