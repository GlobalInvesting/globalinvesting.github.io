name: Fetch Forex News
on:
  schedule:
    - cron: '5 * * * *'  # Every 1 hour at :05 UTC — staggered from update-fx-liquidity (:00)
                          # Both workflows previously ran at '0 * * * *', causing GitHub to
                          # queue them simultaneously. With cancel-in-progress: false, queued
                          # runs block the next scheduled trigger, producing 30–60 min delays
                          # and occasional skipped runs (observed: 10:00, 11:00, 13:00, 15:00
                          # missing on 2026-04-27). The 5-min offset eliminates the collision.
  workflow_dispatch:

# Runs in the PUBLIC repo → minutos ilimitados (sin consumo de cuota privada).
# Scripts movidos desde el engine privado en auditoría 2026-03-31.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 → 24 opt-in (mandatory before June 2 2026)

concurrency:
  group: forex-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser==6.0.11 requests==2.32.3 python-dateutil==2.9.0.post0 --break-system-packages

      - name: Create output directory
        run: mkdir -p news-data

      - name: Fetch news from RSS feeds
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit updated news data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp news-data/news.json /tmp/news_fresh.json
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/news_fresh.json news-data/news.json
            git add news-data/news.json
            if git diff --staged --quiet; then
              echo "Sin cambios vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "chore: fetch news [${TIMESTAMP}]"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rechazado (intento $i) — reintentando en $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
