name: Fetch Forex News
on:
  # ── PRIMARY TRIGGER: cron-job.org (reliable external clock) ─────────────────
  # cron-job.org fires a repository_dispatch every 10 minutes via HTTP POST.
  # This bypasses GitHub's scheduler entirely — no throttling, no skipped runs.
  #
  # SETUP (one-time, already done):
  #   URL:    https://api.github.com/repos/GlobalInvesting/globalinvesting.github.io/dispatches
  #   Method: POST
  #   Headers:
  #     Authorization: Bearer <CRONJOB_PAT>
  #     Accept: application/vnd.github+json
  #     Content-Type: application/json
  #     X-GitHub-Api-Version: 2022-11-28
  #   Body:   {"event_type":"trigger-forex-news"}
  #   Schedule: every 10 minutes
  #
  # NEWS_MODE logic (applied on both dispatch and schedule triggers):
  #   Minute :05 of any hour → MODE=full (RSS + Finnhub + NewsData)
  #   All other minutes      → MODE=fast (RSS + Finnhub only, no NewsData quota)
  repository_dispatch:
    types: [trigger-forex-news]   # ← fired by cron-job.org every 10 min

  # ── FALLBACK: GitHub native cron (unreliable at high frequency, kept as safety net) ──
  # GitHub may skip or delay these under load. cron-job.org above is the primary clock.
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'   # every 10 min fallback — NEWS_MODE=fast
    - cron: '5 * * * *'                   # hourly at :05 fallback — NEWS_MODE=full

  workflow_dispatch:
    inputs:
      news_mode:
        description: 'NEWS_MODE override: fast (RSS+Finnhub only) or full (all sources incl. NewsData)'
        required: false
        default: 'full'

# Runs in the PUBLIC repo → minutos ilimitados (sin consumo de cuota privada).
# Script fetch_news.py vive en el repo privado globalinvesting-scripts (checkout
# explícito vía SCRIPTS_PAT) para proteger la lógica propietaria del scraper.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 → 24 opt-in (mandatory before June 2 2026)

concurrency:
  group: forex-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private scripts
        uses: actions/checkout@v4
        with:
          repository: GlobalInvesting/globalinvesting-scripts
          token: ${{ secrets.SCRIPTS_PAT }}
          path: private-scripts


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser==6.0.11 requests==2.32.3 python-dateutil==2.9.0.post0 --break-system-packages

      - name: Create output directory
        run: mkdir -p news-data

      - name: Set NEWS_MODE
        id: news_mode
        run: |
          # Determine NEWS_MODE for this run.
          # workflow_dispatch: use the input value (default 'full').
          # repository_dispatch (cron-job.org) + schedule (fallback): use clock minute.
          #   :05 of any hour → full (RSS + Finnhub + NewsData, hourly quota run)
          #   all other minutes → fast (RSS + Finnhub only, no NewsData quota consumed)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.news_mode }}"
            MODE="${MODE:-full}"
          else
            MINUTE=$(date -u +%M)
            if [ "$MINUTE" = "05" ]; then
              MODE="full"
            else
              MODE="fast"
            fi
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "NEWS_MODE=$MODE"

      - name: Fetch news from RSS feeds
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWS_MODE: ${{ steps.news_mode.outputs.mode }}
        run: python3 private-scripts/fetch_news.py

      - name: Commit updated news data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp news-data/news.json /tmp/news_fresh.json
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/news_fresh.json news-data/news.json
            git add news-data/news.json
            if git diff --staged --quiet; then
              echo "Sin cambios vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "chore: fetch news [${TIMESTAMP}]"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rechazado (intento $i) — reintentando en $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
