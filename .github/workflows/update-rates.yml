name: Update Interest Rates (Scraping + Frankfurter validation)
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

# D-01 FIX: Concurrency group para evitar ejecuciones simultáneas.
concurrency:
  group: update-rates
  cancel-in-progress: false

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml --break-system-packages

      - name: Create rates directory
        run: mkdir -p rates

      - name: Fetch and validate rates
        # D-01 FIX: fetch_rates.py hace exit(1) si detecta:
        #   - Tasa fuera del rango plausible [-2%, 15%]
        #   - Cambio > 1pp vs la última observación guardada (inusual entre runs diarios)
        # Ambos casos hacen fallar el workflow → GitHub Actions notifica por email.
        # health.json se guarda siempre con el estado de cada divisa para que
        # el frontend pueda mostrar alertas cuando los datos no son fiables.
        run: python scripts/fetch_rates.py

      - name: Display summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "         INTEREST RATES SUMMARY"
          echo "========================================"
          echo ""
          for currency in USD EUR GBP JPY CAD AUD CHF NZD; do
            if [ -f "rates/$currency.json" ]; then
              echo "[$currency]"
              python3 -c "
          import json
          with open('rates/$currency.json') as f:
              data = json.load(f)
          obs = data['observations']
          print(f'  Rate:     {obs[0][\"value\"]}%')
          print(f'  Date:     {obs[0][\"date\"]}')
          print(f'  History:  {len(obs)} observations')
          "
              echo ""
            fi
          done
          echo "[Health Status]"
          if [ -f "rates/health.json" ]; then
            python3 -c "
          import json
          with open('rates/health.json') as f:
              h = json.load(f)
          print(f'  Overall: {h[\"overallStatus\"]}')
          print(f'  Run:     {h[\"runTimestamp\"]}')
          print(f'  Frankfurter validation: {\"OK\" if h[\"frankfurterOk\"] else \"UNAVAILABLE\"}')
          for ccy, info in h['currencies'].items():
              status = info['status']
              rate = info['rate']
              src = info['source'] or 'N/A'
              print(f'  {ccy}: {rate}%  [{status}]  source={src}')
          if h[\"issues\"]:
              print(f'  Issues:')
              for i in h[\"issues\"]:
                  print(f'    - {i}')
          "
          fi

      - name: Commit and push
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rates $(date +'%Y-%m-%d') — scraping + validation"
            git pull --rebase origin main || true
            git push
          fi
