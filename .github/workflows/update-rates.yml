name: Update Interest Rates (Scraping + Frankfurter validation)
# PUBLIC STUB — all schedules + repository_dispatch trigger.
# Fetch/commit logic lives in the private reusable workflow.
on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 4 * * 2'
    - cron: '0 4 * * 4'
    - cron: '0 4 * * 5'
    - cron: '30 5 * * 2'
    - cron: '30 3 * * 3'
    - cron: '30 3 * * 4'
    - cron: '0 10 * * 4'
    - cron: '0 14 * * 4'
    - cron: '0 14 * * 5'
    - cron: '0 21 * * 3'
    - cron: '0 21 * * 4'
  repository_dispatch:
    types: [cb-rate-decision]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-rates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  call:
    uses: GlobalInvesting/globalinvesting-scripts/.github/workflows/update-rates.yml@main
    secrets: inherit
