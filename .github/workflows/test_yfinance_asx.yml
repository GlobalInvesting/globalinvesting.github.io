name: test-yfinance-asx-ib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install yfinance
        run: pip install yfinance --break-system-packages

      - name: Test ASX IB futures
        run: |
          python3 << 'EOFPYTHON'
          import yfinance as yf

          # IBV6.AX confirmed visible on Yahoo Finance (user link)
          # Testing next RBA meetings: Jun, Aug, Sep, Oct 2026
          tickers = ['IBM6.AX', 'IBQ6.AX', 'IBU6.AX', 'IBV6.AX']

          for t in tickers:
              try:
                  hist = yf.Ticker(t).history(period='5d')
                  close = hist['Close'].dropna()
                  if not close.empty:
                      p = close.iloc[-1]
                      print(f"{t}: price={p:.3f}  implied={100-p:.4f}%  date={close.index[-1].date()}  OK")
                  else:
                      print(f"{t}: no price data")
              except Exception as e:
                  print(f"{t}: ERROR {e}")
          EOFPYTHON
