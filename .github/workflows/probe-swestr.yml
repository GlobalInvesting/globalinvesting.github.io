name: Probe Riksbank SWESTR endpoints v2 (diagnostic)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Run SWESTR series-ID + group sweep
        run: |
          python3 << 'EOFPYTHON'
          #!/usr/bin/env python3
          """
          fetch_bias_sek_test_v2.py — Riksbank SWESTR series-ID probe (round 2)

          CONTEXT FROM ROUND 1
          ---------------------
          Round 1 confirmed the working PATH pattern:
              https://api.riksbank.se/swea/v1/Observations/Latest/{{seriesId}}
          returns 200 + JSON for known series (e.g. seknokpmi), and crucially
          returned 204 (not 404) for "SWESTR" and "swestr" -- meaning the *path*
          is valid but "SWESTR" is not the right seriesId string. A 204 is very
          different from the 404s every other namespace guess produced.

          This round stays entirely within the confirmed-working swea/v1 path and
          only varies the seriesId, following the Riksbank's real naming
          convention observed in other series (e.g. SEDP2MSTIBOR, SEKEURPMI --
          prefix "SE" + category + tenor/detail, all uppercase, no underscores).

          Also tries the GroupId listing endpoint (which needs no seriesId guess
          at all) for groups likely to contain SWESTR, since ByGroup/130 (FX) was
          confirmed working and returned a clean list -- if we find the right
          GroupId for "Swedish market rates" / "Riksbank rates" we get the full
          series list back with one call, no guessing needed.
          """

          import json
          from datetime import date, timedelta

          import requests

          TIMEOUT = 15
          HEADERS = {{"User-Agent": "GlobalInvestingFXTerminal/diagnostic-v2 (riksbank-swestr-probe)"}}

          today = date.today()
          today_str = today.isoformat()

          # ── Round 2: seriesId guesses within the CONFIRMED-WORKING swea/v1 path ──
          SERIES_ID_CANDIDATES = [
              "SWESTR",
              "SESWESTR",
              "SESTR",
              "SEDPSWESTR",
              "SEDPTNSWESTR",
              "SEDPT/NSWESTR",
              "SESTIBORTN",
              "SWESTRAVG",
              "SWESTR1W",
              "SEDPSTIBORTN",
              "SETNSWESTR",
              "RBSWESTR",
          ]

          # ── GroupId sweep: find the group that holds SWESTR / Riksbank rates ─────
          # We know 5 = STIBOR, 130 = FX vs SEK. Sweep a wider range of small
          # integers since groups are a flat enumerated list and SWESTR/Riksbank
          # rates are core series likely living in a low group number too.
          GROUP_ID_CANDIDATES = list(range(1, 21))


          def get_json(url):
              try:
                  resp = requests.get(url, headers=HEADERS, timeout=TIMEOUT)
                  ct = resp.headers.get("content-type", "")
                  body_snippet = resp.text[:200]
                  parsed = None
                  if resp.status_code == 200:
                      try:
                          parsed = resp.json()
                      except (json.JSONDecodeError, ValueError):
                          pass
                  return {{
                      "url": url,
                      "status": resp.status_code,
                      "content_type": ct,
                      "body_snippet": body_snippet,
                      "parsed": parsed,
                  }}
              except requests.exceptions.RequestException as exc:
                  return {{"url": url, "status": None, "error": f"{{type(exc).__name__}}: {{exc}}"}}


          def main():
              print("=" * 78)
              print("RIKSBANK SWESTR SERIES-ID PROBE — round 2 (diagnostic)")
              print(f"Run date: {{today_str}}")
              print("=" * 78)

              all_results = {{"series_id_sweep": [], "group_id_sweep": []}}

              print("\n--- PART 1: seriesId guesses on confirmed-working path ---")
              print("    GET https://api.riksbank.se/swea/v1/Observations/Latest/{{seriesId}}\n")

              found_series = []
              for sid in SERIES_ID_CANDIDATES:
                  url = f"https://api.riksbank.se/swea/v1/Observations/Latest/{{sid}}"
                  r = get_json(url)
                  all_results["series_id_sweep"].append({{"seriesId": sid, **r}})
                  status = r.get("status")
                  if status == 200 and r.get("parsed"):
                      marker = "✅ FOUND"
                      found_series.append(sid)
                  elif status == 204:
                      marker = "➖ valid path, no data (wrong id)"
                  elif status == 404:
                      marker = "❌ 404"
                  else:
                      marker = f"⚠️  {{status}}"
                  print(f"  [{{sid:20s}}] {{marker:35s}} -> {{r.get('body_snippet', r.get('error',''))[:80]}}")

              print("\n--- PART 2: GroupId sweep (1-20) via ByGroup listing ---")
              print("    GET https://api.riksbank.se/swea/v1/Observations/Latest/ByGroup/{{groupId}}\n")

              group_hits = []
              for gid in GROUP_ID_CANDIDATES:
                  url = f"https://api.riksbank.se/swea/v1/Observations/Latest/ByGroup/{{gid}}"
                  r = get_json(url)
                  status = r.get("status")
                  parsed = r.get("parsed")
                  series_ids_in_group = []
                  if status == 200 and isinstance(parsed, list):
                      series_ids_in_group = [item.get("seriesId") for item in parsed if isinstance(item, dict)]
                  all_results["group_id_sweep"].append({{
                      "groupId": gid,
                      "status": status,
                      "count": len(series_ids_in_group),
                      "seriesIds": series_ids_in_group,
                  }})
                  has_swestr_like = [s for s in series_ids_in_group if s and "SWESTR" in s.upper()]
                  if has_swestr_like:
                      group_hits.append((gid, has_swestr_like))
                      marker = f"🎯 SWESTR-LIKE SERIES FOUND: {{has_swestr_like}}"
                  elif status == 200:
                      marker = f"{{len(series_ids_in_group)}} series (sample: {{series_ids_in_group[:4]}})"
                  elif status == 204:
                      marker = "valid groupId, empty"
                  elif status == 404:
                      marker = "no such group"
                  else:
                      marker = f"status={{status}}"
                  print(f"  [group {{gid:3d}}] {{marker}}")

              print("\n" + "=" * 78)
              print("SUMMARY")
              print("=" * 78)
              if found_series:
                  print(f"✅ Working SWESTR seriesId(s): {{found_series}}")
              else:
                  print("❌ No seriesId guess in Part 1 returned data.")

              if group_hits:
                  print(f"🎯 Group(s) containing a SWESTR-like series: {{group_hits}}")
              else:
                  print("❌ No group in range 1-20 contains a series with 'SWESTR' in its id.")
                  print("   Consider widening the GroupId range or checking riksbank.se's")
                  print("   own 'Search SWESTR data' page network tab for the literal seriesId.")

              with open("riksbank_probe_v2_results.json", "w", encoding="utf-8") as f:
                  json.dump(all_results, f, indent=2, ensure_ascii=False)
              print("\nFull results: riksbank_probe_v2_results.json")


          if __name__ == "__main__":
              main()

          EOFPYTHON

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riksbank-probe-v2-results
          path: riksbank_probe_v2_results.json
          if-no-files-found: warn
