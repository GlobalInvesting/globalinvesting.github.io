name: "[TEST] CME FX Options via yfinance"
on:
  workflow_dispatch:

jobs:
  test-cme-options:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance --break-system-packages

      - name: Run CME FX options probe
        run: python3 scripts/test_cme_fx_options.py
