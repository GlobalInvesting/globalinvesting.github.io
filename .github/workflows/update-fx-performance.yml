name: Update FX Performance (Yahoo Finance forex pairs) — C7
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-fx-performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create directory
        run: mkdir -p fx-performance

      - name: Fetch FX performance from Yahoo Finance
        run: |
          python3 << 'EOFPYTHON'
          import requests
          import json
          import csv
          import time
          from io import StringIO
          from datetime import date, timedelta, datetime

          # ════════════════════════════════════════════════════════════════════════
          # FX PERFORMANCE — C7: Yahoo Finance forex pairs (reemplazo de Stooq)
          #
          # MOTIVACIÓN:
          #   Stooq devuelve HTTP 200 con HTML de error cuando detecta IPs de
          #   GitHub Actions (bot detection por CDN). El fallback a Frankfurter
          #   funcionó correctamente pero usaba los tipos de referencia ECB con
          #   lag de hasta 24h.
          #
          #   Yahoo Finance permite descargar CSV histórico de pares de divisas
          #   sin autenticación y sin bloquear GitHub Actions:
          #   URL: https://query1.finance.yahoo.com/v7/finance/download/AUDUSD=X
          #        ?range=6mo&interval=1d&events=history&includeAdjustedClose=true
          #
          # DIFERENCIA vs ÍNDICES ICE:
          #   Los pares AUDUSD=X de Yahoo miden el precio del par de divisas,
          #   no el índice ponderado de la divisa. Para la mayoría de divisas
          #   la diferencia es mínima (<0.3% en 1M). Para USD se calcula como
          #   inverso ponderado del basket de las demás divisas.
          #
          # COMPOSITE: 70% 1M + 30% 3M (igual que C6)
          # CAMPO JSON: 'fxPerformance1M' — sin cambios en index.html
          # ════════════════════════════════════════════════════════════════════════

          CURRENCIES = ['EUR', 'GBP', 'JPY', 'AUD', 'CAD', 'CHF', 'NZD', 'USD']

          # Yahoo Finance tickers para pares vs USD
          # Formato: precio de 1 unidad de MONEDA en USD
          # EUR: EURUSD=X → cuántos USD por 1 EUR
          # JPY: JPYUSD=X → cuántos USD por 1 JPY (= 1/USDJPY)
          YAHOO_TICKERS = {
              'EUR': 'EURUSD=X',
              'GBP': 'GBPUSD=X',
              'JPY': 'JPYUSD=X',   # Yahoo tiene directo JPY/USD
              'AUD': 'AUDUSD=X',
              'CAD': 'CADUSD=X',
              'CHF': 'CHFUSD=X',
              'NZD': 'NZDUSD=X',
              'USD': None,         # Se calcula como inverso basket
          }

          # Pesos para calcular USD como inverso ponderado (similar a DXY)
          # Basado en pesos del US Dollar Index (ICE DXY)
          USD_BASKET_WEIGHTS = {
              'EUR': 0.576,
              'JPY': 0.136,
              'GBP': 0.119,
              'CAD': 0.091,
              'CHF': 0.036,
              'AUD': 0.021,
              'NZD': 0.021,
          }

          COMPOSITE_WEIGHT_1M = 0.70
          COMPOSITE_WEIGHT_3M = 0.30

          today = date.today()
          ref_date = today - timedelta(days=1)  # ayer = sesión cerrada
          date_30d = ref_date - timedelta(days=30)
          date_90d = ref_date - timedelta(days=90)
          date_7d  = ref_date - timedelta(days=7)

          print("=" * 70)
          print("FX PERFORMANCE — C7: Yahoo Finance Forex Pairs")
          print(f"Fecha: {today}")
          print(f"Composite: {COMPOSITE_WEIGHT_1M*100:.0f}% 1M + {COMPOSITE_WEIGHT_3M*100:.0f}% 3M")
          print(f"Fuente: Yahoo Finance (AUDUSD=X, EURUSD=X, etc.)")
          print("=" * 70)
          print(f"\nFechas de referencia:")
          print(f"  Ahora:  {ref_date}")
          print(f"  30d:    {date_30d}")
          print(f"  90d:    {date_90d}")
          print(f"  7d:     {date_7d}")

          def fetch_yahoo_history(ticker, retries=3, backoff=5):
              """
              Descarga histórico de Yahoo Finance para un par forex.
              Retorna lista de (date, close) ordenada ascendente.
              """
              # Yahoo Finance: range=6mo cubre 30d, 90d y algo más
              url = (
                  f"https://query1.finance.yahoo.com/v7/finance/download/{ticker}"
                  f"?range=6mo&interval=1d&events=history&includeAdjustedClose=true"
              )
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/csv,application/csv,text/plain,*/*',
                  'Accept-Language': 'en-US,en;q=0.9',
                  'Referer': 'https://finance.yahoo.com/',
              }

              for attempt in range(1, retries + 1):
                  try:
                      r = requests.get(url, headers=headers, timeout=20)
                      if r.status_code == 200 and len(r.content) > 200:
                          # Verificar que es CSV y no HTML de error
                          if r.text.startswith('Date,') or r.text.startswith('"Date"'):
                              reader = csv.DictReader(StringIO(r.text))
                              rows = []
                              for row in reader:
                                  try:
                                      d = datetime.strptime(row['Date'].strip(), '%Y-%m-%d').date()
                                      # Yahoo usa 'Adj Close' o 'Close'
                                      close_str = row.get('Adj Close') or row.get('Close') or ''
                                      if close_str and close_str.lower() not in ('null', 'n/a', ''):
                                          close = float(close_str.strip())
                                          if close > 0:
                                              rows.append((d, close))
                                  except (ValueError, KeyError):
                                      continue
                              if len(rows) >= 5:
                                  rows.sort(key=lambda x: x[0])
                                  print(f"  ✅ {ticker}: {len(rows)} días históricos")
                                  return rows
                              else:
                                  print(f"  ⚠️ {ticker}: CSV con solo {len(rows)} filas válidas")
                          else:
                              print(f"  ⚠️ {ticker}: respuesta no es CSV (HTML de error?)")
                              print(f"     Primeros 100 chars: {r.text[:100]}")
                      elif r.status_code == 429:
                          wait = backoff * attempt * 2
                          print(f"  ⚠️ {ticker}: Rate limit (429), esperando {wait}s...")
                          time.sleep(wait)
                      elif r.status_code == 404:
                          print(f"  ❌ {ticker}: Not found (404) — ticker incorrecto?")
                          return None
                      else:
                          print(f"  ⚠️ {ticker}: HTTP {r.status_code} (attempt {attempt}/{retries})")
                  except Exception as e:
                      print(f"  ⚠️ {ticker}: Error attempt {attempt}/{retries}: {e}")

                  if attempt < retries:
                      time.sleep(backoff)

              print(f"  ❌ {ticker}: Todos los intentos fallaron")
              return None

          def fetch_frankfurter_fallback(currency, ref_date, date_30d, date_90d, date_7d):
              """
              Fallback a Frankfurter si Yahoo falla para una divisa específica.
              """
              print(f"  → Usando Frankfurter como fallback para {currency}...")
              base_url = "https://api.frankfurter.app"

              def get_rate(d):
                  try:
                      r = requests.get(f"{base_url}/{d}?from=USD&to={currency}", timeout=10)
                      if r.ok:
                          rate = r.json().get('rates', {}).get(currency)
                          return float(rate) if rate else None
                  except:
                      pass
                  return None

              rate_now = get_rate(ref_date.isoformat())
              time.sleep(0.5)
              rate_30d = get_rate(date_30d.isoformat())
              time.sleep(0.5)
              rate_90d = get_rate(date_90d.isoformat())
              time.sleep(0.5)
              rate_7d  = get_rate(date_7d.isoformat())

              # Frankfurter: rate = CCY per USD → inverso para % de apreciación de CCY
              def perf(rate_now, rate_before):
                  if not rate_now or not rate_before or rate_before == 0 or rate_now == 0:
                      return None
                  return round((rate_before / rate_now - 1.0) * 100.0, 4)

              p1m = perf(rate_now, rate_30d)
              p3m = perf(rate_now, rate_90d)
              p1w = perf(rate_now, rate_7d)
              comp = None
              if p1m is not None and p3m is not None:
                  comp = round(p1m * COMPOSITE_WEIGHT_1M + p3m * COMPOSITE_WEIGHT_3M, 4)
              elif p1m is not None:
                  comp = p1m

              print(f"  → Frankfurter: 1M={p1m}% | 3M={p3m}% | composite={comp}%")
              return comp, p1m, p3m, p1w, 'frankfurter_fallback'

          def get_closest_value(rows, target_date, max_diff_days=5):
              if not rows:
                  return None, None
              best, best_diff, best_date = None, float('inf'), None
              for d, close in rows:
                  diff = abs((d - target_date).days)
                  if diff < best_diff:
                      best_diff, best, best_date = diff, close, d
              if best_diff <= max_diff_days:
                  return best, best_date
              return None, None

          def calc_perf_yahoo(val_now, val_before):
              """
              Yahoo: AUDUSD=X sube → AUD se apreció vs USD → positivo
              (Misma lógica que los índices ICE: sube = divisa se fortalece)
              """
              if val_now is None or val_before is None or val_before == 0:
                  return None
              return round((val_now / val_before - 1.0) * 100.0, 4)

          # ── Procesar cada divisa ──────────────────────────────────────────────
          results = {}
          for currency in CURRENCIES:
              if currency == 'USD':
                  continue  # Se calcula al final

              ticker = YAHOO_TICKERS[currency]
              print(f"\n{'─'*50}")
              print(f"[{currency}] Ticker: {ticker}")
              print(f"{'─'*50}")

              rows = fetch_yahoo_history(ticker)
              time.sleep(2)  # Respetar rate limit Yahoo

              if rows and len(rows) >= 5:
                  val_now, _ = get_closest_value(rows, ref_date, max_diff_days=5)
                  val_30d, _ = get_closest_value(rows, date_30d, max_diff_days=5)
                  val_90d, _ = get_closest_value(rows, date_90d, max_diff_days=7)
                  val_7d,  _ = get_closest_value(rows, date_7d,  max_diff_days=5)

                  p1m = calc_perf_yahoo(val_now, val_30d)
                  p3m = calc_perf_yahoo(val_now, val_90d)
                  p1w = calc_perf_yahoo(val_now, val_7d)

                  if p1m is not None and p3m is not None:
                      comp = round(p1m * COMPOSITE_WEIGHT_1M + p3m * COMPOSITE_WEIGHT_3M, 4)
                  elif p1m is not None:
                      comp = p1m
                  elif p3m is not None:
                      comp = p3m
                  else:
                      comp = None

                  results[currency] = {
                      'fxPerformance1M':     comp,
                      'fxPerformance1M_raw': p1m,
                      'fxPerformance3M':     p3m,
                      'fxPerformance1W':     p1w,
                      'indexNow':            val_now,
                      'index30dAgo':         val_30d,
                      'index90dAgo':         val_90d,
                      'index7dAgo':          val_7d,
                      'date':                ref_date.isoformat(),
                      'source':              f'Yahoo Finance {ticker} — composite {COMPOSITE_WEIGHT_1M*100:.0f}% 1M + {COMPOSITE_WEIGHT_3M*100:.0f}% 3M (C7)',
                      'sourceType':          'yahoo_finance',
                  }
                  print(f"  → COMPOSITE: {comp}%  [1M={p1m}% | 3M={p3m}%]")

              else:
                  # Fallback a Frankfurter
                  comp, p1m, p3m, p1w, src = fetch_frankfurter_fallback(
                      currency, ref_date, date_30d, date_90d, date_7d
                  )
                  results[currency] = {
                      'fxPerformance1M':     comp,
                      'fxPerformance1M_raw': p1m,
                      'fxPerformance3M':     p3m,
                      'fxPerformance1W':     p1w,
                      'indexNow':            None,
                      'index30dAgo':         None,
                      'index90dAgo':         None,
                      'index7dAgo':          None,
                      'date':                ref_date.isoformat(),
                      'source':              f'Frankfurter ECB fallback (Yahoo no disponible) — composite {COMPOSITE_WEIGHT_1M*100:.0f}% 1M + {COMPOSITE_WEIGHT_3M*100:.0f}% 3M (C7)',
                      'sourceType':          'frankfurter_fallback',
                  }

          # ── USD: inverso ponderado del basket ────────────────────────────────
          print(f"\n{'─'*50}")
          print("[USD] Calculando como inverso ponderado del basket")
          print(f"{'─'*50}")

          available = [
              c for c in USD_BASKET_WEIGHTS
              if results.get(c, {}).get('fxPerformance1M') is not None
          ]
          total_w = sum(USD_BASKET_WEIGHTS[c] for c in available)

          if total_w > 0:
              usd_comp = 0.0
              usd_1m   = 0.0
              usd_3m   = 0.0
              for c in available:
                  w = USD_BASKET_WEIGHTS[c] / total_w
                  if results[c]['fxPerformance1M'] is not None:
                      usd_comp -= results[c]['fxPerformance1M'] * w
                  if results[c].get('fxPerformance1M_raw') is not None:
                      usd_1m -= results[c]['fxPerformance1M_raw'] * w
                  if results[c].get('fxPerformance3M') is not None:
                      usd_3m -= results[c]['fxPerformance3M'] * w

              usd_comp = round(usd_comp, 4)
              usd_1m   = round(usd_1m, 4)
              usd_3m   = round(usd_3m, 4)

              results['USD'] = {
                  'fxPerformance1M':     usd_comp,
                  'fxPerformance1M_raw': usd_1m,
                  'fxPerformance3M':     usd_3m,
                  'fxPerformance1W':     None,
                  'indexNow':            None,
                  'index30dAgo':         None,
                  'index90dAgo':         None,
                  'index7dAgo':          None,
                  'date':                ref_date.isoformat(),
                  'source':              f'Inverso basket ponderado (EUR 57.6%, JPY 13.6%, GBP 11.9%, CAD 9.1%, CHF 3.6%, AUD 2.1%, NZD 2.1%) — C7',
                  'sourceType':          'computed_inverse',
              }
              print(f"  → USD composite: {usd_comp}%  [1M={usd_1m}% | 3M={usd_3m}%]")
              print(f"  → Basket usando {len(available)} divisas: {available}")
          else:
              results['USD'] = {
                  'fxPerformance1M': None, 'fxPerformance1M_raw': None,
                  'fxPerformance3M': None, 'fxPerformance1W': None,
                  'indexNow': None, 'index30dAgo': None,
                  'index90dAgo': None, 'index7dAgo': None,
                  'date': ref_date.isoformat(),
                  'source': 'No disponible — basket sin datos',
                  'sourceType': 'error',
              }
              print("  ❌ USD: no hay datos del basket")

          # ── Guardar archivos JSON ─────────────────────────────────────────────
          import os
          os.makedirs('fx-performance', exist_ok=True)

          print(f"\n{'='*70}")
          print("GUARDANDO ARCHIVOS")
          print(f"{'='*70}")

          for currency in CURRENCIES:
              if currency in results:
                  with open(f'fx-performance/{currency}.json', 'w') as f:
                      json.dump(results[currency], f, indent=2)
                  comp   = results[currency]['fxPerformance1M']
                  p1m    = results[currency].get('fxPerformance1M_raw')
                  p3m    = results[currency].get('fxPerformance3M')
                  src    = results[currency].get('sourceType', '?')
                  status = '✅' if comp is not None else '❌ NULL'
                  print(f"  {status} {currency}.json: composite={comp}% | 1M={p1m}% | 3M={p3m}% [{src}]")

          # ── Resumen final con validación ──────────────────────────────────────
          print(f"\n{'='*70}")
          print(f"FX PERFORMANCE SUMMARY — Yahoo Finance C7")
          print(f"Referencia: {ref_date} | Composite: {COMPOSITE_WEIGHT_1M*100:.0f}% 1M + {COMPOSITE_WEIGHT_3M*100:.0f}% 3M")
          print("=" * 70)

          sorted_results = sorted(
              [(c, d['fxPerformance1M']) for c, d in results.items()
               if d.get('fxPerformance1M') is not None],
              key=lambda x: x[1], reverse=True
          )
          for currency, perf in sorted_results:
              bar  = '█' * min(int(abs(perf) * 2), 20)
              sign = '+' if perf >= 0 else ''
              p1m  = results[currency].get('fxPerformance1M_raw')
              p3m  = results[currency].get('fxPerformance3M')
              src  = results[currency].get('sourceType', '?')
              raw  = f" (1M={p1m:+.2f}% | 3M={p3m:+.2f}%)" if p1m is not None and p3m is not None else ""
              print(f"  {currency}: {sign}{perf:+.2f}%{raw}  [{src}]  {bar}")

          nulls = [c for c, d in results.items() if d.get('fxPerformance1M') is None]
          if nulls:
              print(f"\n⚠️  NULL: {', '.join(nulls)}")
          else:
              print(f"\n✅ Todas las divisas procesadas correctamente")

          # Validación contra TradingView (referencia 6/3/2026)
          print(f"\n{'─'*70}")
          print("VALIDACIÓN vs TradingView 1M (6/3/2026):")
          TV_REF = {
              'AUD': -0.21, 'JPY': -0.62, 'EUR': -2.06, 'GBP': -2.65,
              'CAD':  0.22, 'CHF': -0.49, 'NZD': -2.35, 'USD':  1.75,
          }
          for currency, tv_val in TV_REF.items():
              stooq_1m = results.get(currency, {}).get('fxPerformance1M_raw')
              if stooq_1m is not None:
                  diff = abs(stooq_1m - tv_val)
                  flag = "✅" if diff < 1.5 else "⚠️ REVISAR"
                  print(f"  {currency}: Yahoo={stooq_1m:+.2f}% | TV={tv_val:+.2f}% | Δ={diff:.2f}% {flag}")
              else:
                  print(f"  {currency}: NULL | TV={tv_val:+.2f}% ❌")
          EOFPYTHON

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add fx-performance/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📈 FX performance $(date +'%Y-%m-%d') — Yahoo Finance C7 (70% 1M + 30% 3M)"
            git pull --rebase origin main || true
            git push
          fi
