name: Fetch Historical Economic Data (APIs Oficiales)

# Obtiene datos históricos económicos usando FRED + OECD + World Bank.
# SIN scraping, SIN Playwright, SIN bloqueos. ~3-5 minutos total.
#
# SETUP (una sola vez):
#   1. Obtener API key gratis de FRED: https://fred.stlouisfed.org/docs/api/api_key.html
#   2. Añadir como secret: GitHub repo → Settings → Secrets → New secret → FRED_API_KEY
#
# PRIMER RUN: workflow_dispatch → descarga todo el historial desde 2015 (~3 min)
# RUNS SEMANALES: automático los lunes, solo actualiza datos nuevos

on:
  workflow_dispatch:
    inputs:
      currency:
        description: 'Divisas (separadas por espacio, vacío = todas)'
        required: false
        default: ''
      indicator:
        description: 'Indicadores (separados por espacio, vacío = todos)'
        required: false
        default: ''
  schedule:
    # Lunes 04:30 UTC — antes del update-economic-data (06:00 UTC)
    - cron: '30 4 * * 1'

jobs:
  fetch-econ-data-apis:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Mucho más rápido que Playwright (3-5 min vs 40-50 min)

    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # Solo 'requests' — las APIs son REST estándar
          pip install requests --break-system-packages

      - name: Create output directory
        run: mkdir -p economic-data-history

      - name: Check FRED API key status
        run: |
          if [ -n "$FRED_API_KEY" ]; then
            echo "✓ FRED_API_KEY configurada (sin límites de rate)"
          else
            echo "⚠  Sin FRED_API_KEY — funcionará pero más lento"
            echo "   Para configurar: https://fred.stlouisfed.org/docs/api/api_key.html"
          fi

      - name: Build CLI args
        id: args
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.currency }}" ]; then
            ARGS="$ARGS --currency ${{ github.event.inputs.currency }}"
          fi
          if [ -n "${{ github.event.inputs.indicator }}" ]; then
            ARGS="$ARGS --indicator ${{ github.event.inputs.indicator }}"
          fi
          echo "cli_args=$ARGS" >> $GITHUB_OUTPUT
          echo "Args: $ARGS"

      - name: Fetch economic data from APIs
        run: |
          python3 -u scripts/fetch_econ_data_apis.py ${{ steps.args.outputs.cli_args }}

      - name: Show coverage summary
        run: |
          python3 -u scripts/fetch_econ_data_apis.py --summary

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add economic-data-history/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            DATE=$(date +'%Y-%m-%d')
            git commit -m "Historical econ data ${DATE} — FRED/OECD/WB — ${COUNT} files"
            git pull --rebase origin main || true
            git push
          fi
