name: Update OHLC Chart Data

# Runs once daily after NY close.
# Downloads 3 years of daily OHLC bars for all 38 chart symbols via yfinance
# and writes ohlc-data/{id}.json to THIS (public) repo.
#
# Symbols: 28 FX pairs + Gold, WTI, BTC, US10Y + S&P 500, Nasdaq, Nikkei,
#           EuroStoxx 50, ETH/USD, DXY — all rendered via Lightweight Charts.
#
# Files are REPLACED on every run — repo size stays fixed (~1.7 MB raw).
#
# Schedule:
#   Mon–Fri 22:30 UTC — after NY equity close, before Sydney open. Covers all
#     non-crypto symbols (FX, Gold, WTI, indices, yields). dashboard.js injects
#     the live today-bar from quotes.json (refreshed every 5 min) so the
#     21:00–22:30 UTC window is covered without a second weekday run.
#   Sat–Sun 23:30 UTC — crypto-only run. BTC and ETH trade 24/7; without a
#     weekend run, the Friday script would write a partial Saturday bar (~22.5h)
#     that persists all weekend with truncated H/L wicks. The 23:30 UTC timing
#     ensures the UTC calendar day (00:00–24:00 UTC) is nearly complete before
#     fetch_ohlc.py strips the in-progress today-bar and writes the final JSON.
#     All non-crypto symbols are also refreshed (no-op cost — same script).
#
# Placement: PUBLIC repo — yfinance only, no API keys, no proprietary logic.
# Uses GITHUB_TOKEN (native) — no PAT_TOKEN required.
# Public repos have unlimited GitHub Actions minutes → no budget impact.

on:
  schedule:
    - cron: '30 22 * * 1-5'   # 22:30 UTC Mon–Fri — authoritative daily close (after NY close, before Sydney open)
    - cron: '30 23 * * 0,6'   # 23:30 UTC Sat–Sun  — crypto weekend bars (BTC, ETH trade 24/7)
  workflow_dispatch:             # manual trigger for backfill / testing

concurrency:
  group: update-ohlc
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-ohlc:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git fetch origin main && git rebase origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance --break-system-packages

      - name: Create output directory
        run: mkdir -p ohlc-data

      - name: Fetch OHLC data
        env:
          SITE_DIR: .
        run: python scripts/fetch_ohlc.py

      - name: Display summary
        if: always()
        run: |
          if [ -f ohlc-data/meta.json ]; then
            echo "════════════════════════════════════════"
            echo "   OHLC UPDATE SUMMARY"
            echo "════════════════════════════════════════"
            python3 -c "
          import json, os
          with open('ohlc-data/meta.json') as f:
              m = json.load(f)
          print(f'  Updated   : {m[\"updated_at\"]}')
          print(f'  Symbols   : {m[\"symbol_count\"]} written')
          print(f'  Period    : {m[\"period\"]} / {m[\"interval\"]}')
          if m['errors']:
              print(f'  Errors    : {len(m[\"errors\"])} failed: {m[\"errors\"]}')
          else:
              print('  Errors    : none')
          total = 0
          for f in sorted(os.listdir('ohlc-data')):
              if f.endswith('.json') and f != 'meta.json':
                  sz = os.path.getsize(f'ohlc-data/{f}')
                  total += sz
          print(f'  Total size: {total // 1024} KB raw')
          "
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r ohlc-data/ /tmp/ohlc_fresh/
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            cp -r /tmp/ohlc_fresh/. ohlc-data/
            git add ohlc-data/
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "data: ohlc update [${TIMESTAMP}]"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
