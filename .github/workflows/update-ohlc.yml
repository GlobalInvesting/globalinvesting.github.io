name: Update OHLC Chart Data

# Downloads OHLC bars for all chart symbols and writes JSON files
# FX pairs (28): Finnhub REST API (OANDA). All others: yfinance.
# to THIS (public) repo under ohlc-data/:
#
#   ohlc-data/{id}.json       — Daily (D1) bars, ~3 years, ~38 symbols
#   ohlc-data/h1/{id}.json    — Hourly (H1) bars, ~720 days, unix timestamps
#   ohlc-data/h4/{id}.json    — 4-Hour (H4) bars, ~720 days, unix timestamps
#
# Symbols: 28 FX pairs + Gold, WTI, BTC, US10Y + S&P 500, Nasdaq, Nikkei,
#           EuroStoxx 50, ETH/USD, DXY — all rendered via Lightweight Charts.
#
# D1 files are REPLACED on every run — repo size stays fixed.
# H1/H4 files cover 720-day yfinance limit; also replaced on every run.
#
# Schedule:
#   Mon–Fri :02 and :32 (twice per hour) — Intraday run during the FX week.
#     Runs 2 minutes after each 30-min mark, once H1 bars have finalized in yfinance.
#     Halves the max JSON staleness to ~30 minutes (vs ~60 min with the old :30 cron).
#     bar closes at :00 → finalized in yfinance by :02. Bar closes at :30 → finalized by :32.
#     dashboard.js fetches these JSON files directly — gap between last completed bar
#     and the live partial bar (WebSocket) is at most ~30 min instead of ~60 min.
#     Public repo = unlimited GitHub Actions minutes — zero cost impact.
#
#   Tue–Sat 01:30 UTC — Retained for FX session finalization. The last H1 bar of
#     each session (20:00–21:00 UTC) has a yfinance finalization lag of up to ~1h.
#     The 01:30 UTC run ensures D1 FX bars (built from 1H aggregation) use fully
#     finalized H/L/C values. Also serves as the authoritative daily D1 write.
#
#   Sat–Sun 23:30 UTC — Crypto weekend run. BTC and ETH trade 24/7; without a
#     weekend run the Friday script would write a partial Saturday bar (~22.5h) that
#     persists all weekend with truncated H/L wicks. The 23:30 UTC timing ensures
#     the UTC calendar day (00:00–24:00 UTC) is nearly complete before
#     fetch_ohlc.py strips the in-progress today-bar and writes the final JSON.
#     All non-crypto symbols are also refreshed (no-op cost — same script).
#
# Placement: PUBLIC repo — yfinance only, no API keys, no proprietary logic.
# Uses GITHUB_TOKEN (native) — no PAT_TOKEN required.
# Public repos have unlimited GitHub Actions minutes → no budget impact.

on:
  schedule:
    - cron: '2,32 * * * 1-5'  # every :02 and :32 Mon–Fri UTC — H1/H4 gap ≤ 30 min during FX week
    - cron: '30 1 * * 2-6'    # 01:30 UTC Tue–Sat — retained for FX session finalization (full D1 bars)
    - cron: '30 23 * * 0,6'   # 23:30 UTC Sat–Sun  — crypto weekend bars (BTC, ETH trade 24/7)
  workflow_dispatch:             # manual trigger for backfill / testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 → 24 opt-in (mandatory before June 2 2026)

concurrency:
  group: update-ohlc
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-ohlc:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests --break-system-packages

      - name: Create output directories
        run: mkdir -p ohlc-data ohlc-data/h1 ohlc-data/h4

      - name: Fetch OHLC data
        env:
          SITE_DIR: .
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/fetch_ohlc.py

      - name: Display summary
        if: always()
        run: |
          if [ -f ohlc-data/meta.json ]; then
            echo "════════════════════════════════════════"
            echo "   OHLC UPDATE SUMMARY"
            echo "════════════════════════════════════════"
            python3 -c "
          import json, os
          with open('ohlc-data/meta.json') as f:
              m = json.load(f)
          print(f'  Updated   : {m[\"updated_at\"]}')
          print(f'  D1 symbols: {m[\"symbol_count\"]} written')
          print(f'  Period    : {m[\"period\"]} / {m[\"interval\"]}')
          if m['errors']:
              print(f'  Errors    : {len(m[\"errors\"])} failed: {m[\"errors\"]}')
          else:
              print('  Errors    : none')
          total = 0
          for root, dirs, files in os.walk('ohlc-data'):
              for f in files:
                  if f.endswith('.json') and f != 'meta.json':
                      total += os.path.getsize(os.path.join(root, f))
          h1_count = len([f for f in os.listdir('ohlc-data/h1') if f.endswith('.json')]) if os.path.isdir('ohlc-data/h1') else 0
          h4_count = len([f for f in os.listdir('ohlc-data/h4') if f.endswith('.json')]) if os.path.isdir('ohlc-data/h4') else 0
          print(f'  H1 files  : {h1_count}')
          print(f'  H4 files  : {h4_count}')
          print(f'  Total size: {total // 1024} KB raw')
          "
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r ohlc-data/ /tmp/ohlc_fresh/
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            cp -r /tmp/ohlc_fresh/. ohlc-data/
            git add ohlc-data/
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "data: ohlc update [${TIMESTAMP}]"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
