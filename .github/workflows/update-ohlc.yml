name: Update OHLC Chart Data

# Downloads 3 years of daily OHLC bars for all 38 chart symbols via yfinance
# and writes ohlc-data/{id}.json to THIS (public) repo.
#
# Symbols: 28 FX pairs + Gold, WTI, BTC, US10Y + S&P 500, Nasdaq, Nikkei,
#           EuroStoxx 50, ETH/USD, DXY — all rendered via Lightweight Charts.
#
# Files are REPLACED on every run — repo size stays fixed (~1.7 MB raw).
#
# Schedule:
#   Tue–Sat 01:30 UTC — Main weekday run (after FX session finalization).
#     The FX trading day closes at 21:00 UTC. The last 1H bar of each session
#     (20:00–21:00 UTC) closes at 21:00 UTC, but yfinance has a finalization lag
#     of 15–90 minutes: H/L/C values for the most recent 1H bars remain provisional
#     in Yahoo Finance's feed for up to ~1 hour after bar close. Running at 22:30 UTC
#     (only 90 min after session close) wrote provisional data that appeared as
#     candles with wrong wicks or body vs TradingView and Bloomberg — the persistent
#     nightly FX candle bug. Moving to 01:30 UTC (4.5h after session close) ensures
#     all yfinance 1H FX data is 100% finalized before the JSON is written.
#     Runs Tue–Sat UTC: covers the Mon–Fri FX sessions (Mon session correction runs
#     Tue 01:30 UTC, …, Fri session correction runs Sat 01:30 UTC).
#     dashboard.js injects the live today-bar from quotes.json (refreshed every 5 min)
#     covering the 21:00–01:30 UTC window without any static data gap.
#
#   Sat–Sun 23:30 UTC — Crypto weekend run. BTC and ETH trade 24/7; without a
#     weekend run the Friday script would write a partial Saturday bar (~22.5h) that
#     persists all weekend with truncated H/L wicks. The 23:30 UTC timing ensures
#     the UTC calendar day (00:00–24:00 UTC) is nearly complete before
#     fetch_ohlc.py strips the in-progress today-bar and writes the final JSON.
#     All non-crypto symbols are also refreshed (no-op cost — same script).
#
# Placement: PUBLIC repo — yfinance only, no API keys, no proprietary logic.
# Uses GITHUB_TOKEN (native) — no PAT_TOKEN required.
# Public repos have unlimited GitHub Actions minutes → no budget impact.

on:
  schedule:
    - cron: '30  1 * * 2-6'   # 01:30 UTC Tue–Sat — after FX session data finalization (was 22:30 UTC, caused nightly candle bug)
    - cron: '30 23 * * 0,6'   # 23:30 UTC Sat–Sun  — crypto weekend bars (BTC, ETH trade 24/7)
  workflow_dispatch:             # manual trigger for backfill / testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 → 24 opt-in (mandatory before June 2 2026)

concurrency:
  group: update-ohlc
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-ohlc:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance --break-system-packages

      - name: Create output directory
        run: mkdir -p ohlc-data

      - name: Fetch OHLC data
        env:
          SITE_DIR: .
        run: python scripts/fetch_ohlc.py

      - name: Display summary
        if: always()
        run: |
          if [ -f ohlc-data/meta.json ]; then
            echo "════════════════════════════════════════"
            echo "   OHLC UPDATE SUMMARY"
            echo "════════════════════════════════════════"
            python3 -c "
          import json, os
          with open('ohlc-data/meta.json') as f:
              m = json.load(f)
          print(f'  Updated   : {m[\"updated_at\"]}')
          print(f'  Symbols   : {m[\"symbol_count\"]} written')
          print(f'  Period    : {m[\"period\"]} / {m[\"interval\"]}')
          if m['errors']:
              print(f'  Errors    : {len(m[\"errors\"])} failed: {m[\"errors\"]}')
          else:
              print('  Errors    : none')
          total = 0
          for f in sorted(os.listdir('ohlc-data')):
              if f.endswith('.json') and f != 'meta.json':
                  sz = os.path.getsize(f'ohlc-data/{f}')
                  total += sz
          print(f'  Total size: {total // 1024} KB raw')
          "
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r ohlc-data/ /tmp/ohlc_fresh/
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            cp -r /tmp/ohlc_fresh/. ohlc-data/
            git add ohlc-data/
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "data: ohlc update [${TIMESTAMP}]"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
