name: Update Saxo RR Data

# Consolidated from two workflows (update-saxo-rr.yml + update-saxo-rr2.yml).
# A single Playwright scrape now writes both rr.json (1M tenor, consumed by
# fetchOptionSkew) and rr2.json (all tenors, consumed by renderDerivativesSection).
# FIX-19: Added FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 to suppress Node.js 20 deprecation warnings.

on:
  schedule:
    # Run Monday–Friday at 08:30 UTC (after European open, before US open).
    # Saxo updates their options page during European business hours.
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # FIX-19: Node.js 20 → 24 opt-in

concurrency:
  group: update-saxo-rr
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4

      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: globalinvesting/globalinvesting.github.io
          token: ${{ secrets.PAT_TOKEN }}
          path: site

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium --with-deps

      - name: Fetch Saxo RR data (rr.json + rr2.json)
        env:
          SITE_DIR: site
        run: python scripts/fetch_saxo_rr.py

      - name: Commit and push if changed
        run: |
          cd site

          # If neither file exists (first run + scrape failed), skip commit.
          if [ ! -f rr-data/rr.json ] && [ ! -f rr-data/rr2.json ]; then
            echo "No output files — nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash fresh files before the fetch/reset loop
          [ -f rr-data/rr.json  ] && cp rr-data/rr.json  /tmp/rr_fresh.json
          [ -f rr-data/rr2.json ] && cp rr-data/rr2.json /tmp/rr2_fresh.json
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main

            # Restore fresh files after hard reset
            [ -f /tmp/rr_fresh.json  ] && cp /tmp/rr_fresh.json  rr-data/rr.json
            [ -f /tmp/rr2_fresh.json ] && cp /tmp/rr2_fresh.json rr-data/rr2.json

            git add rr-data/rr.json rr-data/rr2.json
            if git diff --staged --quiet; then
              echo "No changes vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "chore: update Saxo 25d RR data [${TIMESTAMP}]"
            if git push origin main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
