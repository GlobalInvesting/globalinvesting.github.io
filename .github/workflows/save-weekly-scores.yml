name: Save Weekly Scores (Backtest Prospectivo)

# Runs every Monday at 08:00 UTC — after economic-data (06:00) and fx-performance (07:00) have updated
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  save-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Calculate and save weekly scores
        run: python3 scripts/save_weekly_scores.py

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scores-history/ fx-history/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly scores snapshot $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
