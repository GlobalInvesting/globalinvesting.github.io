name: Update COT Data (CFTC Official - All Currencies)
on:
  schedule:
    - cron: '0 20 * * 5'  # Fridays at 8:00 PM UTC
  workflow_dispatch:

jobs:
  update-cot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Fetch all COT data from CFTC
        run: |
          python3 << 'EOFPYTHON'
          import requests
          import re
          import json
          import os
          from datetime import date

          print("=" * 70)
          print("COT DATA FETCHER — CFTC OFFICIAL (financial_lof.htm)")
          print("=" * 70)

          # ── Fuentes CFTC ────────────────────────────────────────────────────────
          # financial_lof.htm → EUR, GBP, JPY, CAD, CHF, AUD, NZD  (CME FX futures)
          # deanybtsf.htm     → USD Index                            (ICE Futures)
          FINANCIAL_URL = "https://www.cftc.gov/dea/options/financial_lof.htm"
          USD_INDEX_URL = "https://www.cftc.gov/dea/futures/deanybtsf.htm"

          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (compatible; COT-Dashboard-Bot/1.0; "
                  "+https://globalinvesting.github.io/)"
              )
          }

          # ── Mapeo: divisa → nombre exacto que aparece en el reporte CFTC ───────
          # El parser busca esta cadena (case-insensitive) antes de "COMMITMENTS".
          CURRENCY_NAMES = {
              "EUR": "EURO FX - CHICAGO MERCANTILE EXCHANGE",
              "GBP": "BRITISH POUND - CHICAGO MERCANTILE EXCHANGE",
              "JPY": "JAPANESE YEN - CHICAGO MERCANTILE EXCHANGE",
              "CAD": "CANADIAN DOLLAR - CHICAGO MERCANTILE EXCHANGE",
              "CHF": "SWISS FRANC - CHICAGO MERCANTILE EXCHANGE",
              "AUD": "AUSTRALIAN DOLLAR - CHICAGO MERCANTILE EXCHANGE",
              "NZD": "NEW ZEALAND DOLLAR - CHICAGO MERCANTILE EXCHANGE",
          }

          # ── Helpers ─────────────────────────────────────────────────────────────
          def fetch_url(url, retries=3):
              for attempt in range(1, retries + 1):
                  try:
                      r = requests.get(url, headers=HEADERS, timeout=30)
                      r.raise_for_status()
                      print(f"  ✅ HTTP {r.status_code} ({len(r.text):,} chars)")
                      return r.text
                  except Exception as e:
                      print(f"  ⚠️  Attempt {attempt}/{retries} failed: {e}")
                      if attempt == retries:
                          raise
              return None

          def parse_numbers(line):
              """Extract all integers/comma-separated numbers from a line."""
              return [int(s.replace(",", "")) for s in re.findall(r"[\d,]+", line)]

          # ── Parser for financial_lof.htm ─────────────────────────────────────
          # Layout per currency block:
          #
          #   <CURRENCY NAME> - CHICAGO MERCANTILE EXCHANGE  ...
          #   CFTC Code #XXXXXX                 Open Interest is  NNN,NNN
          #   Positions
          #     DD_L  DD_S  DD_SP  AM_L  AM_S  AM_SP  LF_L  LF_S  LF_SP  OR_L ...
          #
          # Columns (0-indexed, within the single "Positions" data line):
          #   0  Dealer Long        1  Dealer Short       2  Dealer Spreading
          #   3  Asset Mgr Long     4  Asset Mgr Short    5  Asset Mgr Spreading
          #   6  Leveraged Long     7  Leveraged Short    8  Leveraged Spreading
          #   9  Other Long        10  Other Short       11  Other Spreading
          #  12  Nonrep Long       13  Nonrep Short
          #
          # "Leveraged Funds" (indices 6 & 7) = speculative / non-commercial equivalent.
          # We compute: net = Leveraged Long − Leveraged Short

          def extract_leveraged_net(content, currency_name):
              """
              Returns (long, short, net) for Leveraged Funds, or None on failure.
              """
              # Find currency header (case-insensitive)
              pattern = re.compile(
                  re.escape(currency_name.upper()),
                  re.IGNORECASE | re.DOTALL,
              )
              m = pattern.search(content)
              if not m:
                  print(f"  ❌ Section not found for: {currency_name}")
                  return None

              # Slice to the next ~25 lines after the header
              snippet = content[m.start(): m.start() + 3000]
              lines = snippet.splitlines()

              # Find "Positions" line, then the very next non-empty line has the data
              for i, line in enumerate(lines):
                  if re.match(r"\s*Positions\s*$", line, re.IGNORECASE):
                      for j in range(i + 1, min(i + 5, len(lines))):
                          nums = parse_numbers(lines[j])
                          if len(nums) >= 8:
                              lev_long  = nums[6]
                              lev_short = nums[7]
                              net = lev_long - lev_short
                              return lev_long, lev_short, net
              print(f"  ❌ Could not parse Positions data for: {currency_name}")
              return None

          # ── Parser for deanybtsf.htm (USD Index — legacy non-commercial) ──────
          # This file uses the older Commercial/Non-Commercial layout:
          #   NON-COMMERCIAL  COMMERCIAL  TOTAL  NONREPORTABLE
          #     L   S  Spread   L   S      L   S    L   S
          # Non-commercial Long = index 0, Short = index 1

          def extract_usd_noncommercial(content):
              pattern = re.compile(
                  r"U\.S\. DOLLAR INDEX",
                  re.IGNORECASE | re.DOTALL,
              )
              m = pattern.search(content)
              if not m:
                  print("  ❌ USD Index section not found")
                  return None

              snippet = content[m.start(): m.start() + 3000]
              lines = snippet.splitlines()

              for i, line in enumerate(lines):
                  if re.match(r"\s*COMMITMENTS\s*$", line, re.IGNORECASE):
                      for j in range(i + 1, min(i + 5, len(lines))):
                          nums = parse_numbers(lines[j])
                          if len(nums) >= 2:
                              nc_long  = nums[0]
                              nc_short = nums[1]
                              net = nc_long - nc_short
                              return nc_long, nc_short, net
              print("  ❌ Could not parse USD Index commitments")
              return None

          # ── Save helper ──────────────────────────────────────────────────────
          os.makedirs("cot-data", exist_ok=True)
          today = str(date.today())
          results = {}

          def save(currency, long_pos, short_pos, net, source_url, category):
              data = {
                  "netPosition":   net,
                  "longPositions": long_pos,
                  "shortPositions": short_pos,
                  "positionCategory": category,
                  "source": "CFTC Official",
                  "sourceUrl": source_url,
                  "reportDate": today,
                  "lastUpdate": today,
              }
              path = f"cot-data/{currency}.json"
              with open(path, "w") as f:
                  json.dump(data, f, indent=2)
              results[currency] = data
              print(
                  f"  💾 {currency}: {net:+,} contracts  "
                  f"(L {long_pos:,} / S {short_pos:,})  [{category}]"
              )

          # ════════════════════════════════════════════════════════════════════
          # 1. EUR, GBP, JPY, CAD, CHF, AUD, NZD  — from financial_lof.htm
          # ════════════════════════════════════════════════════════════════════
          print(f"\n{'─'*60}")
          print(f"Fetching {FINANCIAL_URL}")
          print(f"{'─'*60}")
          fin_content = fetch_url(FINANCIAL_URL)

          for currency, section_name in CURRENCY_NAMES.items():
              print(f"\n[{currency}] Parsing '{section_name}'...")
              result = extract_leveraged_net(fin_content, section_name)
              if result:
                  lev_long, lev_short, net = result
                  save(currency, lev_long, lev_short, net, FINANCIAL_URL, "Leveraged Funds (non-commercial equivalent)")
              else:
                  print(f"  ⚠️  No data saved for {currency}")

          # ════════════════════════════════════════════════════════════════════
          # 2. USD Index — from deanybtsf.htm  (non-commercial classic)
          # ════════════════════════════════════════════════════════════════════
          print(f"\n{'─'*60}")
          print(f"Fetching {USD_INDEX_URL}")
          print(f"{'─'*60}")
          usd_content = fetch_url(USD_INDEX_URL)

          print("\n[USD] Parsing 'U.S. DOLLAR INDEX'...")
          usd_result = extract_usd_noncommercial(usd_content)
          if usd_result:
              nc_long, nc_short, net = usd_result
              save("USD", nc_long, nc_short, net, USD_INDEX_URL, "Non-Commercial (classic)")
          else:
              print("  ⚠️  No data saved for USD")

          # ════════════════════════════════════════════════════════════════════
          # Summary
          # ════════════════════════════════════════════════════════════════════
          print(f"\n{'='*70}")
          print(f"SUMMARY — {len(results)}/8 currencies updated")
          print(f"{'='*70}")
          for curr, d in sorted(results.items()):
              bar_len  = min(abs(d['netPosition']) // 2000, 20)
              bar_char = "█" if d['netPosition'] >= 0 else "░"
              bar      = bar_char * bar_len
              sign     = "+" if d['netPosition'] >= 0 else ""
              print(f"  {curr:3s}  {sign}{d['netPosition']:>9,}  {bar}")

          if len(results) < 7:
              print("\n⚠️  Some currencies missing — check logs above")
              raise SystemExit(1)
          else:
              print("\n✅ All currencies saved successfully")
          EOFPYTHON

      - name: Display COT summary
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         COT POSITIONING SUMMARY — CFTC OFFICIAL           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          for currency in USD EUR GBP JPY AUD CAD CHF NZD; do
            if [ -f "cot-data/$currency.json" ]; then
              echo "[$currency]"
              python3 -c "
          import json
          with open('cot-data/$currency.json') as f:
              d = json.load(f)
          sign = '+' if d['netPosition'] >= 0 else ''
          print(f\"  Net Position : {sign}{d['netPosition']:,} contracts\")
          print(f\"  Long         : {d['longPositions']:,}\")
          print(f\"  Short        : {d['shortPositions']:,}\")
          print(f\"  Category     : {d['positionCategory']}\")
          print(f\"  Report Date  : {d['reportDate']}\")
          print(f\"  Source       : {d['source']}\")
          "
              echo ""
            else
              echo "[$currency] — ⚠️  No data file"
              echo ""
            fi
          done

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add cot-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 COT update $(date +'%Y-%m-%d') — CFTC official (all currencies)"
            git pull --rebase origin main || true
            git push
          fi
