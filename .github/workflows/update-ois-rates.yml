name: Update OIS / Overnight Rates

# Fetches OIS/overnight benchmark rates for all G8 currencies and writes
# ois-rates/rates.json to THIS (public) repo.
#
# Rate → benchmark (v5.0 — no-key primary sources for USD/GBP):
#   USD  SOFR (NY Fed API, no key → FRED fallback)      daily  ← v5.0
#   EUR  €STR (ECB via SDMX-JSON, no key)               daily
#   GBP  SONIA (BoE SDIE IUDSOIA, no key → FRED)        daily  ← v5.0
#   JPY  TONA (SNB zimoma, no key)                       monthly
#   AUD  AONIA = RBA Cash Rate (rates/AUD.json)          daily  ← v4.0: policy rate IS AONIA
#   CAD  CORRA (BoC Valet V122514, date-range params)    daily  ← v5.0: fixes stale dates
#   CHF  SARON (SNB data API, no key)                    weekly
#   NZD  NZONIA ≈ RBNZ OCR (rates/NZD.json)             daily  ← v4.0: OCR IS NZONIA ref rate
#
# v5.0 changes:
#   USD: NY Fed SOFR API (markets.newyorkfed.org, no key) added as primary.
#        FRED SOFR/DFF retained as secondary. Eliminates FRED 504 failures for USD.
#   GBP: BoE SDIE IUDSOIA (no key, same endpoint as fetch_bond_yields.py) added as
#        primary. FRED IUDSOIA retained as secondary. Eliminates FRED 504 failures for GBP.
#   CAD: BoC Valet call switched from params={'recent': 3} to start_date/end_date
#        date-range (6-week window). 'recent=3' was returning stale monthly observations
#        (e.g. 2026-03-01 on 2026-05-29). Date-range params match fetch_bond_yields.py.
#   FRED timeout: 15s → 8s for faster fallthrough on 504 gateway timeouts.
#
# AUD/NZD industry-standard rationale (v4.0):
#   AONIA is defined by AFMA as identical to the RBA Cash Rate. Bloomberg and
#   Refinitiv both use RBA Cash Rate as the AUD RFR in CIP forward calculators.
#   NZONIA (NZFBF compound index) tracks the RBNZ OCR with ±5bp precision; the
#   OCR is the institutional NZD RFR proxy used when NZFBF is not available.
#   Previous FRED OECD monthly sources lagged by 4-6 weeks, introducing
#   systematic forward mispricing of 14-39bp (AUD) and 10-25bp (NZD).
#
# All primary sources are public — no API keys required.
# FRED_API_KEY is used as secondary fallback for USD/GBP only.
# Public repo → unlimited GitHub Actions minutes.
#
# Consumed by:
#   dashboard2.js → loadOISRatesCache() → computeCIPForward()
#   Replaces CB policy rates in the CIP forward calculator.
#   Policy rates (rates/*.json) remain unchanged — used for CB Rates panel,
#   carry ranking, and regime scoring. OIS rates are ONLY used for forward pricing.
#
# Schedule: 23:15 UTC daily — 15 min after update-bond-yields (23:00 UTC)
# Fallback: if primary source fails, script falls back to rates/*.json (policy rate)
#           so forwards remain valid (if slightly less precise) on data outages.

on:
  schedule:
    - cron: '15 23 * * *'   # 23:15 UTC daily
  workflow_dispatch:

concurrency:
  group: update-ois-rates
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-ois-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create output directory
        run: mkdir -p ois-rates

      - name: Fetch OIS rates
        env:
          SITE_DIR: .
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python3 scripts/fetch_ois_rates.py

      - name: Display summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "         OIS / OVERNIGHT RATES"
          echo "========================================"
          if [ -f "ois-rates/rates.json" ]; then
            python3 -c "
          import json
          with open('ois-rates/rates.json') as f:
              d = json.load(f)
          print(f'  Updated: {d[\"updated\"]}')
          print()
          for ccy in ['USD','EUR','GBP','JPY','AUD','CAD','CHF','NZD']:
              rate = d['rates'].get(ccy, 'N/A')
              src  = d['sources'].get(ccy, '?')
              dt   = d['dates'].get(ccy, '?')
              print(f'  {ccy}: {str(rate):>8}%  [{src}]  ({dt})')
          "
          else
            echo "  ois-rates/rates.json not found"
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp ois-rates/rates.json /tmp/ois_rates_fresh.json
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            mkdir -p ois-rates
            cp /tmp/ois_rates_fresh.json ois-rates/rates.json
            git add ois-rates/rates.json
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "OIS rates ${TIMESTAMP} (SOFR/ESTR/SONIA/TONA/AONIA/CORRA/SARON/OCR)"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data will refresh on next run."
          exit 0
