name: Update OIS Rates

on:
  schedule:
    # Daily at 23:15 UTC (15 min after bond yields workflow)
    - cron: '15 23 * * *'
  workflow_dispatch:

jobs:
  fetch-ois-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: GlobalInvesting/globalinvesting.github.io
          token: ${{ secrets.PAT_TOKEN }}
          path: site

      - name: Fetch OIS rates
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SITE_DIR: ./site
        run: python3 scripts/fetch_ois_rates.py

      - name: Print summary
        run: |
          echo ""
          echo "========================================"
          echo "         OIS / OVERNIGHT RATES"
          echo "========================================"
          python3 -c "
          import json
          with open('./site/ois-rates/rates.json') as f:
              d = json.load(f)
          print(f'  Updated: {d[\"updated\"]}')
          for ccy in d['rates']:
              print(f'  {ccy}:  {d[\"rates\"][ccy]}%  [{d[\"sources\"][ccy]}]  ({d[\"dates\"][ccy]})')
          "

      - name: Commit and push to site repo
        run: |
          cd site
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Attempt $attempt ---"
            git fetch origin main
            git reset --hard origin/main

            # Re-run fetch so the file is fresh after reset
            if [ $attempt -gt 1 ]; then
              cd ..
              SITE_DIR=./site FRED_API_KEY=${{ secrets.FRED_API_KEY }} python3 scripts/fetch_ois_rates.py
              cd site
            fi

            TIMESTAMP=$(python3 -c "import json; d=json.load(open('ois-rates/rates.json')); print(d['updated'][:16].replace('T',' '))" 2>/dev/null || date -u '+%Y-%m-%d %H:%M')
            git add ois-rates/rates.json
            git diff --cached --quiet && echo "No changes to commit." && break

            git commit -m "OIS rates ${TIMESTAMP} UTC (SOFR/ESTR/SONIA/TONA/AONIA/CORRA/SARON/OCR)"
            git push origin main && echo "✅ Push succeeded on attempt $attempt." && break

            echo "Push failed — retrying in 10s..."
            sleep 10
          done
