name: Run Backtest Evaluation (Retrospectivo)

# Runs every Monday at 09:00 UTC — after save-weekly-scores (08:00) has run
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      min_diff:
        description: 'Diferencial mínimo de score para incluir un par (default: 12)'
        required: false
        default: '12'
      windows:
        description: 'Ventanas de evaluación en semanas (default: 1,2,4,6)'
        required: false
        default: '1,2,4,6'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run backtest
        run: |
          MIN_DIFF="${{ github.event.inputs.min_diff || '12' }}"
          WINDOWS="${{ github.event.inputs.windows || '1,2,4,6' }}"
          python3 scripts/backtest_retrospective.py --min-diff $MIN_DIFF --windows $WINDOWS

      - name: Commit and push results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add backtest-results/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Backtest results $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
