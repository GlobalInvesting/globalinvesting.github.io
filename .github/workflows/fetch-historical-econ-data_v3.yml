name: Fetch Historical Economic Data v3.0

# Scraper de datos históricos de Trading Economics con Playwright/Chromium.
# v3.0: Fixes para gdpGrowth/inflation (protegidos), timeout de EUR,
#       y rotación de contexto de browser cada 15 requests.
#
# PRIMER RUN (manual): workflow_dispatch sin parámetros → descarga todo (~40-50 min)
# RUNS SEMANALES (automático): lunes 05:00 UTC con --skip-existing → solo actualiza

on:
  workflow_dispatch:
    inputs:
      currency:
        description: 'Divisa (vacío = todas: USD EUR GBP JPY AUD CAD CHF NZD)'
        required: false
        default: ''
      indicator:
        description: 'Indicador (vacío = todos)'
        required: false
        default: ''
      skip_existing:
        description: 'Saltar con datos ≥20 obs existentes (true/false)'
        required: false
        default: 'false'
      retry_failed:
        description: 'Solo reintentar indicadores que fallaron (true/false)'
        required: false
        default: 'false'
  schedule:
    # Lunes 05:00 UTC — antes del update-economic-data diario (06:00 UTC)
    - cron: '0 5 * * 1'

jobs:
  fetch-historical-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install playwright requests python-dateutil beautifulsoup4 lxml \
            --break-system-packages

      - name: Install Chromium via Playwright
        run: playwright install chromium --with-deps

      - name: Create output directory
        run: mkdir -p economic-data-history

      - name: Build CLI args
        id: args
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.currency }}" ]; then
            ARGS="$ARGS --currency ${{ github.event.inputs.currency }}"
          fi
          if [ -n "${{ github.event.inputs.indicator }}" ]; then
            ARGS="$ARGS --indicator ${{ github.event.inputs.indicator }}"
          fi
          if [ "${{ github.event.inputs.skip_existing }}" = "true" ]; then
            ARGS="$ARGS --skip-existing"
          fi
          # Runs programados: siempre skip-existing (solo actualiza)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --skip-existing"
          fi
          echo "cli_args=$ARGS" >> $GITHUB_OUTPUT
          echo "Args finales: $ARGS"

      # ── Run principal ──────────────────────────────────────────────────────
      - name: Run historical scraper (main pass)
        id: main_run
        run: |
          python3 -u scripts/fetch_historical_econ_data.py ${{ steps.args.outputs.cli_args }} \
            2>&1 | tee /tmp/scraper_output.txt
          
          # Contar fallos
          ERRORS=$(grep -c "Sin datos\|✗ Sin datos" /tmp/scraper_output.txt || echo "0")
          echo "error_count=$ERRORS" >> $GITHUB_OUTPUT
          echo "Indicadores sin datos: $ERRORS"

      # ── Retry automático para indicadores protegidos (gdpGrowth, inflation) ─
      - name: Retry protected indicators if needed
        if: steps.main_run.outputs.error_count > 0
        run: |
          echo "=== Retrying protected indicators that failed ==="
          
          # Esperar antes del retry (permite que TE libere el rate-limit)
          sleep 30
          
          # Extraer qué moneda/indicador falló del output
          FAILED=$(grep "Sin datos para" /tmp/scraper_output.txt | \
            sed 's/.*Sin datos para //' | sort -u)
          
          if [ -z "$FAILED" ]; then
            echo "No hay fallos específicos identificados"
            exit 0
          fi
          
          echo "Indicadores fallidos detectados:"
          echo "$FAILED"
          
          # Retry por indicador con pausa entre cada uno
          while IFS= read -r ITEM; do
            CURRENCY=$(echo "$ITEM" | cut -d/ -f1)
            INDICATOR=$(echo "$ITEM" | cut -d/ -f2)
            if [ -n "$CURRENCY" ] && [ -n "$INDICATOR" ]; then
              echo ""
              echo "--- Retry: $CURRENCY / $INDICATOR ---"
              python3 -u scripts/fetch_historical_econ_data.py \
                --currency "$CURRENCY" \
                --indicator "$INDICATOR" || true
              sleep 15
            fi
          done <<< "$FAILED"

      # ── Resumen de cobertura ──────────────────────────────────────────────
      - name: Show data coverage summary
        run: |
          python3 -u scripts/fetch_historical_econ_data.py --summary

      # ── Commit ──────────────────────────────────────────────────────────────
      - name: Commit and push historical data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add economic-data-history/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            ERRORS=${{ steps.main_run.outputs.error_count }}
            git commit -m "Historical econ data $(date +'%Y-%m-%d') v3.0 — ${COUNT} files, ${ERRORS} errors"
            git pull --rebase origin main || true
            git push
          fi

      # ── Alerta si hay muchos fallos ───────────────────────────────────────
      - name: Fail if too many errors
        if: steps.main_run.outputs.error_count > 20
        run: |
          echo "ERROR: Demasiados indicadores fallidos (${{ steps.main_run.outputs.error_count }})"
          echo "Posible bloqueo de TE o cambio en la estructura del sitio."
          echo "Revisa los logs y considera ejecutar manualmente por partes:"
          echo "  --currency USD --indicator gdpGrowth"
          exit 1
