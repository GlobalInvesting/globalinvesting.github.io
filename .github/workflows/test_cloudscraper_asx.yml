name: test-investing-com-aud-ib-v5

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper requests --break-system-packages

      - name: Write test script
        run: |
          cat > test_investing5.py << 'PYEOF'
          import cloudscraper, json, datetime

          scraper = cloudscraper.create_scraper(
              browser={"browser": "chrome", "platform": "linux", "mobile": False}
          )

          API_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "X-Requested-With": "XMLHttpRequest",
              "domain-id": "www",
              "Referer": "https://www.investing.com/rates-bonds/aud-30-day-interbank",
          }

          # Instrument ID confirmed from browser DevTools: 8980
          INST_ID = 8980

          # RBA meeting schedule 2026 - needed for probability formula
          # Formula: X = r_t*(n_b/N) + [p*(r_t+/-0.25) + (1-p)*r_t]*(n_a/N)
          # X = implied yield from futures = 100 - price
          # r_t = current RBA rate
          # n_b = days in contract month BEFORE meeting
          # n_a = days in contract month AFTER meeting (inclusive)
          # N = total days in contract month

          RBA_RATE = 4.10  # current as of May 2026
          # Next meeting: June 16-17, 2026 -> decision June 17
          NEXT_MTG = datetime.date(2026, 6, 17)

          print("=== Test 1: Fetch current price for instrument 8980 ===")
          try:
              url = f"https://api.investing.com/api/financialdata/{INST_ID}/historical/chart/?interval=P1D&pointscount=160"
              r = scraper.get(url, headers=API_HEADERS, timeout=20)
              print(f"  Status: {r.status_code}  CT: {r.headers.get('Content-Type','?')[:50]}")

              if r.status_code == 200:
                  d = r.json()
                  pts = d.get("data", [])
                  print(f"  Data points: {len(pts)}")

                  if pts:
                      # Format: [timestamp_ms, open, high, low, close, volume, ?]
                      last = pts[-1]
                      ts = datetime.datetime.fromtimestamp(last[0]/1000, tz=datetime.timezone.utc)
                      price = last[4]  # close
                      implied_yield = 100 - price
                      print(f"  Last candle: {ts.date()}  close={price}  implied_yield={implied_yield:.4f}%")
                      print(f"  RBA rate: {RBA_RATE}%")
                      print(f"  Spread (implied - RBA): {implied_yield - RBA_RATE:+.4f}%")

                      # Print last 5 candles to verify
                      print(f"\n  Last 5 candles:")
                      for pt in pts[-5:]:
                          t = datetime.datetime.fromtimestamp(pt[0]/1000, tz=datetime.timezone.utc)
                          print(f"    {t.date()}  close={pt[4]}  implied={100-pt[4]:.4f}%")

                      # Calculate meeting probability using ASX formula
                      # Contract month = June 2026
                      contract_month_start = datetime.date(2026, 6, 1)
                      contract_month_end = datetime.date(2026, 6, 30)
                      N = (contract_month_end - contract_month_start).days + 1  # 30
                      n_b = (NEXT_MTG - contract_month_start).days  # days before decision
                      n_a = N - n_b  # days after (including decision day)

                      X = implied_yield / 100
                      r_t = RBA_RATE / 100

                      print(f"\n  === ASX Probability Formula ===")
                      print(f"  Contract: June 2026  N={N}  n_b={n_b}  n_a={n_a}")
                      print(f"  X (implied yield) = {X:.6f}")
                      print(f"  r_t (RBA) = {r_t:.6f}")

                      # For CUT scenario (r_t+1 = r_t - 0.0025)
                      r_cut = r_t - 0.0025
                      # X = r_t*(n_b/N) + [p*r_cut + (1-p)*r_t]*(n_a/N)
                      # X = r_t*(n_b/N) + [r_t + p*(r_cut - r_t)]*(n_a/N)
                      # X - r_t*(n_b/N) - r_t*(n_a/N) = p*(r_cut - r_t)*(n_a/N)
                      # X - r_t = p*(r_cut - r_t)*(n_a/N)
                      # p = (X - r_t) / ((r_cut - r_t) * (n_a/N))
                      denom_cut = (r_cut - r_t) * (n_a / N)
                      p_cut = (X - r_t) / denom_cut if denom_cut != 0 else 0
                      p_cut = max(0.0, min(1.0, p_cut))

                      # For HIKE scenario (r_t+1 = r_t + 0.0025)
                      r_hike = r_t + 0.0025
                      denom_hike = (r_hike - r_t) * (n_a / N)
                      p_hike = (X - r_t) / denom_hike if denom_hike != 0 else 0
                      p_hike = max(0.0, min(1.0, p_hike))

                      print(f"\n  Cut probability  (to {RBA_RATE-0.25:.2f}%): {p_cut*100:.1f}%")
                      print(f"  Hike probability (to {RBA_RATE+0.25:.2f}%): {p_hike*100:.1f}%")
                      print(f"  Hold probability: {(1-max(p_cut,p_hike))*100:.1f}%")

                      if p_cut > 0.5:
                          print(f"  --> BIAS: cut ({p_cut*100:.0f}%)")
                      elif p_hike > 0.5:
                          print(f"  --> BIAS: hike ({p_hike*100:.0f}%)")
                      else:
                          print(f"  --> BIAS: hold")
              else:
                  print(f"  Body: {r.text[:300]}")
          except Exception as e:
              print(f"  ERROR: {e}")
              import traceback; traceback.print_exc()
          PYEOF

      - name: Run test
        run: python3 test_investing5.py
