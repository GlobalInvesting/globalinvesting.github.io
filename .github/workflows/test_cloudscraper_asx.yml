name: test-cloudscraper-asx-ib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper --break-system-packages

      - name: Test ASX endpoints via cloudscraper
        run: |
          python3 << 'EOFPYTHON'
          import cloudscraper, json

          scraper = cloudscraper.create_scraper(
              browser={'browser': 'chrome', 'platform': 'linux', 'mobile': False}
          )

          # Probe multiple candidate ASX URLs for the IB curve data
          urls = [
              # Original (devolvió 404)
              'https://www.asx.com.au/data/trt/ib_expectation_curve_0.json',
              # Variantes comunes tras migraciones ASX
              'https://www.asx.com.au/data/trt/ib_expectation_curve.json',
              'https://www.asx.com.au/data/trt/ib_expectation_curve_1.json',
              'https://www.asx.com.au/data/trt/TargetRateTracker.json',
              # API markitdigital que usa el Rate Tracker de ASX internamente
              'https://asx.api.markitdigital.com/asx-research/1.0/derivatives/interest-rates/interbank-cash-rate/curve',
              'https://asx.api.markitdigital.com/asx-research/1.0/derivatives/interest-rates/IB/curve',
              'https://asx.api.markitdigital.com/asx-research/1.0/derivatives/interest-rates/IB/futures',
              # PDF (a veces accesible cuando el JSON no lo es)
              'https://www.asx.com.au/data/trt/ib_expectation_curve_graph.pdf',
          ]

          for url in urls:
              try:
                  r = scraper.get(url, timeout=15)
                  ct = r.headers.get('Content-Type', '')
                  body = r.text[:200].replace('\n', ' ')
                  print(f"[{r.status_code}] {url.split('asx.com.au/')[-1]}")
                  print(f"        CT={ct}  body={body[:120]}")
              except Exception as e:
                  print(f"[ERR] {url.split('/')[-1]}: {e}")
              print()
          EOFPYTHON
