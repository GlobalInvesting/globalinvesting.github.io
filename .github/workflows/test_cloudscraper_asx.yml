name: test-cloudscraper-asx-ib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper --break-system-packages

      - name: Intercept ASX Rate Tracker API calls
        run: |
          python3 << 'EOFPYTHON'
          import cloudscraper, re, json

          scraper = cloudscraper.create_scraper(
              browser={'browser': 'chrome', 'platform': 'linux', 'mobile': False}
          )

          # Step 1: Fetch the Rate Tracker page and extract all JS bundle URLs
          print("--- Step 1: Fetch Rate Tracker page ---")
          r = scraper.get(
              'https://www.asx.com.au/markets/trade-our-derivatives-market/futures-market/rba-rate-tracker',
              timeout=20
          )
          print(f"Status: {r.status_code}  Size: {len(r.text)}")

          # Extract all script src URLs
          scripts = re.findall(r'src=["\']([^"\']+\.js[^"\']*)["\']', r.text)
          print(f"JS bundles found: {len(scripts)}")
          for s in scripts:
              print(f"  {s}")

          # Also look for any API URLs directly in the HTML
          api_hints = re.findall(r'(https?://[^\s"\'<>]+(?:api|data|json|curve|futures|interbank)[^\s"\'<>]*)', r.text, re.I)
          print(f"\nAPI hints in HTML: {len(api_hints)}")
          for h in api_hints[:20]:
              print(f"  {h}")

          print()

          # Step 2: Fetch the main JS bundle and search for API endpoints
          print("--- Step 2: Search JS bundles for API endpoints ---")
          for script_url in scripts[:5]:  # check first 5 bundles
              if not script_url.startswith('http'):
                  script_url = 'https://www.asx.com.au' + script_url
              try:
                  jr = scraper.get(script_url, timeout=15)
                  if jr.status_code == 200:
                      # Search for markitdigital or other API URLs
                      endpoints = re.findall(
                          r'["\`]((?:https?://)?[^\s"\'`]+(?:markitdigital|api\.asx|data/trt|interbank|IB)[^\s"\'`]*)["\`]',
                          jr.text, re.I
                      )
                      if endpoints:
                          print(f"\n  {script_url.split('/')[-1]}:")
                          for ep in set(endpoints)[:15]:
                              print(f"    {ep}")
              except Exception as e:
                  print(f"  ERR {script_url}: {e}")
          EOFPYTHON
