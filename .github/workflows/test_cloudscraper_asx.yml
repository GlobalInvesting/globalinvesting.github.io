name: test-cloudscraper-asx-ib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper pypdf2 pdfplumber --break-system-packages

      - name: Test 1 - Parse ASX IB curve PDF
        run: |
          python3 << 'EOFPYTHON'
          import cloudscraper, io, re

          scraper = cloudscraper.create_scraper(
              browser={'browser': 'chrome', 'platform': 'linux', 'mobile': False}
          )

          print("--- Fetching ASX IB expectation curve PDF ---")
          r = scraper.get(
              'https://www.asx.com.au/data/trt/ib_expectation_curve_graph.pdf',
              timeout=20
          )
          print(f"Status: {r.status_code}  Size: {len(r.content)} bytes")

          # Try pdfplumber first (better text extraction)
          try:
              import pdfplumber
              with pdfplumber.open(io.BytesIO(r.content)) as pdf:
                  for i, page in enumerate(pdf.pages):
                      text = page.extract_text()
                      print(f"\n--- Page {i+1} text ---")
                      print(text[:2000] if text else "(no text)")
          except Exception as e:
              print(f"pdfplumber error: {e}")
              # Fallback to PyPDF2
              try:
                  import PyPDF2
                  reader = PyPDF2.PdfReader(io.BytesIO(r.content))
                  for i, page in enumerate(reader.pages):
                      text = page.extract_text()
                      print(f"\n--- Page {i+1} text ---")
                      print(text[:2000] if text else "(no text)")
              except Exception as e2:
                  print(f"PyPDF2 error: {e2}")
          EOFPYTHON

      - name: Test 2 - Probe markitdigital API paths
        run: |
          python3 << 'EOFPYTHON'
          import cloudscraper, json

          scraper = cloudscraper.create_scraper(
              browser={'browser': 'chrome', 'platform': 'linux', 'mobile': False}
          )

          # Probe markitdigital systematically - we know it responds JSON (not Cloudflare block)
          # Try to find the correct path for IB futures data
          base = 'https://asx.api.markitdigital.com'
          paths = [
              '/asx-research/1.0/derivatives/interest-rates',
              '/asx-research/1.0/derivatives',
              '/asx-research/1.0/derivatives/futures/IB',
              '/asx-research/1.0/derivatives/futures?productCode=IB',
              '/asx-research/1.0/derivatives/futures?type=IB',
              '/asx-research/1.0/market/interest-rates/IB',
              '/asx-research/1.0/market/derivatives/IB',
              '/asx-research/1.0/products/IB',
              '/asx-research/1.0/products/futures/IB',
          ]

          for path in paths:
              try:
                  r = scraper.get(base + path, timeout=10)
                  body = r.text[:150].replace('\n',' ')
                  print(f"[{r.status_code}] {path}")
                  if r.status_code == 200:
                      print(f"  ✅ BODY: {body}")
                  else:
                      print(f"  {body}")
              except Exception as e:
                  print(f"[ERR] {path}: {e}")
          EOFPYTHON
