name: test-cloudscraper-asx-ib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper --break-system-packages

      - name: Probe rate_tracker_calc.htm and markitcdn JS
        run: |
          python3 << 'EOFPYTHON'
          import cloudscraper, re

          scraper = cloudscraper.create_scraper(
              browser={'browser': 'chrome', 'platform': 'linux', 'mobile': False}
          )

          # Test 1: rate_tracker_calc.htm - may contain raw data
          print("--- Test 1: rate_tracker_calc.htm ---")
          r = scraper.get(
              'https://www.asx.com.au/data/trt/rate_tracker_calc.htm',
              timeout=15
          )
          print(f"Status: {r.status_code}  CT: {r.headers.get('Content-Type','')}")
          print(f"Last-Modified: {r.headers.get('Last-Modified','not set')}")
          print(r.text[:3000])

          print()

          # Test 2: common.js from markitcdn - has the API endpoints hardcoded
          print("--- Test 2: markitcdn common.js API endpoints ---")
          r2 = scraper.get(
              'https://content.markitcdn.com/asx.markitdigital.com/js/common.js?v=45d2cb0245ec3d637b28c065d06d8bed94c6b642',
              timeout=20
          )
          print(f"Status: {r2.status_code}  Size: {len(r2.text)}")
          if r2.status_code == 200:
              # Find all API endpoint patterns
              endpoints = re.findall(
                  r'["\`](/[^\s"\'`]{5,80}(?:interbank|IB|futures|curve|cash.rate|rba|rate.tracker)[^\s"\'`]*)["\`]',
                  r2.text, re.I
              )
              print(f"API paths found: {len(endpoints)}")
              for ep in sorted(set(endpoints))[:30]:
                  print(f"  {ep}")

              # Also search for full URLs
              full_urls = re.findall(
                  r'["\`](https?://[^\s"\'`]{10,120}(?:interbank|IB|futures|curve|cash|rba)[^\s"\'`]*)["\`]',
                  r2.text, re.I
              )
              print(f"\nFull URLs found: {len(full_urls)}")
              for u in sorted(set(full_urls))[:20]:
                  print(f"  {u}")
          EOFPYTHON
