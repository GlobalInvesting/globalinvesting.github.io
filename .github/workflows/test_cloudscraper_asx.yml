name: test-cloudscraper-asx-ib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper --break-system-packages

      - name: Write test script
        run: |
          cat > test_asx.py << 'PYEOF'
          import cloudscraper, re

          scraper = cloudscraper.create_scraper(
              browser={"browser": "chrome", "platform": "linux", "mobile": False}
          )

          v = "45d2cb0245ec3d637b28c065d06d8bed94c6b642"
          bundles = [
              "https://content.markitcdn.com/asx.markitdigital.com/js/manifest.js?v=" + v,
              "https://content.markitcdn.com/asx.markitdigital.com/js/vendor.js?v=" + v,
              "https://content.markitcdn.com/asx.markitdigital.com/js/common.js?v=" + v,
          ]

          for url in bundles:
              name = url.split("/")[-1].split("?")[0]
              r = scraper.get(url, timeout=20)
              print("\n--- " + name + ": " + str(r.status_code) + " " + str(len(r.text)) + " bytes ---")
              if r.status_code != 200:
                  continue
              js = r.text

              paths = re.findall(r'"/(?:asx-research|api)[^"\s]{5,100}"', js)
              if paths:
                  print("REST paths (" + str(len(paths)) + "):")
                  for p in sorted(set(paths))[:20]:
                      print("  " + p)

              ib_ctx = re.findall(r'.{0,40}"IB".{0,40}', js)
              if ib_ctx:
                  print("IB contexts (" + str(len(ib_ctx)) + "):")
                  for c in ib_ctx[:10]:
                      print("  " + c.strip())

              keywords = re.findall(r'"[^"]{0,30}(?:interbank|cashrate|cash_rate|rba|RBA|TargetRate)[^"]{0,30}"', js)
              if keywords:
                  print("Keywords (" + str(len(keywords)) + "):")
                  for k in keywords[:10]:
                      print("  " + k.strip())

              mkit = re.findall(r'markitdigital\.com[^"\s]{0,80}', js)
              if mkit:
                  print("markitdigital refs (" + str(len(mkit)) + "):")
                  for m in sorted(set(mkit))[:15]:
                      print("  " + m)
          PYEOF

      - name: Run test script
        run: python3 test_asx.py
