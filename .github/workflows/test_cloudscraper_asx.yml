name: test-cloudscraper-asx-ib

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper pdfplumber --break-system-packages

      - name: Test PDF date and parse implied yields
        run: |
          python3 << 'EOFPYTHON'
          import cloudscraper, io, re
          from datetime import date

          scraper = cloudscraper.create_scraper(
              browser={'browser': 'chrome', 'platform': 'linux', 'mobile': False}
          )

          r = scraper.get(
              'https://www.asx.com.au/data/trt/ib_expectation_curve_graph.pdf',
              timeout=20
          )
          print(f"Status: {r.status_code}  Size: {len(r.content)} bytes")

          # Check HTTP headers for Last-Modified date
          print(f"Last-Modified: {r.headers.get('Last-Modified', 'not set')}")
          print(f"ETag: {r.headers.get('ETag', 'not set')}")
          print(f"Cache-Control: {r.headers.get('Cache-Control', 'not set')}")
          print(f"Date: {r.headers.get('Date', 'not set')}")
          print()

          import pdfplumber
          with pdfplumber.open(io.BytesIO(r.content)) as pdf:
              text = pdf.pages[0].extract_text()

          # Extract the "As at market close on DD Month YYYY" date
          date_match = re.search(r'As at market close on (.+?)(?:\n|$)', text)
          if date_match:
              print(f"PDF internal date: {date_match.group(1).strip()}")
          else:
              print("PDF date: NOT FOUND")

          print(f"Today: {date.today()}")
          print()

          # Extract month labels and implied yields
          # Format: "Jun-23 Jul-23 Aug-23 ..."  then "Implied Yield 4.015 4.170 ..."
          months_match = re.search(r'((?:[A-Z][a-z]{2}-\d{2}\s+){3,})', text)
          yields_match = re.search(r'Implied Yield\s+([\d\.\s]+)', text)

          if months_match and yields_match:
              months = months_match.group(1).strip().split()
              yields = [float(x) for x in yields_match.group(1).strip().split()]
              print(f"Months found: {months}")
              print(f"Yields found: {yields}")
              print()
              print("--- Implied curve ---")
              for m, y in zip(months, yields):
                  print(f"  {m}: {y:.3f}%")
          else:
              print("Could not parse months/yields")
              print("Raw text:")
              print(text)
          EOFPYTHON
