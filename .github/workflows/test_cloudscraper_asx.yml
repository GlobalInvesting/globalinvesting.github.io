name: test-investing-com-aud-ib-v4

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper requests --break-system-packages

      - name: Write test script
        run: |
          cat > test_investing4.py << 'PYEOF'
          import cloudscraper, re, json

          scraper = cloudscraper.create_scraper(
              browser={"browser": "chrome", "platform": "linux", "mobile": False}
          )

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,*/*",
              "Accept-Language": "en-US,en;q=0.9",
          }
          API_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)",
              "X-Requested-With": "XMLHttpRequest",
              "domain-id": "www",
              "Referer": "https://www.investing.com/rates-bonds/aud-30-day-interbank",
          }

          # Test 1: Find pair/instrument ID in raw HTML
          print("=== Test 1: Find instrument ID in page HTML ===")
          try:
              r = scraper.get(
                  "https://www.investing.com/rates-bonds/aud-30-day-interbank",
                  headers=HEADERS, timeout=20
              )
              print(f"  Status: {r.status_code}  Size: {len(r.text)}")
              patterns = [
                  (r'data-pair-id=["\']?(\d+)', "data-pair-id"),
                  (r'data-real-pid=["\']?(\d+)', "data-real-pid"),
                  (r'"pairId"\s*:\s*(\d+)', "pairId JSON"),
                  (r'"pid"\s*:\s*(\d+)', "pid JSON"),
                  (r'"instrument_id"\s*:\s*(\d+)', "instrument_id"),
                  (r'"instrumentId"\s*:\s*(\d+)', "instrumentId"),
                  (r'"pair_id"\s*:\s*(\d+)', "pair_id"),
                  (r'pairId=(\d+)', "pairId= URL"),
                  (r'/(\d{4,7})/historical', "ID in historical URL"),
                  (r'"id"\s*:\s*(\d{4,7})\b', "generic id field"),
              ]
              for pat, label in patterns:
                  hits = list(set(re.findall(pat, r.text)))
                  if hits:
                      print(f"  {label}: {hits[:5]}")

              # Dump 600 chars around "95." to find where the price lives
              for match in re.finditer(r'95\.\d{2}', r.text):
                  start = max(0, match.start() - 150)
                  end = min(len(r.text), match.end() + 150)
                  print(f"\n  Context around '95.xx' at {match.start()}:")
                  print(f"  {repr(r.text[start:end])}")
                  break
          except Exception as e:
              print(f"  ERROR: {e}")

          # Test 2: investing.com legacy AJAX search (returns pair IDs)
          print()
          print("=== Test 2: Legacy AJAX search ===")
          legacy_urls = [
              "https://www.investing.com/search/service/searchTopBar?search_text=aud+30+day+interbank&tab=bonds",
              "https://www.investing.com/search/service/searchTopBar?search_text=aud+interbank&tab=futures",
              "https://www.investing.com/search/service/searchTopBar?search_text=30+day+interbank",
          ]
          for url in legacy_urls:
              try:
                  r = scraper.get(url, headers=API_HEADERS, timeout=15)
                  print(f"  [{r.status_code}] ...{url[50:]}")
                  print(f"    CT: {r.headers.get('Content-Type','?')[:60]}")
                  print(f"    Body[:600]: {r.text[:600]}")
              except Exception as e:
                  print(f"  ERROR: {e}")

          # Test 3: Try the Webmaster API / sitemap approach
          # investing.com exposes a quotes endpoint with symbol name
          print()
          print("=== Test 3: Symbol-based quote endpoints ===")
          symbol_urls = [
              "https://api.investing.com/api/financialdata/assets/655527",
              "https://api.investing.com/api/financialdata/assets/8836",
              "https://www.investing.com/common/quotes/quotes_summary_secondary_data.php?pairs_ids=8836&action=get_pairs_data",
              "https://www.investing.com/common/quotes/quotes_summary_secondary_data.php?pairs_ids=655527&action=get_pairs_data",
          ]
          for url in symbol_urls:
              try:
                  r = scraper.get(url, headers=API_HEADERS, timeout=15)
                  print(f"  [{r.status_code}] {url[40:85]}")
                  print(f"    Body[:300]: {r.text[:300]}")
              except Exception as e:
                  print(f"  ERROR: {e}")

          # Test 4: Probe a broad range of IDs looking for 95.x price (AUD IB range)
          print()
          print("=== Test 4: Broad ID scan for 95.x price ===")
          candidates = []
          # Scan IDs 950000-950050 and some known futures ranges
          test_ids = list(range(950000, 950020)) + list(range(44300, 44360)) + \
                     list(range(1172000, 1172020)) + [655527, 655528, 655529, 655530]
          for inst_id in test_ids:
              try:
                  url = f"https://api.investing.com/api/financialdata/{inst_id}/historical/chart/?period=P1W&pointscount=60"
                  r = scraper.get(url, headers=API_HEADERS, timeout=8)
                  if r.status_code == 200:
                      d = r.json()
                      pts = d.get("data", [])
                      if pts:
                          last_close = pts[-1][4]
                          if 94.5 < last_close < 96.5:
                              print(f"  *** HIT ID {inst_id}: last_close={last_close}  implied={100-last_close:.3f}%  <-- AUD IB!")
                              candidates.append((inst_id, last_close))
              except Exception:
                  pass

          if not candidates:
              print("  No hits in 95.x range found")
          PYEOF

      - name: Run test
        run: python3 test_investing4.py
