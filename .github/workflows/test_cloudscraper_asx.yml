name: test-investing-com-aud-ib-v2

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install cloudscraper requests --break-system-packages

      - name: Write test script
        run: |
          cat > test_investing2.py << 'PYEOF'
          import cloudscraper, requests, json, re, datetime

          scraper = cloudscraper.create_scraper(
              browser={"browser": "chrome", "platform": "linux", "mobile": False}
          )

          BASE_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "application/json, text/plain, */*",
              "Accept-Language": "en-US,en;q=0.9",
              "domain-id": "www",
              "Referer": "https://www.investing.com/rates-bonds/aud-30-day-interbank",
          }

          # -- Test 1: Fix the chart API with valid pointscount values --
          print("=== Test 1: api.investing.com chart (instrument 8836) ===")
          for pc in [60, 120]:
              url = f"https://api.investing.com/api/financialdata/8836/historical/chart/?period=P1W&pointscount={pc}"
              try:
                  r = scraper.get(url, headers=BASE_HEADERS, timeout=20)
                  print(f"  pointscount={pc}: status={r.status_code} CT={r.headers.get('Content-Type','?')[:50]}")
                  print(f"  Body[:400]: {r.text[:400]}")
              except Exception as e:
                  print(f"  ERROR pc={pc}: {e}")

          # -- Test 2: Search investing.com for AUD IB futures instrument IDs --
          # Their search API is publicly known
          print()
          print("=== Test 2: Investing.com search for AUD IB futures contracts ===")
          search_url = "https://api.investing.com/api/search/v2/search/?q=AUD+30+day+interbank&t=Bonds&limit=10"
          try:
              r = scraper.get(search_url, headers=BASE_HEADERS, timeout=20)
              print(f"  Status: {r.status_code}  CT: {r.headers.get('Content-Type','?')[:50]}")
              print(f"  Body[:800]: {r.text[:800]}")
          except Exception as e:
              print(f"  ERROR: {e}")

          # -- Test 3: Try known investing.com quote API directly --
          print()
          print("=== Test 3: Investing.com quotes API ===")
          quote_urls = [
              "https://api.investing.com/api/financialdata/quotes?pairIds=8836&fields=last_close,last_numeric&c=1",
              "https://api.investing.com/api/financialdata/8836?fields=last_close,last_numeric",
          ]
          for url in quote_urls:
              try:
                  r = scraper.get(url, headers=BASE_HEADERS, timeout=20)
                  print(f"  [{r.status_code}] {url[45:80]}")
                  print(f"    Body[:400]: {r.text[:400]}")
              except Exception as e:
                  print(f"  ERROR: {e}")

          # -- Test 4: Try the Next.js __NEXT_DATA__ from the page --
          # (same approach that works for NZFBF)
          print()
          print("=== Test 4: Next.js __NEXT_DATA__ from quote page ===")
          try:
              r = scraper.get(
                  "https://www.investing.com/rates-bonds/aud-30-day-interbank",
                  headers={**BASE_HEADERS, "Accept": "text/html"},
                  timeout=20
              )
              print(f"  Status: {r.status_code}")
              nd = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.*?)</script>', r.text, re.S)
              if nd:
                  data = json.loads(nd.group(1))
                  print(f"  __NEXT_DATA__ found! Keys: {list(data.keys())}")
                  # Try to find price
                  s = json.dumps(data)
                  prices = re.findall(r'"(?:last|price|close|bid|ask)"\s*:\s*([\d.]+)', s)
                  print(f"  Price-like values: {prices[:10]}")
              else:
                  print("  No __NEXT_DATA__ found")
                  # Try to find any JSON with price data
                  json_blobs = re.findall(r'window\.__.*?=\s*({.*?});', r.text[:5000], re.S)
                  print(f"  window.__ blobs: {len(json_blobs)}")
          except Exception as e:
              print(f"  ERROR: {e}")
          PYEOF

      - name: Run test
        run: python3 test_investing2.py
