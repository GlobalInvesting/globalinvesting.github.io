name: Update ForexFactory Calendar

# Runs 4×/day covering major session opens.
# Scrapes ForexFactory HTML calendar (with real-time actuals) using Playwright
# and writes calendar-data/ff_calendar.json to THIS (public) repo.
#
# v2.0 (2026-05-22): Migrated from FF JSON API (nfs.faireconomy.media) to HTML
# scraping via Playwright. The FF JSON API never populated actual values — it is
# a planning feed only. The HTML page shows actuals in real-time as events release.
#
# Uses GITHUB_TOKEN (native) — no PAT_TOKEN required.
# Public repos have unlimited GitHub Actions minutes → no budget impact.
# Playwright/Chromium install adds ~2 min to each run (acceptable).
#
# Schedule (4× daily UTC — major session windows):
#   00:30 — before Tokyo open
#   06:30 — before London open (catches early EU data actuals)
#   12:30 — before New York open (catches EU/morning US actuals)
#   20:30 — before Sydney open (catches US afternoon actuals)

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 6 * * *'
    - cron: '30 12 * * *'
    - cron: '30 20 * * *'
  workflow_dispatch:

concurrency:
  group: update-ff-calendar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-ff-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # increased from 10 — Playwright install + headless render
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git fetch origin main && git rebase origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 --break-system-packages
          playwright install chromium --with-deps

      - name: Create calendar-data directory
        run: mkdir -p calendar-data

      - name: Fetch ForexFactory calendar
        run: python scripts/fetch_ff_calendar.py

      - name: Display summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "       FF CALENDAR FETCH SUMMARY"
          echo "========================================"
          if [ -f "calendar-data/ff_calendar.json" ]; then
            python3 -c "
          import json
          from datetime import datetime, timezone
          with open('calendar-data/ff_calendar.json') as f:
              cal = json.load(f)
          events = cal.get('events', [])
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          released_all = [e for e in events if e.get('released')]
          high = [e for e in events if e['impact'] == 'high']
          today_high = [e for e in high if e['dateISO'] == today]
          released_today = [e for e in today_high if e['released']]
          pending_today  = [e for e in today_high if not e['released']]
          print(f'  Total events: {len(events)} | with actuals: {len(released_all)}')
          print(f'  High-impact today ({today}): {len(today_high)} ({len(released_today)} released, {len(pending_today)} pending)')
          for e in today_high:
              status = e.get('actual') or 'pending'
              print(f'    {e[\"timeUTC\"]} [{e[\"currency\"]}] {e[\"title\"]} | {status}')
          "
          else
            echo "  ff_calendar.json not found — fetch may have failed"
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp calendar-data/ff_calendar.json /tmp/ff_calendar_fresh.json
          RELEASED=$(python3 -c "import json; c=json.load(open('/tmp/ff_calendar_fresh.json')); print(sum(1 for e in c['events'] if e.get('released')))" 2>/dev/null || echo '?')
          HIGH=$(python3 -c "import json; c=json.load(open('/tmp/ff_calendar_fresh.json')); print(sum(1 for e in c['events'] if e['impact']=='high'))" 2>/dev/null || echo '?')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/ff_calendar_fresh.json calendar-data/ff_calendar.json
            git add calendar-data/ff_calendar.json
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "FF calendar ${TIMESTAMP} — ${HIGH} high-impact, ${RELEASED} with actuals"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data refreshes on next scheduled run."
          exit 0
