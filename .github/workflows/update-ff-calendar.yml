name: Update ForexFactory Calendar
# PUBLIC STUB — all triggers + time-gate live here.
# Fetch/commit logic lives in the private reusable workflow.
#
# TWO-TIER TRIGGER ARCHITECTURE (v5.0)
# TIER 1 — Cloudflare Worker (primary, ~2–3 min latency):
#   calendar-watcher.js fires repository_dispatch[calendar-data-changed] here.
# TIER 2 — GitHub Actions cron (fallback, ~5–15 min latency).
on:
  repository_dispatch:
    types: [calendar-data-changed]
  schedule:
    - cron: '*/5 * * * *'
    - cron: '30 2 * * *'
    - cron: '0 3 * * *'
    - cron: '30 3 * * *'
    - cron: '0 4 * * *'
    - cron: '30 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '30 10 * * *'
    - cron: '0 11 * * *'
    - cron: '30 11 * * *'
    - cron: '30 15 * * *'
    - cron: '0 16 * * *'
    - cron: '30 16 * * *'
    - cron: '0 17 * * *'
    - cron: '30 17 * * *'
    - cron: '0 18 * * *'
    - cron: '30 18 * * *'
    - cron: '0 19 * * *'
    - cron: '30 19 * * *'
    - cron: '0 20 * * *'
    - cron: '30 20 * * *'
    - cron: '0 21 * * *'
    - cron: '30 21 * * *'
    - cron: '0 22 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-ff-calendar
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
      is_dispatch: ${{ steps.gate.outputs.is_dispatch }}
    steps:
      - name: Time-window gate (release windows only for */5 runs)
        id: gate
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "repository_dispatch" ]; then
            DESC="${{ github.event.client_payload.description }}"
            SRC="${{ github.event.client_payload.source }}"
            echo "Triggered by repository_dispatch (${SRC}): ${DESC}"
            echo "run=true" >> $GITHUB_OUTPUT
            echo "is_dispatch=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "is_dispatch=false" >> $GITHUB_OUTPUT
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          echo "Current UTC time: ${HOUR}:${MIN}"
          if [ $(( 10#$MIN % 5 )) -ne 0 ]; then
            echo "Sparse off-peak cron — proceeding."
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          HOUR_INT=$(( 10#$HOUR ))
          if [ $HOUR_INT -ge 22 ] || [ $HOUR_INT -lt 2 ] || \
             ( [ $HOUR_INT -eq 2 ] && [ $(( 10#$MIN )) -lt 30 ] ); then
            echo "Asia/NZ window — proceeding."
            echo "run=true" >> $GITHUB_OUTPUT; exit 0
          fi
          if ( [ $HOUR_INT -eq 5 ] && [ $(( 10#$MIN )) -ge 30 ] ) || \
             ( [ $HOUR_INT -ge 6 ] && [ $HOUR_INT -lt 10 ] ); then
            echo "EU/UK window — proceeding."
            echo "run=true" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ $HOUR_INT -ge 12 ] && \
             ( [ $HOUR_INT -lt 15 ] || ( [ $HOUR_INT -eq 15 ] && [ $(( 10#$MIN )) -le 30 ] ) ); then
            echo "US window — proceeding."
            echo "run=true" >> $GITHUB_OUTPUT; exit 0
          fi
          echo "Off-peak — skipping."
          echo "run=false" >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    uses: GlobalInvesting/globalinvesting-scripts/.github/workflows/update-ff-calendar.yml@main
    with:
      is_dispatch: ${{ needs.gate.outputs.is_dispatch == 'true' }}
    secrets: inherit
