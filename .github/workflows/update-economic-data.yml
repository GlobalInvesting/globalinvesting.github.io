name: Update Economic Data - v11 (TE + ONS + OECD EUR + DE proxy + WorldBank)
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# FIX P-01: Lógica Python extraída a scripts/update_economic_data.py.
# El workflow ahora actúa como orquestador puro.
jobs:
  update-economic-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml --break-system-packages

      - name: Create data directory
        run: mkdir -p economic-data

      - name: Scrape economic data
        run: python3 -u scripts/update_economic_data.py

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add economic-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Economic data $(date +'%Y-%m-%d') - v11.4 C6 ToT bounds"
            git pull --rebase origin main || true
            git push
          fi
