name: Renew Myfxbook Token (Self-Hosted)

on:
  schedule:
    - cron: '0 6 */20 * *'   # every 20 days at 06:00 UTC (token lasts ~30 days)
  workflow_dispatch:           # also triggered automatically on token expiry

# Only one renewal at a time
concurrency:
  group: renew-myfxbook-token
  cancel-in-progress: false

jobs:
  renew-token:
    # Runs on YOUR PC (residential IP) — required for Myfxbook login
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Login to Myfxbook and obtain session token
        id: login
        shell: pwsh
        env:
          MYFXBOOK_EMAIL:    ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
        run: |
          $email    = [uri]::EscapeDataString($env:MYFXBOOK_EMAIL)
          $password = [uri]::EscapeDataString($env:MYFXBOOK_PASSWORD)
          $url      = "https://www.myfxbook.com/api/login.json?email=$email&password=$password"

          Write-Host "[Login] Calling Myfxbook login API from residential IP..."

          $response = Invoke-RestMethod -Uri $url -Method Get -UseBasicParsing `
            -Headers @{ "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" }

          if ($response.error -eq $true) {
            Write-Error "[Login] Login failed: $($response.message)"
            exit 1
          }

          $session = $response.session
          if (-not $session) {
            Write-Error "[Login] No session token in response."
            exit 1
          }

          Write-Host "[Login] Token obtained successfully."

          # Mask the token in logs
          Write-Host "::add-mask::$session"

          # Pass to next step via GITHUB_OUTPUT
          "SESSION_TOKEN=$session" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Update MYFXBOOK_SESSION secret in GitHub
        shell: pwsh
        env:
          GH_TOKEN:      ${{ secrets.PAT_TOKEN }}
          SESSION_TOKEN: ${{ steps.login.outputs.SESSION_TOKEN }}
          REPO:          ${{ github.repository }}
        run: |
          Write-Host "[Secret] Updating MYFXBOOK_SESSION in GitHub secrets..."

          # Use GitHub CLI (pre-installed with the runner, or install via winget)
          gh secret set MYFXBOOK_SESSION --body "$env:SESSION_TOKEN" --repo "$env:REPO"

          Write-Host "[Secret] MYFXBOOK_SESSION updated successfully."

      - name: Trigger sentiment fetch to verify new token
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          Write-Host "[Verify] Triggering sentiment fetch to validate new token..."
          gh workflow run update-myfxbook-sentiment.yml --repo "$env:REPO"
          Write-Host "[Verify] Fetch workflow dispatched."

      - name: Notify renewal success
        if: success()
        shell: pwsh
        run: |
          Write-Host "[Done] Token renewed successfully. Next scheduled renewal in 20 days."

      - name: Notify renewal failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          username:       ${{ secrets.NOTIFY_EMAIL_FROM }}
          password:       ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          from:           "FX Dashboard <${{ secrets.NOTIFY_EMAIL_FROM }}>"
          to:             ${{ secrets.NOTIFY_EMAIL_TO }}
          subject:        "❌ Myfxbook token renewal FAILED — manual action required"
          body: |
            The automatic Myfxbook token renewal failed.

            Please check the workflow run logs at:
            https://github.com/${{ github.repository }}/actions/workflows/renew-myfxbook-token.yml

            Manual fix: open this URL in your browser and copy the session
            token to GitHub Settings → Secrets → MYFXBOOK_SESSION:
            https://www.myfxbook.com/api/login.json?email=YOUR_EMAIL&password=YOUR_PASSWORD
