name: Update Extended Data (Bonds + Sentiment + Flows + rateMomentum) - v10 + C2 + C7

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

# FIX P-01: Lógica Python extraída a scripts/update_extended_data.py.
jobs:
  update-extended-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dateutil --break-system-packages

      - name: Create directory
        run: mkdir -p extended-data

      - name: Update extended data
        run: python3 -u scripts/update_extended_data.py

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add extended-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Extended data $(date +'%Y-%m-%d') — v10+C2+C7 bootstrap actualizado"
            git pull --rebase origin main || true
            git push
          fi
