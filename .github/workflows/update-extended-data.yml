name: Update Extended Data (Bonds + Sentiment + Flows + rateMomentum) - v10 + C2 + C7

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  update-extended-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dateutil --break-system-packages

      - name: Create directory
        run: mkdir -p extended-data

      - name: Scrape extended indicators
        run: |
          python3 << 'EOFPYTHON'
          import requests
          from bs4 import BeautifulSoup
          import json, re, os, time, csv
          from io import StringIO
          from datetime import date, datetime, timedelta

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
          }

          CURRENCIES = ['USD', 'EUR', 'GBP', 'JPY', 'CAD', 'AUD', 'CHF', 'NZD']

          COUNTRY_NAMES = {
              'USD': ['United States'],
              'EUR': ['Euro Area'],
              'GBP': ['United Kingdom'],
              'JPY': ['Japan'],
              'CAD': ['Canada'],
              'AUD': ['Australia'],
              'CHF': ['Switzerland'],
              'NZD': ['New Zealand']
          }

          TE_URLS = {
              'bond10y':               'https://tradingeconomics.com/country-list/government-bond-yield?continent=world',
              'consumerConfidence':    'https://tradingeconomics.com/country-list/consumer-confidence?continent=world',
              'businessConfidence':    'https://tradingeconomics.com/country-list/business-confidence?continent=world',
              'capitalFlows':          'https://tradingeconomics.com/country-list/capital-flows?continent=world',
              'fdi':                   'https://tradingeconomics.com/country-list/foreign-direct-investment?continent=world',
              'inflationExpectations': 'https://tradingeconomics.com/country-list/inflation-expectations?continent=world',
          }

          BONDS_MARKET_PAGE = 'https://tradingeconomics.com/bonds'

          # ── FX RATES ─────────────────────────────────────────────────────────────
          exchange_rates = {}

          def fetch_fx():
              global exchange_rates
              try:
                  r = requests.get('https://api.frankfurter.app/latest?from=USD', timeout=10)
                  if r.ok:
                      exchange_rates = r.json().get('rates', {})
                      exchange_rates['USD'] = 1.0
                      print(f"  ✅ FX rates loaded: {sorted(exchange_rates.keys())}")
                      return True
              except Exception as e:
                  print(f"  ⚠️ FX fetch failed: {e}")
              exchange_rates = {
                  'USD': 1.0, 'EUR': 0.92, 'GBP': 0.79, 'JPY': 150.0,
                  'CAD': 1.36, 'AUD': 1.57, 'CHF': 0.90, 'NZD': 1.67,
              }
              print("  ⚠️ Using fallback FX rates")
              return False

          # ── HELPERS ──────────────────────────────────────────────────────────────
          def clean_num(text):
              if not text: return None
              text = str(text).strip().replace(',','').replace('%','')
              m = re.search(r'(-?\d+\.?\d*)', text)
              return float(m.group(1)) if m else None

          def parse_te_date(date_text):
              if not date_text: return str(date.today())
              date_text = date_text.strip()
              try:
                  m = re.match(r'^([A-Za-z]{3})/(\d{2})$', date_text)
                  if m:
                      dt = datetime.strptime(f"{m.group(1)} 20{m.group(2)}", '%b %Y')
                      return dt.strftime('%Y-%m-15')
                  m = re.match(r'^([A-Za-z]{3})\s+(\d{4})$', date_text)
                  if m:
                      dt = datetime.strptime(f"{m.group(1)} {m.group(2)}", '%b %Y')
                      return dt.strftime('%Y-%m-15')
                  m = re.search(r'Q(\d)[/\s](\d{4})', date_text)
                  if m:
                      month = (int(m.group(1)) - 1) * 3 + 2
                      return f"{m.group(2)}-{month:02d}-15"
              except: pass
              return str(date.today())

          # ── C2 + C7: rateMomentum ─────────────────────────────────────────────────
          # C2: JPY usa ventana 24M para capturar ciclo completo BoJ (−0.1% → +0.75%)
          # C7: Bootstrap actualizado con tasas reales de hace 12/24M por divisa:
          #     JPY: -0.10% (ene-2024, NIRP vigente) → momentum real = 0.75 - (-0.10) = +0.85%
          #     CHF: 1.50%  (mar-2024, antes del recorte a 0%) → momentum = 0.25 - 1.50 = -1.25%
          #     AUD: 4.35%  (mar-2025, pausa RBA) → momentum = 4.10 - 4.35 = -0.25%
          #     CAD: 5.00%  (mar-2024, antes de los recortes BoC) → momentum = 3.00 - 5.00 = -2.00%
          #     NZD: 5.50%  (mar-2024, antes de los recortes RBNZ) → momentum = 3.50 - 5.50 = -2.00%
          #
          # ACTUALIZACIÓN REQUERIDA: Revisar BOOTSTRAP_FALLBACK cada 6 meses.
          # El campo old_date debe ser la fecha de la tasa hace ~12M (o 24M para JPY).
          # Si age_days > 400, el workflow emitirá warning automático.
          def scrape_rate_momentum():
              print(f"\n{'='*50}\nRATE MOMENTUM (v10+C2+C7 — TE API guest + FRED + bootstrap actualizado)\n{'='*50}")
              print(f"  C2: JPY usa ventana 24M para capturar ciclo completo BoJ (−0.1%→+0.75%)")
              print(f"  C7: Bootstrap actualizado con tasas reales por divisa (2024-2026)")
              momentum = {}
              momentum_dates = {}
              momentum_source = {}

              today     = datetime.today()
              target_dt = today - timedelta(days=365)

              TE_COUNTRY_SLUGS = {
                  'USD': 'united-states',
                  'EUR': 'euro-area',
                  'GBP': 'united-kingdom',
                  'JPY': 'japan',
                  'CAD': 'canada',
                  'AUD': 'australia',
                  'CHF': 'switzerland',
                  'NZD': 'new-zealand',
              }

              # ── Estrategia 1: TE API guest ────────────────────────────────────────
              print(f"\n  Estrategia 1: TE API guest")
              TE_API_HEADERS = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  'Accept': 'application/json',
                  'Referer': 'https://tradingeconomics.com/',
              }

              # C2: ventana de lookback por divisa.
              # JPY usa 24M: el ciclo BoJ completo (subió de −0.1% en ene-2024 a +0.75%
              # en feb-2026) solo es visible con ventana de 24 meses.
              # Con 12M la serie FRED JPY tiene lag y puede devolver 0.75%−0.75% = 0.0%.
              TE_LOOKBACK_DAYS = {
                  'USD': 365, 'EUR': 365, 'GBP': 365,
                  'JPY': 730,  # C2: 24M para ciclo BoJ completo
                  'CAD': 365, 'AUD': 365, 'CHF': 365, 'NZD': 365,
              }

              for code, slug in TE_COUNTRY_SLUGS.items():
                  if code in momentum:
                      continue
                  lookback_days = TE_LOOKBACK_DAYS.get(code, 365)
                  target_dt_code = today - timedelta(days=lookback_days)
                  try:
                      url = f'https://api.tradingeconomics.com/historical/country/{slug}/indicator/interest-rate?c=guest:guest'
                      r = requests.get(url, headers=TE_API_HEADERS, timeout=15)

                      if r.status_code == 200:
                          data = r.json()
                          if not isinstance(data, list) or len(data) < 2:
                              print(f"    ⚠️ {code}: respuesta vacía o insuficiente")
                              continue

                          obs = []
                          for item in data:
                              dt_str = item.get('DateTime') or item.get('Date') or ''
                              val    = item.get('Value')
                              if not dt_str or val is None:
                                  continue
                              try:
                                  obs_dt = datetime.strptime(dt_str[:10], '%Y-%m-%d')
                                  obs.append((obs_dt, float(val)))
                              except:
                                  continue

                          if len(obs) < 2:
                              print(f"    ⚠️ {code}: menos de 2 observaciones parseadas")
                              continue

                          obs.sort(key=lambda x: x[0])
                          current_dt, current_rate = obs[-1]

                          max_diff_days = 90 if lookback_days >= 700 else 60
                          closest_val, closest_diff, closest_dt = None, float('inf'), None
                          for obs_dt, obs_val in obs[:-1]:
                              diff = abs((obs_dt - target_dt_code).days)
                              if diff < closest_diff:
                                  closest_diff, closest_val, closest_dt = diff, obs_val, obs_dt

                          if closest_val is not None and closest_diff <= max_diff_days:
                              m_val = round(current_rate - closest_val, 4)
                              momentum[code]        = m_val
                              momentum_dates[code]  = current_dt.strftime('%Y-%m-%d')
                              momentum_source[code] = f'te-api-guest-{lookback_days//30}m'
                              direction = '↑' if m_val > 0.001 else ('↓' if m_val < -0.001 else '→')
                              window_label = f"{lookback_days//30}M"
                              print(f"    ✓ {code} [{window_label}]: {current_rate}% - {closest_val}% = {m_val:+.4f}% {direction} (ref: {closest_dt.strftime('%Y-%m')}, {closest_diff}d)")
                          else:
                              print(f"    ⚠️ {code}: {lookback_days//30}M target demasiado lejano ({closest_diff}d), {len(obs)} obs disponibles")

                      elif r.status_code == 401:
                          print(f"    ⚠️ {code}: TE API requiere autenticación (401) — saltando estrategia 1")
                          break
                      elif r.status_code == 429:
                          print(f"    ⚠️ Rate limited en TE API, esperando 30s...")
                          time.sleep(30)
                      else:
                          print(f"    ⚠️ {code}: HTTP {r.status_code}")

                      time.sleep(1)

                  except Exception as e:
                      print(f"    ❌ {code}: {e}")

              # ── Estrategia 2: FRED CSV ────────────────────────────────────────────
              FRED_SERIES = {
                  'USD': 'FEDFUNDS',
                  'EUR': 'ECBDFR',
                  'GBP': 'BOERUKM',
                  'JPY': 'IRSTCB01JPM156N',
              }
              # C2: JPY usa 24M en FRED también para capturar el ciclo BoJ completo.
              FRED_LOOKBACK_MONTHS = {
                  'USD': 12, 'EUR': 12, 'GBP': 12,
                  'JPY': 24,  # C2: ciclo BoJ completo requiere ventana 24M
              }
              fred_candidates = [c for c in CURRENCIES if c not in momentum and c in FRED_SERIES]
              if fred_candidates:
                  print(f"\n  Estrategia 2: FRED CSV para {', '.join(fred_candidates)}")
                  FRED_BASE = 'https://fred.stlouisfed.org/graph/fredgraph.csv?id='
                  for code in fred_candidates:
                      series_id = FRED_SERIES[code]
                      lookback_months = FRED_LOOKBACK_MONTHS.get(code, 12)
                      try:
                          r = requests.get(f'{FRED_BASE}{series_id}', timeout=15)
                          if r.status_code != 200:
                              print(f"    ⚠️ {code}: FRED {r.status_code}")
                              continue
                          reader = csv.reader(StringIO(r.text))
                          rows = []
                          for row in reader:
                              if len(row) == 2 and row[0] != 'DATE' and row[1] not in ('.', ''):
                                  try:
                                      rows.append((datetime.strptime(row[0], '%Y-%m-%d'), float(row[1])))
                                  except: continue
                          if len(rows) < 2:
                              continue
                          latest_dt, current_rate = rows[-1]
                          try:
                              from dateutil.relativedelta import relativedelta
                              target_dt_fred = latest_dt - relativedelta(months=lookback_months)
                          except ImportError:
                              target_dt_fred = latest_dt.replace(year=latest_dt.year - (lookback_months // 12))
                          max_diff_days = 90 if lookback_months >= 20 else 45
                          closest_val, closest_diff = None, float('inf')
                          for obs_dt, obs_val in rows[:-1]:
                              diff = abs((obs_dt - target_dt_fred).days)
                              if diff < closest_diff:
                                  closest_diff, closest_val = diff, obs_val
                          if closest_val is not None and closest_diff <= max_diff_days:
                              m_val = round(current_rate - closest_val, 4)
                              momentum[code]        = m_val
                              momentum_dates[code]  = latest_dt.strftime('%Y-%m-%d')
                              momentum_source[code] = f'fred-{lookback_months}m'
                              direction = '↑' if m_val > 0.001 else ('↓' if m_val < -0.001 else '→')
                              print(f"    ✓ {code} [FRED {series_id} {lookback_months}M]: {current_rate}% - {closest_val}% = {m_val:+.4f}% {direction}")
                          else:
                              print(f"    ⚠️ {code}: ref más cercana a {lookback_months}M dista {closest_diff}d (max {max_diff_days}d)")
                          time.sleep(0.5)
                      except Exception as e:
                          print(f"    ❌ {code}: {e}")

              # ── Estrategia 3: Bootstrap C7 — tasas reales actualizadas ────────────
              # C7: Bootstrap actualizado con tasas reales de hace ~12M (o 24M para JPY).
              # Formato: (tasa_hace_N_meses, 'YYYY-MM-DD', ventana_meses)
              # La fecha es la fecha real de la tasa de referencia.
              # ACTUALIZAR cada 6 meses o cuando una divisa cambie significativamente.
              #
              # Tasas de referencia usadas (verificadas contra FRED/bancos centrales):
              #   JPY: -0.10% (ene-2024) — BoJ en NIRP, subió a +0.10% en mar-2024
              #   CAD:  5.00% (mar-2024) — BoC comenzó recortes en jun-2024
              #   AUD:  4.35% (mar-2025) — RBA en pausa, recortó a 4.10% en feb-2025
              #   CHF:  1.50% (mar-2024) — SNB comenzó recortes en mar-2024
              #   NZD:  5.50% (mar-2024) — RBNZ comenzó recortes agresivos en ago-2024
              #
              # PRÓXIMA REVISIÓN RECOMENDADA: Sep-2026
              # Si age_days > 400 → warning automático → actualizar esta tabla.
              BOOTSTRAP_FALLBACK = {
                  # (old_rate_pct, old_date_str, lookback_label)
                  'JPY': (-0.10, '2024-01-15', '24M'),  # C7: NIRP vigente ene-2024
                  'CAD': ( 5.00, '2024-03-15', '12M'),  # C7: antes de recortes BoC
                  'AUD': ( 4.35, '2025-03-15', '12M'),  # C7: pausa RBA mar-2025
                  'CHF': ( 1.50, '2024-03-15', '12M'),  # C7: antes del primer recorte SNB
                  'NZD': ( 5.50, '2024-03-15', '12M'),  # C7: antes de recortes RBNZ
              }

              bootstrap_candidates = [c for c in CURRENCIES if c not in momentum and c in BOOTSTRAP_FALLBACK]
              if bootstrap_candidates:
                  print(f"\n  Estrategia 3: Bootstrap C7 para {', '.join(bootstrap_candidates)}")

                  for code in bootstrap_candidates:
                      old_rate, old_date_str, window_label = BOOTSTRAP_FALLBACK[code]

                      # Verificar antigüedad del bootstrap
                      try:
                          ref_date = datetime.strptime(old_date_str, '%Y-%m-%d')
                          age_days = (datetime.today() - ref_date).days
                          if age_days > 400:
                              print(f"    ⚠️ {code}: referencia bootstrap tiene {age_days}d → REQUIERE ACTUALIZACIÓN")
                              print(f"       Actualizar BOOTSTRAP_FALLBACK['{code}'] con tasa real de hace ~{window_label}")
                          elif age_days > 340:
                              print(f"    ℹ️ {code}: referencia bootstrap tiene {age_days}d — pronto necesitará actualización")
                          else:
                              print(f"    ✓ {code}: referencia bootstrap tiene {age_days}d — dentro del rango válido (≤400d)")
                      except Exception as e:
                          print(f"    ⚠️ {code}: no se pudo verificar antigüedad: {e}")

                      # Obtener tasa actual desde rates/XX.json
                      try:
                          rates_path = f'rates/{code}.json'
                          current_rate = None
                          if os.path.exists(rates_path):
                              with open(rates_path) as f:
                                  rates_json = json.load(f)
                              obs = rates_json.get('observations', [])
                              if obs:
                                  val_str = obs[0].get('value', '')
                                  current_rate = clean_num(str(val_str))

                          if current_rate is None:
                              print(f"    ⚠️ {code}: no se pudo leer tasa actual de rates/{code}.json")
                              continue

                          m_val = round(current_rate - old_rate, 4)
                          momentum[code]        = m_val
                          momentum_dates[code]  = str(date.today())
                          momentum_source[code] = f'bootstrap-C7-{window_label}'
                          direction = '↑' if m_val > 0.001 else ('↓' if m_val < -0.001 else '→')
                          print(f"    ✓ {code} [bootstrap C7 {window_label}]: {current_rate}% - {old_rate}% ({old_date_str}) = {m_val:+.4f}% {direction}")

                      except Exception as e:
                          print(f"    ❌ {code} bootstrap: {e}")

              # ── Estrategia 4: Archivo anterior ───────────────────────────────────
              still_missing = [c for c in CURRENCIES if c not in momentum]
              if still_missing:
                  print(f"\n  Estrategia 4: Archivo anterior para {', '.join(still_missing)}")
                  for code in still_missing:
                      try:
                          path = f'extended-data/{code}.json'
                          if os.path.exists(path):
                              with open(path) as f:
                                  prev = json.load(f)
                              prev_val = prev.get('data', {}).get('rateMomentum')
                              if prev_val is not None:
                                  momentum[code]        = prev_val
                                  momentum_dates[code]  = prev.get('dates', {}).get('rateMomentum', str(date.today()))
                                  momentum_source[code] = 'previous-file'
                                  print(f"    ✓ {code}: valor anterior {prev_val:+.4f}% [{momentum_dates[code]}]")
                              else:
                                  print(f"    ✗ {code}: sin valor anterior disponible")
                          else:
                              print(f"    ✗ {code}: no existe archivo anterior")
                      except Exception as e:
                          print(f"    ✗ {code}: {e}")

              # ── Resumen ───────────────────────────────────────────────────────────
              print(f"\n  Resumen rateMomentum:")
              for code in CURRENCIES:
                  src = momentum_source.get(code, 'none')
                  val = momentum.get(code)
                  val_str = f"{val:+.4f}%" if val is not None else "null"
                  window = "24M" if code == "JPY" else "12M"
                  direction = ('↑' if val > 0.001 else ('↓' if val < -0.001 else '→')) if val is not None else '?'
                  print(f"    {code} [{window}]: {src} → {val_str} {direction}")

              final_missing = [c for c in CURRENCIES if c not in momentum]
              if final_missing:
                  print(f"\n  ❌ rateMomentum no disponible para: {', '.join(final_missing)} (será null)")
              else:
                  print(f"\n  ✅ rateMomentum completo para todas las divisas")

              return momentum, momentum_dates, momentum_source

          # ── CAPITAL FLOWS ────────────────────────────────────────────────────────
          def parse_capital_flows_row(cols):
              if len(cols) < 5:
                  return None
              raw_val  = clean_num(cols[1].get_text(strip=True))
              unit_str = cols[4].get_text(strip=True)
              if raw_val is None or not unit_str:
                  return None
              unit_upper = unit_str.upper()
              if 'TRILLION' in unit_upper:
                  scale = 1_000_000.0
              elif 'BILLION' in unit_upper:
                  scale = 1_000.0
              elif 'HUNDRED MILLION' in unit_upper:
                  scale = 100.0
              elif 'MILLION' in unit_upper:
                  scale = 1.0
              else:
                  print(f"    ⚠️ Escala desconocida '{unit_str}' — tratando como millones")
                  scale = 1.0
              m = re.match(r'^([A-Z]{3})\b', unit_upper)
              src_currency = m.group(1) if m else 'USD'
              val_native_millions = raw_val * scale
              if src_currency == 'USD':
                  val_usd_millions = val_native_millions
              else:
                  fx = exchange_rates.get(src_currency)
                  if fx and fx > 0:
                      val_usd_millions = val_native_millions / fx
                  else:
                      print(f"    ⚠️ Sin tipo de cambio para {src_currency} — omitiendo")
                      return None
              return round(val_usd_millions, 2)

          # ── CONFIDENCE NORMALIZATION ─────────────────────────────────────────────
          def normalize_confidence(value, currency, indicator):
              if value is None:
                  return None

              VALID_RANGE = (50, 200)
              RAW_PASSTHROUGH = {'CAD', 'NZD', 'USD', 'AUD'}

              result = None

              if indicator == 'consumerConfidence':
                  if currency in ('EUR', 'GBP'):
                      result = round(value + 100, 2)
                  elif currency == 'JPY':
                      result = round(((value - 40) / 10) * 15 + 100, 2)
                  elif currency == 'CHF':
                      result = round(value + 130, 2)
                  else:
                      result = round(value, 2)

              elif indicator == 'businessConfidence':
                  if currency in ('EUR', 'GBP', 'JPY', 'AUD'):
                      result = round(value + 100, 2)
                  else:
                      result = round(value, 2)

              else:
                  result = value

              if result is not None and currency not in RAW_PASSTHROUGH:
                  if not (VALID_RANGE[0] <= result <= VALID_RANGE[1]):
                      print(f"    ⚠️ {currency} {indicator} normalizado fuera de rango: {result} (raw={value}) → null")
                      return None

              return result

          # ── GENERIC TABLE SCRAPER ────────────────────────────────────────────────
          def scrape_te_table(url, label):
              print(f"\n{'='*50}\nSCRAPING: {label}\n{'='*50}")
              data, dates = {}, {}
              try:
                  r = requests.get(url, headers=HEADERS, timeout=20)
                  if r.status_code == 429:
                      print(f"  ⚠️ Rate limited, esperando 30s...")
                      time.sleep(30)
                      r = requests.get(url, headers=HEADERS, timeout=20)
                  r.raise_for_status()

                  soup = BeautifulSoup(r.content, 'lxml')
                  table = soup.find('table', {'class': 'table'})
                  if not table:
                      print("  ❌ No se encontró tabla"); return data, dates

                  headers_row = [h.get_text(strip=True).lower() for h in table.find_all('th')]
                  if 'actual' in headers_row:
                      actual_idx = headers_row.index('actual')
                  elif 'last' in headers_row:
                      actual_idx = headers_row.index('last')
                  else:
                      actual_idx = 1
                  date_idx = headers_row.index('reference') if 'reference' in headers_row else None

                  for row in table.find_all('tr')[1:]:
                      cols = row.find_all('td')
                      if len(cols) < 2: continue
                      ctry = cols[0].get_text(strip=True)
                      for code, names in COUNTRY_NAMES.items():
                          if any(n.lower() in ctry.lower() for n in names):
                              dt = parse_te_date(cols[date_idx].get_text(strip=True)) if date_idx and len(cols) > date_idx else str(date.today())

                              if label == 'capitalFlows':
                                  val_usd = parse_capital_flows_row(cols)
                                  if val_usd is not None:
                                      unit_str = cols[4].get_text(strip=True) if len(cols) > 4 else 'N/A'
                                      raw_str  = cols[1].get_text(strip=True)
                                      print(f"  ✓ {code}: {raw_str} {unit_str} → {val_usd:.1f} USD M ({dt})")
                                      data[code]  = val_usd
                                      dates[code] = dt
                              elif label in ('consumerConfidence', 'businessConfidence'):
                                  raw_val = clean_num(cols[actual_idx].get_text(strip=True))
                                  if raw_val is not None:
                                      normalized = normalize_confidence(raw_val, code, label)
                                      print(f"  ✓ {code}: raw={raw_val} → normalized={normalized} ({dt})")
                                      data[code]  = round(normalized, 4) if normalized is not None else None
                                      dates[code] = dt
                              else:
                                  raw_val = clean_num(cols[actual_idx].get_text(strip=True))
                                  if raw_val is not None:
                                      data[code]  = round(raw_val, 4)
                                      dates[code] = dt
                                      print(f"  ✓ {code}: {raw_val} ({dt})")
                              break

              except Exception as e:
                  print(f"  ❌ {e}")
              return data, dates

          # ── BOND YIELDS ──────────────────────────────────────────────────────────
          BOND_COUNTRY_MAP = {
              'USD': ['United States'],
              'EUR': ['Euro area'],
              'GBP': ['United Kingdom'],
              'JPY': ['Japan'],
              'CAD': ['Canada'],
              'AUD': ['Australia'],
              'CHF': ['Switzerland'],
              'NZD': ['New Zealand'],
          }
          BOND_COUNTRY_SLUGS = {
              'USD': 'united-states',
              'EUR': 'euro-area',
              'GBP': 'united-kingdom',
              'JPY': 'japan',
              'CAD': 'canada',
              'AUD': 'australia',
              'CHF': 'switzerland',
              'NZD': 'new-zealand',
          }
          BOND_EXPECTED_RANGES = {
              'USD': (3.0, 6.0),
              'EUR': (2.0, 4.5),
              'GBP': (3.5, 5.5),
              'JPY': (0.5, 3.5),
              'CAD': (2.5, 5.0),
              'AUD': (3.5, 6.0),
              'CHF': (0.0, 2.0),
              'NZD': (3.5, 6.0),
          }

          def _fetch_eur_bond_from_market_page():
              print(f"\n  → Fetching EUR bond desde TE /bonds (GEUGB10Y — EA aggregate)...")
              try:
                  r = requests.get(BONDS_MARKET_PAGE, headers=HEADERS, timeout=20)
                  if r.status_code == 429:
                      print("  ⚠️ Rate limited en /bonds, esperando 30s...")
                      time.sleep(30)
                      r = requests.get(BONDS_MARKET_PAGE, headers=HEADERS, timeout=20)
                  r.raise_for_status()
                  soup = BeautifulSoup(r.content, 'lxml')

                  ea_row = soup.find('tr', {'data-symbol': 'GEUGB10Y:GOV'})
                  if ea_row:
                      price_td = ea_row.find('td', {'id': 'p'})
                      date_td  = ea_row.find('td', {'id': 'date'})
                      if price_td:
                          val = clean_num(price_td.get_text(strip=True))
                          dt  = str(date.today())
                          if date_td:
                              dt = parse_te_date(date_td.get_text(strip=True))
                          if val is not None and 2.0 <= val <= 4.5:
                              print(f"  ✓ EUR [/bonds GEUGB10Y — EA aggregate]: {val}% ({dt})")
                              return round(val, 3), dt
                          elif val is not None:
                              print(f"  ⚠️ EUR GEUGB10Y={val}% fuera de rango (2.0-4.5%) — descartando")

                  for row in soup.find_all('tr'):
                      cells = row.find_all('td')
                      if len(cells) < 3: continue
                      for i, cell in enumerate(cells):
                          if 'euro area' in cell.get_text(strip=True).lower():
                              for price_cell in cells[i+1:]:
                                  val = clean_num(price_cell.get_text(strip=True))
                                  if val is not None and 2.0 <= val <= 4.5:
                                      print(f"  ✓ EUR [/bonds text search]: {val}%")
                                      return round(val, 3), str(date.today())
                              break

              except Exception as e:
                  print(f"  ✗ EUR /bonds: {e}")
              return None, None

          def _extract_bonds_from_all_tables(soup):
              data, dates = {}, {}
              for table in soup.find_all('table'):
                  for row in table.find_all('tr'):
                      cols = row.find_all('td')
                      if len(cols) < 2: continue
                      ctry_text = cols[0].get_text(strip=True)
                      for code, names in BOND_COUNTRY_MAP.items():
                          if code in data: continue
                          if any(n.lower() in ctry_text.lower() for n in names):
                              for idx in [1, 2, 3]:
                                  if idx >= len(cols): continue
                                  val = clean_num(cols[idx].get_text(strip=True))
                                  if val is not None and 0 < val < 20:
                                      data[code]  = round(val, 3)
                                      dates[code] = str(date.today())
                                      print(f"  ✓ {code}: {val}% (widget table)")
                                      break
              return data, dates

          def _bond_country_page_fallback(code):
              slug = BOND_COUNTRY_SLUGS.get(code)
              if not slug: return None, None
              min_val, max_val = BOND_EXPECTED_RANGES.get(code, (0.5, 10.0))
              url = f'https://tradingeconomics.com/{slug}/government-bond-yield'
              try:
                  r = requests.get(url, headers=HEADERS, timeout=15)
                  r.raise_for_status()
                  soup = BeautifulSoup(r.content, 'lxml')
                  for table in soup.find_all('table'):
                      for row in table.find_all('tr'):
                          cols = row.find_all('td')
                          for col in cols:
                              val = clean_num(col.get_text(strip=True))
                              if val is not None and min_val <= val <= max_val:
                                  print(f"  ✓ {code}: {val}% (country page fallback)")
                                  return round(val, 3), str(date.today())
              except Exception as e:
                  print(f"  ❌ Country page fallback {code}: {e}")
              return None, None

          def scrape_bonds():
              print(f"\n{'='*50}\nBOND YIELDS (EUR via /bonds market page — GEUGB10Y EA aggregate)\n{'='*50}")
              data, dates = {}, {}

              eur_val, eur_dt = _fetch_eur_bond_from_market_page()
              if eur_val is not None:
                  data['EUR']  = eur_val
                  dates['EUR'] = eur_dt
              time.sleep(1)

              try:
                  r = requests.get(TE_URLS['bond10y'], headers=HEADERS, timeout=20)
                  if r.status_code == 429:
                      print("  ⚠️ Rate limited, esperando 30s...")
                      time.sleep(30)
                      r = requests.get(TE_URLS['bond10y'], headers=HEADERS, timeout=20)
                  r.raise_for_status()
                  soup = BeautifulSoup(r.content, 'lxml')

                  std_table = soup.find('table', {'class': 'table'})
                  if std_table:
                      headers_row = [h.get_text(strip=True).lower() for h in std_table.find_all('th')]
                      actual_idx = headers_row.index('actual') if 'actual' in headers_row else 1
                      if actual_idx == 1 and 'last' in headers_row:
                          actual_idx = headers_row.index('last')
                      date_idx = headers_row.index('reference') if 'reference' in headers_row else None
                      for row in std_table.find_all('tr')[1:]:
                          cols = row.find_all('td')
                          if len(cols) < 2: continue
                          ctry = cols[0].get_text(strip=True)
                          for code, names in BOND_COUNTRY_MAP.items():
                              if code == 'EUR': continue
                              if any(n.lower() in ctry.lower() for n in names):
                                  val = clean_num(cols[actual_idx].get_text(strip=True))
                                  dt  = parse_te_date(cols[date_idx].get_text(strip=True)) if date_idx and len(cols) > date_idx else str(date.today())
                                  min_v, max_v = BOND_EXPECTED_RANGES.get(code, (0, 20))
                                  if val is not None and min_v <= val <= max_v:
                                      data[code] = round(val, 3)
                                      dates[code] = dt
                                      print(f"  ✓ {code}: {val}% ({dt})")
                                  elif val is not None:
                                      print(f"  ✗ {code}: {val}% rechazado (fuera de rango {min_v}-{max_v}%)")
                                  break

                  missing_non_eur = [c for c in CURRENCIES if c != 'EUR' and c not in data]
                  if missing_non_eur:
                      print(f"  Scanning all tables for: {', '.join(missing_non_eur)}")
                      w_data, w_dates = _extract_bonds_from_all_tables(soup)
                      for code in missing_non_eur:
                          if code in w_data:
                              min_v, max_v = BOND_EXPECTED_RANGES.get(code, (0, 20))
                              if min_v <= w_data[code] <= max_v:
                                  data[code]  = w_data[code]
                                  dates[code] = w_dates[code]
                              else:
                                  print(f"  ⚠️ {code}: {w_data[code]}% fuera de rango → descartado")

              except Exception as e:
                  print(f"  ❌ TE bond country-list error: {e}")

              still_missing = [c for c in CURRENCIES if c not in data]
              if still_missing:
                  print(f"\n  Country-page fallback para: {', '.join(still_missing)}")
                  for code in still_missing:
                      val, dt = _bond_country_page_fallback(code)
                      if val is not None:
                          data[code]  = val
                          dates[code] = dt
                      time.sleep(1)

              if 'EUR' in data:
                  eur_yield = data['EUR']
                  if eur_yield < 2.3:
                      print(f"\n  ⚠️ EUR bond10y={eur_yield}% SOSPECHOSAMENTE BAJO")
                  elif eur_yield > 3.5:
                      print(f"\n  ⚠️ EUR bond10y={eur_yield}% SOSPECHOSAMENTE ALTO para zona euro")
                  else:
                      print(f"\n  ✓ EUR bond10y={eur_yield}% dentro del rango esperado para EA aggregate")
              else:
                  print(f"\n  ⚠️ EUR bond10y: NO SE PUDO OBTENER — será null en el dashboard")

              print(f"\n  Found:   {[c for c in CURRENCIES if c in data]}")
              print(f"  Missing: {[c for c in CURRENCIES if c not in data]}")
              return data, dates

          # ── MAIN ─────────────────────────────────────────────────────────────────
          print(f"\n{'='*50}\nFETCHING FX RATES\n{'='*50}")
          fetch_fx()

          all_data  = {c: {} for c in CURRENCIES}
          all_dates = {c: {} for c in CURRENCIES}

          # 1. Bond yields
          bond_data, bond_dates = scrape_bonds()
          for c in CURRENCIES:
              all_data[c]['bond10y']  = bond_data.get(c)
              all_dates[c]['bond10y'] = bond_dates.get(c, str(date.today()))
          time.sleep(2)

          # 2. Trading Economics indicators
          for key, url in {k: v for k, v in TE_URLS.items() if k != 'bond10y'}.items():
              d, dt = scrape_te_table(url, key)
              for c in CURRENCIES:
                  all_data[c][key]  = d.get(c)
                  all_dates[c][key] = dt.get(c, str(date.today()))
              time.sleep(2)

          # 3. rateMomentum (C2+C7: JPY 24M + bootstrap actualizado)
          rate_momentum, rate_momentum_dates, momentum_source = scrape_rate_momentum()
          for c in CURRENCIES:
              all_data[c]['rateMomentum']  = rate_momentum.get(c)
              all_dates[c]['rateMomentum'] = rate_momentum_dates.get(c, str(date.today()))

          # ── GUARDAR RESULTADOS ────────────────────────────────────────────────────
          print(f"\n{'='*50}\nSAVING RESULTS\n{'='*50}")
          for curr in CURRENCIES:
              pkg = {
                  'lastUpdate': str(date.today()),
                  'source': 'TradingEconomics — v10+C2+C7: rateMomentum JPY 24M + bootstrap actualizado 2024-2026',
                  'rateMomentumStrategy': momentum_source.get(curr, 'none'),
                  'data':   all_data[curr],
                  'dates':  all_dates[curr]
              }
              with open(f'extended-data/{curr}.json', 'w') as f:
                  json.dump(pkg, f, indent=2)

              available = [k for k, v in all_data[curr].items() if v is not None]
              missing   = [k for k in ['bond10y','consumerConfidence','businessConfidence',
                                        'capitalFlows','inflationExpectations','rateMomentum']
                           if all_data[curr].get(k) is None]
              status = '✅' if not missing else '⚠️ '
              extras = []
              if curr == 'EUR':
                  extras.append(f"bond10y={all_data['EUR'].get('bond10y','N/A')}% EA agg")
              rm = all_data[curr].get('rateMomentum')
              if rm is not None:
                  direction = '↑' if rm > 0.001 else ('↓' if rm < -0.001 else '→')
                  src = momentum_source.get(curr, 'unknown')
                  window = "24M" if curr == "JPY" else "12M"
                  extras.append(f"rateMomentum={rm:+.4f}% {direction} [{src}] [{window}]")
              cc = all_data[curr].get('consumerConfidence')
              if cc is not None:
                  extras.append(f"consumerConfidence={cc}")
              extra_str = f" [{', '.join(extras)}]" if extras else ''
              print(f"{status} {curr}: {', '.join(available) or 'NO DATA'}{extra_str}")
              if missing:
                  print(f"   Missing: {', '.join(missing)}")

          print("\n✅ COMPLETE — v10+C2+C7 (JPY rateMomentum 24M + bootstrap 2024-2026 actualizado)")
          EOFPYTHON

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add extended-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Extended data $(date +'%Y-%m-%d') — v10+C2+C7 bootstrap actualizado"
            git pull --rebase origin main || true
            git push
          fi
