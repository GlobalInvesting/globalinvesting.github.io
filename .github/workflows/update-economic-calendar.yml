name: Update Economic Calendar - v7 (Investing.com JSON API primary source)

on:
  schedule:
    # Asia session (JPY, AUD, NZD): dense coverage 23:00-05:00 UTC
    - cron: '0 23 * * *'
    - cron: '30 23 * * *'
    - cron: '0 0 * * *'
    - cron: '30 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    # Europe session (EUR, GBP, CHF): 06:00-11:00 UTC
    - cron: '0 6 * * *'
    - cron: '30 6 * * *'
    - cron: '0 7 * * *'
    - cron: '30 7 * * *'
    - cron: '0 8 * * *'
    - cron: '30 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
    # US session (USD, CAD): 12:00-18:00 UTC
    - cron: '0 12 * * *'
    - cron: '30 12 * * *'
    - cron: '0 13 * * *'
    - cron: '30 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

# FIX P-01: Lógica Python extraída a scripts/update_economic_calendar.py.
jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml --break-system-packages

      - name: Create directory
        run: mkdir -p calendar-data

      - name: Update economic calendar
        run: python3 -u scripts/update_economic_calendar.py

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add calendar-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to calendar data"
          else
            git commit -m "📅 Economic calendar $(date +'%Y-%m-%d %H:%M') UTC — v7.0 Investing.com"
            git pull --rebase origin main || true
            git push
          fi
