name: Update Economic Calendar - v8 (Finnhub primary)

on:
  schedule:
    # Asia session — JPY, AUD, NZD (00:00–05:00 UTC)
    - cron: '0 0 * * *'
    - cron: '30 1 * * *'
    - cron: '0 3 * * *'
    - cron: '30 4 * * *'
    # Europe session — EUR, GBP, CHF (06:00–11:00 UTC)
    - cron: '0 6 * * *'
    - cron: '30 7 * * *'
    - cron: '0 9 * * *'
    - cron: '30 10 * * *'
    # US session — USD, CAD (12:00–18:00 UTC)
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
    # Late US / API updates (20:00–22:00 UTC)
    - cron: '0 20 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Create directory
        run: mkdir -p calendar-data

      - name: Update economic calendar
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python3 -u scripts/update_economic_calendar.py

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add calendar-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to calendar data"
          else
            git commit -m "📅 Economic calendar $(date +'%Y-%m-%d %H:%M') UTC — v8.0 Finnhub"
            git pull --rebase origin main || true
            git push
          fi
