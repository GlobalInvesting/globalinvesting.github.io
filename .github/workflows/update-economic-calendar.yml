name: Update Economic Calendar - v6 (FF XML primary source)

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 8 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

# FIX P-01: Lógica Python extraída a scripts/update_economic_calendar.py.
jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml --break-system-packages

      - name: Create directory
        run: mkdir -p calendar-data

      - name: Update economic calendar
        run: python3 -u scripts/update_economic_calendar.py

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add calendar-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to calendar data"
          else
            git commit -m "📅 Economic calendar $(date +'%Y-%m-%d %H:%M') UTC — v6.0 FF XML"
            git pull --rebase origin main || true
            git push
          fi
