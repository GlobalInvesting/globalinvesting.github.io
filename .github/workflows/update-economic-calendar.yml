name: Update Economic Calendar - v2 (Multi-Source)

on:
  schedule:
    # Runs 3x/day: 00:00, 08:00, 16:00 UTC
    - cron: '0 0 * * *'
    - cron: '0 8 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml --break-system-packages

      - name: Create directory
        run: mkdir -p calendar-data

      - name: Scrape economic calendar
        run: |
          python3 << 'EOFPYTHON'
          import requests
          from bs4 import BeautifulSoup
          import json, re, time
          from datetime import date, datetime, timedelta

          # ── CONSTANTS ────────────────────────────────────────────────────────────

          TRACKED_CURRENCIES = {'USD', 'EUR', 'GBP', 'JPY', 'AUD', 'CAD', 'CHF', 'NZD'}

          CURRENCY_FLAGS = {
              'USD': '🇺🇸', 'EUR': '🇪🇺', 'GBP': '🇬🇧', 'JPY': '🇯🇵',
              'AUD': '🇦🇺', 'CAD': '🇨🇦', 'CHF': '🇨🇭', 'NZD': '🇳🇿',
          }

          COUNTRY_TO_CURRENCY = {
              'united states': 'USD', 'us': 'USD', 'usa': 'USD',
              'euro area': 'EUR', 'european union': 'EUR', 'eurozone': 'EUR',
              'germany': 'EUR', 'france': 'EUR', 'italy': 'EUR', 'spain': 'EUR',
              'united kingdom': 'GBP', 'uk': 'GBP', 'britain': 'GBP',
              'japan': 'JPY',
              'australia': 'AUD',
              'canada': 'CAD',
              'switzerland': 'CHF',
              'new zealand': 'NZD',
          }

          # ForexFactory uses 2-letter country codes
          FF_COUNTRY_TO_CURRENCY = {
              'USD': 'USD', 'EUR': 'EUR', 'GBP': 'GBP', 'JPY': 'JPY',
              'AUD': 'AUD', 'CAD': 'CAD', 'CHF': 'CHF', 'NZD': 'NZD',
          }

          HIGH_IMPACT_KEYWORDS = [
              'interest rate', 'rate decision', 'fed funds', 'bank rate',
              'gdp', 'gross domestic product', 'cpi', 'consumer price', 'inflation',
              'nonfarm payrolls', 'nonfarm', 'employment change', 'claimant count',
              'unemployment rate', 'jobless rate', 'unemployment claims',
              'fomc', 'ecb', 'boe', 'boj', 'rba', 'boc', 'snb', 'rbnz',
              'monetary policy', 'central bank', 'trade balance',
              'retail sales', 'pmi', 'purchasing managers',
          ]

          MEDIUM_IMPACT_KEYWORDS = [
              'manufacturing', 'industrial production', 'factory orders',
              'housing', 'building permits', 'housing starts',
              'consumer confidence', 'business confidence', 'sentiment',
              'ppi', 'producer price', 'wage', 'earnings', 'ism',
              'durable goods', 'job openings', 'jolts', 'current account',
              'import price', 'export price', 'capital flows',
          ]

          MONTH_ES = {1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',
                      7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'}

          def classify_impact(event_name, te_importance=None):
              name_lower = event_name.lower()
              if te_importance == 3: return 'high'
              if te_importance == 1: return 'low'
              for kw in HIGH_IMPACT_KEYWORDS:
                  if kw in name_lower: return 'high'
              for kw in MEDIUM_IMPACT_KEYWORDS:
                  if kw in name_lower: return 'medium'
              if te_importance == 2: return 'medium'
              return 'low'

          def resolve_currency(country_text):
              if not country_text: return None
              ct = country_text.lower().strip()
              for key, curr in COUNTRY_TO_CURRENCY.items():
                  if key in ct: return curr
              return None

          def fmt_date(dt_obj):
              return f"{dt_obj.day} {MONTH_ES[dt_obj.month]}"

          def clean_value(v):
              """Remove None/nan strings, keep real values."""
              if v is None: return ''
              s = str(v).strip()
              if s.lower() in ('none', 'nan', '-', 'n/a', ''): return ''
              return s

          # ═══════════════════════════════════════════════════════════════════════
          # STRATEGY 1: Trading Economics API (official, returns JSON)
          # TE has a public calendar API: https://api.tradingeconomics.com/calendar
          # Also accessible without key via:
          #   https://tradingeconomics.com/calendar/rss  (RSS feed, XML)
          # ═══════════════════════════════════════════════════════════════════════

          def fetch_te_rss(currency_code):
              """
              TE provides per-currency RSS feeds that are pure XML (no JS needed).
              URL: https://tradingeconomics.com/{country}/rss
              We use the global calendar RSS: https://tradingeconomics.com/calendar/rss
              """
              url = 'https://tradingeconomics.com/calendar/rss'
              print(f"  [TE RSS] Fetching: {url}")
              headers = {
                  'User-Agent': 'Mozilla/5.0 (compatible; RSS reader)',
                  'Accept': 'application/rss+xml, application/xml, text/xml',
              }
              try:
                  r = requests.get(url, headers=headers, timeout=20)
                  if r.ok:
                      print(f"  [TE RSS] Got {len(r.content)} bytes")
                      return r.text
              except Exception as e:
                  print(f"  [TE RSS] Error: {e}")
              return None

          def parse_te_rss(xml_text, target_dates):
              """Parse TE RSS calendar feed."""
              events = []
              try:
                  soup = BeautifulSoup(xml_text, 'lxml-xml')
                  items = soup.find_all('item')
                  print(f"  [TE RSS] Found {len(items)} RSS items")
                  for item in items:
                      title = item.find('title')
                      if not title: continue
                      title_text = title.get_text(strip=True)
                      # Title format: "Country - Event Name"
                      pub_date = item.find('pubDate')
                      desc = item.find('description')
                      guid = item.find('guid')

                      # Parse date from pubDate
                      event_date = None
                      if pub_date:
                          try:
                              from email.utils import parsedate_to_datetime
                              event_date = parsedate_to_datetime(pub_date.get_text()).date()
                          except:
                              pass

                      if event_date is None or event_date not in target_dates:
                          continue

                      # Extract country and event from title
                      if ' - ' in title_text:
                          parts = title_text.split(' - ', 1)
                          country_raw = parts[0].strip()
                          event_name = parts[1].strip()
                      else:
                          country_raw = ''
                          event_name = title_text

                      currency = resolve_currency(country_raw)
                      if not currency or currency not in TRACKED_CURRENCIES:
                          continue

                      # Extract actual/forecast/previous from description
                      actual = forecast = previous = ''
                      if desc:
                          desc_text = desc.get_text()
                          for line in desc_text.split('\n'):
                              line = line.strip()
                              if 'actual' in line.lower():
                                  m = re.search(r'actual[:\s]+([^\s,]+)', line, re.IGNORECASE)
                                  if m: actual = m.group(1)
                              if 'forecast' in line.lower() or 'consensus' in line.lower():
                                  m = re.search(r'(?:forecast|consensus)[:\s]+([^\s,]+)', line, re.IGNORECASE)
                                  if m: forecast = m.group(1)
                              if 'previous' in line.lower():
                                  m = re.search(r'previous[:\s]+([^\s,]+)', line, re.IGNORECASE)
                                  if m: previous = m.group(1)

                      events.append({
                          'date': fmt_date(event_date),
                          'dateISO': event_date.isoformat(),
                          'time': '',
                          'country': country_raw,
                          'currency': currency,
                          'flag': CURRENCY_FLAGS.get(currency, ''),
                          'event': event_name,
                          'impact': classify_impact(event_name),
                          'actual': clean_value(actual),
                          'forecast': clean_value(forecast),
                          'previous': clean_value(previous),
                      })
              except Exception as e:
                  print(f"  [TE RSS] Parse error: {e}")
              return events

          # ═══════════════════════════════════════════════════════════════════════
          # STRATEGY 2: ForexFactory Calendar (HTML, server-side rendered)
          # FF renders the calendar server-side. The HTML IS the data.
          # URL: https://www.forexfactory.com/calendar?week=this
          # ═══════════════════════════════════════════════════════════════════════

          def fetch_forex_factory(week_offset=0):
              """
              Fetch ForexFactory calendar HTML.
              week_offset=0 → this week, 1 → next week, etc.
              FF also supports: ?week=feb26.2026 format
              """
              if week_offset == 0:
                  url = 'https://www.forexfactory.com/calendar?week=this'
              elif week_offset == 1:
                  url = 'https://www.forexfactory.com/calendar?week=next'
              else:
                  # Calculate the date for future weeks
                  target_monday = date.today() + timedelta(weeks=week_offset)
                  # Get the Monday of that week
                  target_monday -= timedelta(days=target_monday.weekday())
                  url = f"https://www.forexfactory.com/calendar?week={target_monday.strftime('%b%d.%Y').lower()}"

              print(f"  [FF] Fetching: {url}")
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9',
                  'Accept-Encoding': 'gzip, deflate, br',
                  'Connection': 'keep-alive',
                  'Cache-Control': 'max-age=0',
                  'Referer': 'https://www.forexfactory.com/',
              }
              try:
                  r = requests.get(url, headers=headers, timeout=25)
                  if r.status_code == 429:
                      print("  [FF] Rate limited, waiting 30s...")
                      time.sleep(30)
                      r = requests.get(url, headers=headers, timeout=25)
                  if r.ok:
                      print(f"  [FF] Got {len(r.content)} bytes (status {r.status_code})")
                      return r.text
                  else:
                      print(f"  [FF] HTTP {r.status_code}")
              except Exception as e:
                  print(f"  [FF] Error: {e}")
              return None

          def parse_forex_factory(html, target_dates):
              """
              Parse ForexFactory calendar HTML.
              FF calendar table structure:
                <table class="calendar__table">
                  <tr class="calendar__row calendar__row--day-breaker">
                    <td class="calendar__cell calendar__date">Thu Feb 26</td>
                  </tr>
                  <tr class="calendar__row" data-event-id="...">
                    <td class="calendar__cell calendar__time">2:00pm</td>
                    <td class="calendar__cell calendar__currency">USD</td>
                    <td class="calendar__cell calendar__impact">
                      <span class="icon icon--ff-impact-red">...</span>  ← high
                      <span class="icon icon--ff-impact-ora">...</span>  ← medium
                      <span class="icon icon--ff-impact-yel">...</span>  ← low
                    </td>
                    <td class="calendar__cell calendar__event">
                      <span class="calendar__event-title">Event Name</span>
                    </td>
                    <td class="calendar__cell calendar__actual">value</td>
                    <td class="calendar__cell calendar__forecast">value</td>
                    <td class="calendar__cell calendar__previous">value</td>
                  </tr>
                </table>
              """
              events = []
              if not html:
                  return events

              try:
                  soup = BeautifulSoup(html, 'lxml')
                  table = soup.find('table', class_=re.compile('calendar'))
                  if not table:
                      print("  [FF] No calendar table found in HTML")
                      # Debug: show first 500 chars
                      print(f"  [FF] HTML preview: {html[:300]}")
                      return events

                  current_date = None
                  current_year = date.today().year

                  rows = table.find_all('tr', class_=re.compile('calendar__row'))
                  print(f"  [FF] Found {len(rows)} table rows")

                  for row in rows:
                      row_classes = ' '.join(row.get('class', []))

                      # ── Date header row ────────────────────────────────────────
                      if 'day-breaker' in row_classes:
                          date_cell = row.find('td', class_=re.compile('date'))
                          if date_cell:
                              date_text = date_cell.get_text(strip=True)
                              # Format: "Thu Feb 26" or "Fri Feb 27"
                              try:
                                  # Try current year first, then next year
                                  for year in [current_year, current_year + 1]:
                                      try:
                                          parsed = datetime.strptime(f"{date_text} {year}", "%a %b %d %Y")
                                          current_date = parsed.date()
                                          break
                                      except:
                                          pass
                              except:
                                  pass
                          continue

                      # ── Event row ─────────────────────────────────────────────
                      if current_date is None or current_date not in target_dates:
                          continue

                      # Currency
                      curr_cell = row.find('td', class_=re.compile('currency'))
                      if not curr_cell:
                          continue
                      currency = curr_cell.get_text(strip=True).upper()
                      if currency not in TRACKED_CURRENCIES:
                          continue

                      # Time
                      time_cell = row.find('td', class_=re.compile('time'))
                      time_text = ''
                      if time_cell:
                          raw_time = time_cell.get_text(strip=True)
                          if raw_time:
                              # "2:00pm" → "14:00"
                              m = re.match(r'(\d{1,2}):(\d{2})(am|pm)', raw_time, re.IGNORECASE)
                              if m:
                                  hour = int(m.group(1))
                                  minute = m.group(2)
                                  ampm = m.group(3).lower()
                                  if ampm == 'pm' and hour != 12: hour += 12
                                  elif ampm == 'am' and hour == 12: hour = 0
                                  time_text = f"{hour:02d}:{minute}"
                              else:
                                  time_text = raw_time[:5]

                      # Impact from icon class
                      impact = 'low'
                      impact_cell = row.find('td', class_=re.compile('impact'))
                      if impact_cell:
                          impact_span = impact_cell.find('span', class_=True)
                          if impact_span:
                              span_classes = ' '.join(impact_span.get('class', []))
                              if 'red' in span_classes:
                                  impact = 'high'
                              elif 'ora' in span_classes or 'orange' in span_classes:
                                  impact = 'medium'
                              elif 'yel' in span_classes or 'yellow' in span_classes:
                                  impact = 'low'

                      # Event name
                      event_cell = row.find('td', class_=re.compile('event'))
                      if not event_cell:
                          continue
                      event_title_span = event_cell.find('span', class_=re.compile('title'))
                      if event_title_span:
                          event_name = event_title_span.get_text(strip=True)
                      else:
                          event_name = event_cell.get_text(strip=True)

                      if not event_name or len(event_name) < 2:
                          continue

                      # Actual / Forecast / Previous
                      actual = ''
                      forecast = ''
                      previous = ''

                      actual_cell = row.find('td', class_=re.compile('actual'))
                      if actual_cell:
                          actual = clean_value(actual_cell.get_text(strip=True))

                      forecast_cell = row.find('td', class_=re.compile('forecast'))
                      if forecast_cell:
                          forecast = clean_value(forecast_cell.get_text(strip=True))

                      previous_cell = row.find('td', class_=re.compile('previous'))
                      if previous_cell:
                          previous = clean_value(previous_cell.get_text(strip=True))

                      # Re-classify impact using keywords as backup
                      if impact == 'low':
                          kw_impact = classify_impact(event_name)
                          if kw_impact in ('high', 'medium'):
                              impact = kw_impact

                      events.append({
                          'date': fmt_date(current_date),
                          'dateISO': current_date.isoformat(),
                          'time': time_text,
                          'country': currency,
                          'currency': currency,
                          'flag': CURRENCY_FLAGS.get(currency, ''),
                          'event': event_name,
                          'impact': impact,
                          'actual': actual,
                          'forecast': forecast,
                          'previous': previous,
                      })

              except Exception as e:
                  import traceback
                  print(f"  [FF] Parse error: {e}")
                  traceback.print_exc()

              return events

          # ═══════════════════════════════════════════════════════════════════════
          # STRATEGY 3: Investing.com Calendar API (JSON endpoint)
          # Investing has an undocumented but stable JSON endpoint.
          # ═══════════════════════════════════════════════════════════════════════

          def fetch_investing_calendar(from_date_str, to_date_str):
              """
              Investing.com has a POST endpoint for their economic calendar:
              https://www.investing.com/economic-calendar/Service/getCalendarFilteredData
              """
              url = 'https://www.investing.com/economic-calendar/Service/getCalendarFilteredData'
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36',
                  'Accept': 'application/json, text/javascript, */*; q=0.01',
                  'Accept-Language': 'en-US,en;q=0.9',
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'X-Requested-With': 'XMLHttpRequest',
                  'Referer': 'https://www.investing.com/economic-calendar/',
                  'Origin': 'https://www.investing.com',
              }

              # Country IDs for tracked currencies (Investing.com internal IDs)
              country_ids = {
                  'USD': 5,    # United States
                  'EUR': 72,   # Euro Zone
                  'GBP': 4,    # United Kingdom
                  'JPY': 35,   # Japan
                  'AUD': 25,   # Australia
                  'CAD': 6,    # Canada
                  'CHF': 12,   # Switzerland
                  'NZD': 43,   # New Zealand
              }

              data = {
                  'dateFrom': from_date_str,
                  'dateTo': to_date_str,
                  'timeZone': '0',
                  'timeFilter': 'timeRemain',
                  'currentTab': 'custom',
                  'limit_from': '0',
              }

              # Add country filters
              for i, (curr, cid) in enumerate(country_ids.items()):
                  data[f'country[]'] = cid  # This sends multiple values with same key

              print(f"  [Investing] Fetching calendar {from_date_str} → {to_date_str}")

              try:
                  # For multiple country[] values, use list syntax
                  data_list = []
                  data_list.append(('dateFrom', from_date_str))
                  data_list.append(('dateTo', to_date_str))
                  data_list.append(('timeZone', '0'))
                  data_list.append(('timeFilter', 'timeRemain'))
                  data_list.append(('currentTab', 'custom'))
                  data_list.append(('limit_from', '0'))
                  for curr, cid in country_ids.items():
                      data_list.append(('country[]', str(cid)))

                  r = requests.post(url, headers=headers, data=data_list, timeout=25)
                  if r.ok:
                      print(f"  [Investing] Got {len(r.content)} bytes (status {r.status_code})")
                      try:
                          return r.json()
                      except:
                          # May return HTML snippet
                          return {'data': r.text}
                  else:
                      print(f"  [Investing] HTTP {r.status_code}")
              except Exception as e:
                  print(f"  [Investing] Error: {e}")
              return None

          INVESTING_COUNTRY_MAP = {
              'United States': 'USD',
              'Euro Zone': 'EUR', 'Germany': 'EUR', 'France': 'EUR',
              'Italy': 'EUR', 'Spain': 'EUR', 'European Union': 'EUR',
              'United Kingdom': 'GBP',
              'Japan': 'JPY',
              'Australia': 'AUD',
              'Canada': 'CAD',
              'Switzerland': 'CHF',
              'New Zealand': 'NZD',
          }

          INVESTING_IMPACT_MAP = {
              '1': 'low', '2': 'medium', '3': 'high',
              'low': 'low', 'moderate': 'medium', 'high': 'high',
          }

          def parse_investing_response(response_data, target_dates):
              """
              Parse Investing.com JSON/HTML response.
              The response contains 'data' field with HTML table rows.
              """
              events = []
              if not response_data:
                  return events

              html_data = None
              if isinstance(response_data, dict):
                  html_data = response_data.get('data', '')
              elif isinstance(response_data, str):
                  html_data = response_data

              if not html_data:
                  return events

              try:
                  soup = BeautifulSoup(html_data, 'lxml')
                  rows = soup.find_all('tr', {'id': re.compile('eventRowId_')})
                  print(f"  [Investing] Found {len(rows)} event rows")

                  for row in rows:
                      try:
                          # Date from data attribute
                          event_date_str = row.get('data-event-datetime', '')
                          event_date = None
                          if event_date_str:
                              try:
                                  event_date = datetime.strptime(event_date_str[:10], '%Y/%m/%d').date()
                              except:
                                  try:
                                      event_date = datetime.strptime(event_date_str[:10], '%Y-%m-%d').date()
                                  except:
                                      pass

                          if event_date is None or event_date not in target_dates:
                              continue

                          # Currency/country
                          flag_td = row.find('td', class_=re.compile('flagCur'))
                          currency = ''
                          if flag_td:
                              flag_span = flag_td.find('span', class_=True)
                              if flag_span:
                                  classes = ' '.join(flag_span.get('class', []))
                                  # Class like "ceFlag flag_us" → extract country code
                                  m = re.search(r'flag_(\w+)', classes)
                                  if m:
                                      country_code = m.group(1).upper()
                                      # Map 2-letter to currency
                                      cc_map = {
                                          'US': 'USD', 'EU': 'EUR', 'GB': 'GBP',
                                          'JP': 'JPY', 'AU': 'AUD', 'CA': 'CAD',
                                          'CH': 'CHF', 'NZ': 'NZD',
                                          'DE': 'EUR', 'FR': 'EUR', 'IT': 'EUR', 'ES': 'EUR',
                                      }
                                      currency = cc_map.get(country_code, '')

                          if not currency or currency not in TRACKED_CURRENCIES:
                              continue

                          # Time
                          time_td = row.find('td', class_=re.compile('time'))
                          time_text = ''
                          if time_td:
                              time_text = time_td.get_text(strip=True)
                              # Convert "2:00am" → "02:00", "2:00pm" → "14:00"
                              m = re.match(r'(\d{1,2}):(\d{2})(am|pm)?', time_text, re.IGNORECASE)
                              if m:
                                  hour = int(m.group(1))
                                  minute = m.group(2)
                                  ampm = (m.group(3) or '').lower()
                                  if ampm == 'pm' and hour != 12: hour += 12
                                  elif ampm == 'am' and hour == 12: hour = 0
                                  time_text = f"{hour:02d}:{minute}"

                          # Impact
                          impact = 'low'
                          impact_td = row.find('td', class_=re.compile('sentiment'))
                          if impact_td:
                              # Icon class: "grayFullBullishIcon" → low
                              # "orangeFullBullishIcon" → medium
                              # "redFullBullishIcon" → high
                              icon = impact_td.find(class_=True)
                              if icon:
                                  icon_classes = ' '.join(icon.get('class', []))
                                  if 'red' in icon_classes or 'high' in icon_classes.lower():
                                      impact = 'high'
                                  elif 'orange' in icon_classes or 'medium' in icon_classes.lower():
                                      impact = 'medium'

                          # Event name
                          event_td = row.find('td', class_=re.compile('event'))
                          event_name = ''
                          if event_td:
                              event_a = event_td.find('a')
                              if event_a:
                                  event_name = event_a.get_text(strip=True)
                              else:
                                  event_name = event_td.get_text(strip=True)

                          if not event_name:
                              continue

                          # Actual / Forecast / Previous
                          actual = ''
                          forecast = ''
                          previous = ''

                          actual_td = row.find('td', id=re.compile('eventActual_'))
                          if actual_td: actual = clean_value(actual_td.get_text(strip=True))

                          forecast_td = row.find('td', id=re.compile('eventForecast_'))
                          if forecast_td: forecast = clean_value(forecast_td.get_text(strip=True))

                          previous_td = row.find('td', id=re.compile('eventPrevious_'))
                          if previous_td: previous = clean_value(previous_td.get_text(strip=True))

                          # Keyword-based impact backup
                          if impact == 'low':
                              kw_impact = classify_impact(event_name)
                              if kw_impact == 'high': impact = 'high'
                              elif kw_impact == 'medium': impact = 'medium'

                          events.append({
                              'date': fmt_date(event_date),
                              'dateISO': event_date.isoformat(),
                              'time': time_text,
                              'country': currency,
                              'currency': currency,
                              'flag': CURRENCY_FLAGS.get(currency, ''),
                              'event': event_name,
                              'impact': impact,
                              'actual': actual,
                              'forecast': forecast,
                              'previous': previous,
                          })
                      except Exception as row_err:
                          continue

              except Exception as e:
                  import traceback
                  print(f"  [Investing] Parse error: {e}")
                  traceback.print_exc()

              return events

          # ═══════════════════════════════════════════════════════════════════════
          # FALLBACK: Hard-coded schedule generator (always works)
          # ═══════════════════════════════════════════════════════════════════════

          def generate_fallback_calendar(today, target_dates):
              """
              Fallback: generates approximate calendar based on known release schedules.
              Less accurate but always provides *something* useful.
              """
              events = []
              economic_schedule = [
                  # (currency, event, day_of_month, time_utc, impact, monthly)
                  ('USD', 'IPC (Inflación)', 12, '13:30', 'high', True),
                  ('USD', 'Ventas Minoristas', 15, '13:30', 'high', True),
                  ('USD', 'Initial Jobless Claims', None, '13:30', 'medium', 'weekly_thu'),
                  ('USD', 'PMI Manufacturero ISM', 1, '15:00', 'high', True),
                  ('USD', 'PIB Preliminar', None, '13:30', 'high', 'quarterly'),
                  ('EUR', 'PMI Manufacturero', 1, '09:00', 'high', True),
                  ('EUR', 'IPC Zona Euro', 18, '10:00', 'high', True),
                  ('EUR', 'Tasa BCE', None, '13:15', 'high', '6weeks'),
                  ('GBP', 'IPC UK', 18, '07:00', 'high', True),
                  ('GBP', 'Decisión Tasa BoE', None, '12:00', 'high', '6weeks'),
                  ('JPY', 'IPC Tokio Core', None, '23:30', 'high', 'last_fri'),
                  ('JPY', 'Producción Industrial', 28, '23:50', 'medium', True),
                  ('AUD', 'Decisión Tasa RBA', None, '03:30', 'high', 'rba'),
                  ('AUD', 'IPC Australia', None, '00:30', 'high', 'quarterly'),
                  ('CAD', 'IPC Canadá', 20, '13:30', 'high', True),
                  ('CAD', 'Decisión Tasa BoC', None, '14:00', 'high', '6weeks'),
                  ('CHF', 'IPC Suiza', 6, '07:30', 'medium', True),
                  ('CHF', 'Decisión Tasa SNB', None, '08:30', 'high', 'quarterly'),
                  ('NZD', 'PIB Nueva Zelanda', None, '21:45', 'high', 'quarterly'),
                  ('NZD', 'Decisión Tasa RBNZ', None, '01:00', 'high', '6weeks'),
              ]

              today_month = today.month
              today_year = today.year

              for months_ahead in range(3):
                  target_month = (today_month + months_ahead - 1) % 12 + 1
                  target_year = today_year + (today_month + months_ahead - 1) // 12

                  for entry in economic_schedule:
                      curr, event_name, dom, time_utc, impact, freq = entry

                      event_date = None
                      if isinstance(dom, int):
                          try:
                              event_date = date(target_year, target_month, dom)
                          except:
                              continue
                      elif freq == 'weekly_thu':
                          # Find all Thursdays in this month
                          d = date(target_year, target_month, 1)
                          while d.month == target_month:
                              if d.weekday() == 3:  # Thursday
                                  if d in target_dates:
                                      events.append({
                                          'date': fmt_date(d), 'dateISO': d.isoformat(),
                                          'time': time_utc, 'country': curr, 'currency': curr,
                                          'flag': CURRENCY_FLAGS.get(curr,''), 'event': event_name,
                                          'impact': impact, 'actual': '', 'forecast': '', 'previous': ''
                                      })
                              d += timedelta(days=1)
                          continue
                      elif freq == 'last_fri':
                          # Last Friday of the month
                          d = date(target_year, target_month, 28)
                          while True:
                              try:
                                  d = date(target_year, target_month, d.day + 1)
                              except:
                                  break
                          while d.weekday() != 4:
                              d -= timedelta(days=1)
                          event_date = d
                      elif freq in ('quarterly', '6weeks', 'rba', None):
                          # Skip for now - complex scheduling
                          continue

                      if event_date and event_date in target_dates and event_date >= today:
                          events.append({
                              'date': fmt_date(event_date),
                              'dateISO': event_date.isoformat(),
                              'time': time_utc,
                              'country': curr, 'currency': curr,
                              'flag': CURRENCY_FLAGS.get(curr,''),
                              'event': event_name,
                              'impact': impact,
                              'actual': '', 'forecast': '', 'previous': ''
                          })

              # Deduplicate
              seen = set()
              unique = []
              for ev in events:
                  k = (ev['dateISO'], ev['currency'], ev['event'][:20])
                  if k not in seen:
                      seen.add(k)
                      unique.append(ev)

              return sorted(unique, key=lambda x: x['dateISO'] + x['time'])

          # ═══════════════════════════════════════════════════════════════════════
          # MAIN
          # ═══════════════════════════════════════════════════════════════════════

          print("=" * 60)
          print("ECONOMIC CALENDAR SCRAPER v2 (Multi-Source)")
          print("Sources: ForexFactory → Investing.com → TE RSS → Fallback")
          print("=" * 60)

          today = date.today()
          from_date = today - timedelta(days=1)   # yesterday (for actuals)
          to_date = today + timedelta(days=30)

          from_str = from_date.isoformat()
          to_str = to_date.isoformat()

          target_dates = set()
          d = from_date
          while d <= to_date:
              target_dates.add(d)
              d += timedelta(days=1)

          print(f"\nTarget: {from_str} → {to_str} ({len(target_dates)} days)")
          print(f"Tracking: {sorted(TRACKED_CURRENCIES)}\n")

          all_events = []
          source_used = 'fallback'

          # ── STRATEGY 1: ForexFactory ─────────────────────────────────────────
          print(f"{'='*50}\nSTRATEGY 1: ForexFactory\n{'='*50}")
          ff_events = []
          for week_offset in range(5):  # this week + next 4 weeks
              html = fetch_forex_factory(week_offset)
              if html:
                  parsed = parse_forex_factory(html, target_dates)
                  print(f"  Week +{week_offset}: {len(parsed)} events parsed")
                  ff_events.extend(parsed)
              time.sleep(2)

          if ff_events:
              all_events = ff_events
              source_used = 'forexfactory.com'
              print(f"\n✅ ForexFactory: {len(all_events)} events total")
          else:
              print("⚠️ ForexFactory returned 0 events, trying next source...")

          # ── STRATEGY 2: Investing.com ────────────────────────────────────────
          if len(all_events) == 0:
              print(f"\n{'='*50}\nSTRATEGY 2: Investing.com\n{'='*50}")
              time.sleep(3)
              inv_data = fetch_investing_calendar(from_str, to_str)
              if inv_data:
                  inv_events = parse_investing_response(inv_data, target_dates)
                  if inv_events:
                      all_events = inv_events
                      source_used = 'investing.com'
                      print(f"\n✅ Investing.com: {len(all_events)} events total")
                  else:
                      print("⚠️ Investing.com returned 0 events")

          # ── STRATEGY 3: TE RSS ───────────────────────────────────────────────
          if len(all_events) == 0:
              print(f"\n{'='*50}\nSTRATEGY 3: Trading Economics RSS\n{'='*50}")
              time.sleep(3)
              rss_xml = fetch_te_rss('all')
              if rss_xml:
                  rss_events = parse_te_rss(rss_xml, target_dates)
                  if rss_events:
                      all_events = rss_events
                      source_used = 'tradingeconomics.com/rss'
                      print(f"\n✅ TE RSS: {len(all_events)} events total")

          # ── STRATEGY 4: Fallback generator ───────────────────────────────────
          if len(all_events) == 0:
              print(f"\n{'='*50}\nSTRATEGY 4: Fallback Generator\n{'='*50}")
              all_events = generate_fallback_calendar(today, target_dates)
              source_used = 'fallback-generator'
              print(f"  Generated {len(all_events)} approximate events")

          # ── Deduplicate ──────────────────────────────────────────────────────
          seen = set()
          unique_events = []
          for ev in all_events:
              k = (ev['dateISO'], ev['currency'], ev['event'][:25].lower().strip())
              if k not in seen:
                  seen.add(k)
                  unique_events.append(ev)

          # ── Sort ─────────────────────────────────────────────────────────────
          def sort_key(ev):
              t = ev.get('time', '00:00') or '00:00'
              if len(t) < 5: t = '00:00'
              return ev['dateISO'] + 'T' + t

          unique_events.sort(key=sort_key)

          # ── Filter to relevant window ─────────────────────────────────────────
          final_events = []
          for ev in unique_events:
              try:
                  ev_date = date.fromisoformat(ev['dateISO'])
                  # Keep future events + past events with actual values
                  if ev_date >= today:
                      final_events.append(ev)
                  elif ev_date >= today - timedelta(days=1) and ev.get('actual'):
                      final_events.append(ev)
              except:
                  pass

          # ── Stats ─────────────────────────────────────────────────────────────
          currency_counts = {}
          impact_counts = {'high': 0, 'medium': 0, 'low': 0}
          for ev in final_events:
              c = ev['currency']
              currency_counts[c] = currency_counts.get(c, 0) + 1
              impact_counts[ev.get('impact','low')] = impact_counts.get(ev.get('impact','low'), 0) + 1

          # ── Save ──────────────────────────────────────────────────────────────
          output = {
              'lastUpdate': today.isoformat(),
              'generatedAt': datetime.utcnow().isoformat() + 'Z',
              'source': source_used,
              'rangeFrom': from_str,
              'rangeTo': to_str,
              'totalEvents': len(final_events),
              'currencyCounts': currency_counts,
              'impactCounts': impact_counts,
              'events': final_events,
          }

          with open('calendar-data/calendar.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          print(f"\n{'='*60}")
          print(f"✅ SAVED: calendar-data/calendar.json")
          print(f"   Source: {source_used}")
          print(f"   Total:  {len(final_events)} events")
          print(f"   Impact: {impact_counts}")
          print(f"   By currency: {dict(sorted(currency_counts.items()))}")

          high_events = [e for e in final_events if e.get('impact') == 'high'][:8]
          if high_events:
              print(f"\n   Next high-impact events:")
              for ev in high_events:
                  actual_str = f" → Actual: {ev['actual']}" if ev.get('actual') else ''
                  forecast_str = f" (est: {ev['forecast']})" if ev.get('forecast') else ''
                  print(f"   {ev['dateISO']} {(ev['time'] or '?'):5s} [{ev['currency']}] {ev['event']}{forecast_str}{actual_str}")
          print("=" * 60)
          EOFPYTHON

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add calendar-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to calendar data"
          else
            git commit -m "📅 Economic calendar $(date +'%Y-%m-%d %H:%M') UTC — v2 multi-source"
            git pull --rebase origin main || true
            git push
          fi
