name: Update Economic Calendar - v7 (Investing.com JSON API primary source)

on:
  schedule:
    # Asia session: 00:00, 02:00 UTC (JPY, AUD, NZD data)
    - cron: '0 0 * * *'
    - cron: '0 2 * * *'
    # Europe open: 06:00, 08:00, 10:00 UTC (EUR, GBP, CHF data)
    - cron: '0 6 * * *'
    - cron: '0 8 * * *'
    - cron: '0 10 * * *'
    # US session: 12:00, 13:00, 14:00, 15:00, 16:00, 17:00, 18:00 UTC (USD, CAD data)
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

# FIX P-01: Lógica Python extraída a scripts/update_economic_calendar.py.
jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml --break-system-packages

      - name: Create directory
        run: mkdir -p calendar-data

      - name: Update economic calendar
        run: python3 -u scripts/update_economic_calendar.py

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add calendar-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to calendar data"
          else
            git commit -m "📅 Economic calendar $(date +'%Y-%m-%d %H:%M') UTC — v7.0 Investing.com"
            git pull --rebase origin main || true
            git push
          fi
