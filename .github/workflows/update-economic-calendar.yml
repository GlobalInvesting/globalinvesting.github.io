name: Update Economic Calendar v14 (cada 10 min en horario de mercado)

on:
  schedule:
    # ── Lunes a viernes, cada 10 minutos entre 00:00 y 22:59 UTC ─────────────
    # GitHub Actions cron mínimo es 5 min; usamos 10 min para no abusar del límite.
    # Cubre sesión Asia (00–08), Europa (07–16), NY (13–22) con overlap.
    - cron: '0,10,20,30,40,50 0-22 * * 1-5'
    # Sábado 06 UTC: actualización de cierre semanal
    - cron: '0 6 * * 6'
  workflow_dispatch:

concurrency:
  group: update-economic-calendar
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout (este mismo repo público)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Create output directory
        run: mkdir -p calendar-data

      - name: Run calendar fetcher
        run: python3 -u scripts/update_economic_calendar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar-data/calendar.json
          if git diff --staged --quiet; then
            echo "✅ Sin cambios"
          else
            git commit -m "📅 Calendar $(date -u +'%Y-%m-%d %H:%M') UTC — v14"
            git pull --rebase origin main || true
            git push
          fi
