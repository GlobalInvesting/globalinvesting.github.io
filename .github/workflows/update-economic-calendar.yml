name: Update Economic Calendar v9

on:
  schedule:
    # Asia session (JPY, AUD, NZD) — 00:00–05:30 UTC
    - cron: '5 0 * * *'
    - cron: '35 1 * * *'
    - cron: '5 3 * * *'
    - cron: '35 4 * * *'
    # Europe open (EUR, GBP, CHF) — 06:00–11:00 UTC
    - cron: '5 6 * * *'
    - cron: '35 7 * * *'
    - cron: '5 9 * * *'
    - cron: '35 10 * * *'
    # US session (USD, CAD) — 12:00–18:30 UTC
    - cron: '5 12 * * *'
    - cron: '35 12 * * *'
    - cron: '5 13 * * *'
    - cron: '35 13 * * *'
    - cron: '5 14 * * *'
    - cron: '5 15 * * *'
    - cron: '5 16 * * *'
    - cron: '5 17 * * *'
    - cron: '35 17 * * *'
    - cron: '5 18 * * *'
    # Late updates / API catches (20:00–22:30 UTC)
    - cron: '5 20 * * *'
    - cron: '5 22 * * *'
    - cron: '35 22 * * *'
  workflow_dispatch:

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create output directory
        run: mkdir -p calendar-data

      - name: Run calendar scraper
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python3 -u scripts/update_economic_calendar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar-data/calendar.json
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "📅 Calendar $(date -u +'%Y-%m-%d %H:%M') UTC — v9.0"
            git pull --rebase origin main || true
            git push
          fi
