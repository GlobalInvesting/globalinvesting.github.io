name: Update Economic Calendar
# PUBLIC STUB — workflow_run trigger + conclusion gate.
# Build logic lives in the private reusable workflow.
on:
  workflow_run:
    workflows: ["Update ForexFactory Calendar"]
    types: [completed]
  schedule:
    - cron: '30 5 * * *'
    - cron: '30 9 * * *'
    - cron: '30 13 * * *'
    - cron: '30 20 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-economic-calendar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  call:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    uses: GlobalInvesting/globalinvesting-scripts/.github/workflows/update-economic-calendar.yml@main
    secrets: inherit
