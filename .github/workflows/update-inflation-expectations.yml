name: Update Inflation Expectations

on:
  schedule:
    # Weekly on Wednesdays at 07:00 UTC
    # OECD Data Explorer updates ~4-6 weeks after national release;
    # weekly run ensures we catch new data within days of OECD publishing.
    - cron: '0 7 * * 3'
  workflow_dispatch:

concurrency:
  group: update-inflation-expectations
  cancel-in-progress: false

jobs:
  update-inflation-expectations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout public site repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create extended-data directory
        run: mkdir -p extended-data

      - name: Fetch inflation expectations
        # Sources (v4.2):
        #   USD: FRED T5YIE (5Y breakeven, market-implied, daily)
        #   EUR: FRED T5YIFR (EUR 5Y5Y breakeven, market-implied, daily)
        #   G6:  OECD Data Explorer SDMX API (sdmx.oecd.org)
        #          Dataflow: OECD.SDD.TPS,DSD_PRICES@DF_PRICES_ALL,1.0
        #          Key: {country}.{M|Q}.N.CPI.PA._T.N.GY (TRANSFORMATION=GY = annual pct change)
        #          Format: csvfilewithlabels -- lag ~4-6 weeks from national CPI release
        #        Fallback: FRED OECD MEI index series (~12-14m structural lag)
        #        Last resort: World Bank annual (>12m lag)
        #
        # Script lives at scripts/fetch_inflation_expectations.py in this repo.
        # Patches extended-data/{CCY}.json updating only:
        #   data.inflationExpectations  and  dates.inflationExpectations
        # All other fields in each file are preserved unchanged.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_inflation_expectations.py .

      - name: Display summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "   INFLATION EXPECTATIONS SUMMARY"
          echo "========================================"
          for ccy in USD EUR GBP JPY AUD CAD CHF NZD; do
            file="extended-data/${ccy}.json"
            if [ -f "$file" ]; then
              val=$(jq -r '.data.inflationExpectations // "n/a"' "$file")
              dt=$(jq -r '.dates.inflationExpectations // "?"' "$file")
              echo "  ${ccy}  ${val}%  (${dt})"
            else
              echo "  ${ccy}  (file not found)"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extended-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Inflation expectations $(date +'%Y-%m-%d') -- OECD Data Explorer / FRED breakevens"
          for i in 1 2 3; do
            git push && echo "Push succeeded" && exit 0
            echo "Push rejected (attempt $i) -- rebasing..."
            git pull --rebase origin main
          done
          echo "All push attempts failed -- data not published."
          exit 1
