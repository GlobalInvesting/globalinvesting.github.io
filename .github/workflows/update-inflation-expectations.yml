name: Update Inflation Expectations

on:
  schedule:
    # Weekly on Wednesdays at 07:00 UTC
    # OECD Data Explorer updates ~4-6 weeks after national release;
    # weekly run ensures we catch new data within days of OECD publishing.
    - cron: '0 7 * * 3'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 → 24 opt-in (mandatory before June 2 2026)

concurrency:
  group: update-inflation-expectations
  cancel-in-progress: false

jobs:
  update-inflation-expectations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout public site repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create extended-data directory
        run: mkdir -p extended-data

      - name: Fetch inflation expectations
        # Sources (v5.0) — methodologically consistent forward-looking cascade:
        #   USD: FRED T5YIE (5Y TIPS breakeven, market-implied, daily)
        #   EUR: FRED T5YIFR (EUR 5Y5Y inflation swap, market-implied, daily)
        #   GBP: BOE SDIE BEAPFF (2Y-ahead household survey, quarterly) → IMF → OECD → FRED → WB
        #   CAD: FRED CAINFIMPCPI (5Y breakeven, market-implied, daily) → IMF → OECD → FRED → WB
        #   NZD: RBNZ 2Y-ahead survey (DBnomics, quarterly) → IMF → OECD → FRED → WB
        #   JPY: IMF SDMX 3.0 → OECD → FRED → WB  (no liquid traded breakeven)
        #   AUD: IMF SDMX 3.0 → OECD → FRED → WB  (calendar supplements with MI survey)
        #   CHF: IMF SDMX 3.0 → OECD → FRED → WB  (no liquid traded breakeven)
        #
        # v5.0 upgrade: GBP/CAD/NZD now use forward-looking market-implied or survey
        # sources as primary, consistent with USD/EUR methodology. Previous v4.3
        # used backward-looking CPI YoY for all G6, creating a methodological
        # inconsistency that distorted the real-carry ranking.
        #
        # Script: scripts/fetch_inflation_expectations.py in this repo.
        # Patches extended-data/{CCY}.json updating only:
        #   data.inflationExpectations  and  dates.inflationExpectations
        # All other fields in each file are preserved unchanged.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_inflation_expectations.py .

      - name: Display summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "   INFLATION EXPECTATIONS SUMMARY"
          echo "========================================"
          for ccy in USD EUR GBP JPY AUD CAD CHF NZD; do
            file="extended-data/${ccy}.json"
            if [ -f "$file" ]; then
              val=$(jq -r '.data.inflationExpectations // "n/a"' "$file")
              dt=$(jq -r '.dates.inflationExpectations // "?"' "$file")
              echo "  ${ccy}  ${val}%  (${dt})"
            else
              echo "  ${ccy}  (file not found)"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extended-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Inflation expectations $(date +'%Y-%m-%d') -- FRED breakevens / BOE survey / RBNZ survey / IMF SDMX"
          for i in 1 2 3; do
            git push && echo "Push succeeded" && exit 0
            echo "Push rejected (attempt $i) -- rebasing..."
            git pull --rebase origin main
          done
          echo "All push attempts failed -- data not published."
          exit 1
