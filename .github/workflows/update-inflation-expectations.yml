name: Update Inflation Expectations

# Runs weekly on Mondays at 06:00 UTC.
#
# Why Monday 06:00 UTC:
#   National stat office releases happen throughout the month. A weekly Monday run
#   picks up any prior-week release within 7 days — acceptable for monthly/quarterly
#   CPI data with 2-6 week publication lag.
#   06:00 UTC is off-peak for all primary APIs.
#
# What this writes:
#   extended-data/{USD,EUR,GBP,JPY,AUD,CAD,CHF,NZD}.json
#   inflationExpectations field only (non-destructive patch — all other fields preserved).
#
# Source cascade per currency (v4.0 — national stat office APIs as primary):
#   USD / EUR  FRED breakeven (T5YIE / T5YIFR) — market-implied, daily
#   GBP  1. ONS API (api.ons.gov.uk) — D7G7 CPI All Items YoY, monthly  [<6w lag]
#            2. FRED GBRCPIALLMINMEI → index-to-YoY                       [~14m lag]
#            3. ECB HICP GB                                                [fallback]
#            4. World Bank FP.CPI.TOTL.ZG                                 [annual]
#   JPY  1. e-Stat Japan CSV (stat.go.jp) — CPI All Items YoY            [<4w lag]
#            2. BOJ HTML table                                              [fallback]
#            3. World Bank FP.CPI.TOTL.ZG                                 [annual]
#   AUD  1. ABS SDMX API (api.data.abs.gov.au) — CPI All Groups, quarterly [~6w lag]
#            2. FRED AUSCPIALLQINMEI → index-to-YoY                        [~16m lag]
#            3. World Bank FP.CPI.TOTL.ZG                                  [annual]
#   CAD  1. Statistics Canada WDS API — CPI All-Items, monthly            [<4w lag]
#            2. FRED CANCPIALLMINMEI → index-to-YoY                        [~14m lag]
#            3. World Bank FP.CPI.TOTL.ZG                                  [annual]
#   CHF  1. SNB Data Portal (data.snb.ch) — CPI index → YoY               [<6w lag]
#            2. FRED CHECPIALLMINMEI → index-to-YoY                        [~14m lag]
#            3. World Bank FP.CPI.TOTL.ZG                                  [annual]
#   NZD  1. Stats NZ OData API — CPI All Groups, quarterly                [~6w lag]
#            2. RBNZ Survey of Expectations CSV                            [quarterly]
#            3. FRED NZLCPIALLQINMEI → index-to-YoY                        [~16m lag]
#            4. World Bank FP.CPI.TOTL.ZG                                  [annual]
#
# Why OECD SDMX was removed (v4.0):
#   CPALTT01 is not a valid SUBJECT in the DSD_KEI@DF_KEI,4.0 dataflow.
#   All OECD SDMX CPI requests return HTTP 422 regardless of MEASURE code.
#   This is a fundamental endpoint incompatibility, not a parameter issue.
#
# Relationship to the Real Rate Carry modal:
#   The modal fetches T5YIE / T5YIFR live (USD/EUR). For the remaining 6 currencies
#   the modal reads extended-data (this workflow's output).
#   USD/EUR are also included here so extended-data stays fresh as a fallback when
#   the live FRED fetch fails, and as an independent weekly audit baseline.
#
# Placement: PUBLIC repo — no API keys, no proprietary logic.
# Public repos have unlimited GitHub Actions minutes.

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 → 24 opt-in (mandatory before June 2 2026)

concurrency:
  group: update-inflation-expectations
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-inflation-expectations:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create output directory
        run: mkdir -p extended-data

      - name: Fetch inflation expectations
        env:
          SITE_DIR: .
        run: python3 scripts/fetch_inflation_expectations.py

      - name: Display summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "   INFLATION EXPECTATIONS SUMMARY"
          echo "========================================"
          for ccy in USD EUR GBP JPY AUD CAD CHF NZD; do
            if [ -f "extended-data/${ccy}.json" ]; then
              python3 -c "
          import json
          with open('extended-data/${ccy}.json') as f:
              d = json.load(f)
          ie_val  = d.get('data',  {}).get('inflationExpectations')
          ie_date = d.get('dates', {}).get('inflationExpectations')
          if ie_val is not None:
              print(f'  ${ccy}  {ie_val:+.4f}%  ({ie_date})')
          else:
              print(f'  ${ccy}  — (no inflationExpectations field)')
          "
            fi
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r extended-data/ /tmp/ie_fresh/
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          for i in 1 2 3 4 5; do
            echo "--- Attempt $i ---"
            git fetch origin main
            git reset --hard origin/main
            cp -r /tmp/ie_fresh/. extended-data/
            git add extended-data/USD.json extended-data/EUR.json \
                    extended-data/GBP.json extended-data/JPY.json \
                    extended-data/AUD.json extended-data/CAD.json \
                    extended-data/CHF.json extended-data/NZD.json
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes vs remote HEAD — skipping commit."
              exit 0
            fi
            git commit -m "Inflation expectations ${TIMESTAMP} — G8 (ONS/e-Stat/ABS/StatsCan/SNB/StatsNZ)"
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "⚠️  All push attempts exhausted — data will refresh on next scheduled run."
          exit 0
