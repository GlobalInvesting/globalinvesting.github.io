name: Update Inflation Expectations

on:
  schedule:
    # Weekly on Wednesdays at 07:00 UTC
    # OECD Data Explorer updates ~4-6 weeks after national release;
    # weekly run ensures we catch new data within days of OECD publishing.
    - cron: '0 7 * * 3'
  workflow_dispatch:

concurrency:
  group: update-inflation-expectations
  cancel-in-progress: false

jobs:
  update-inflation-expectations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PUBLIC site repo
        uses: actions/checkout@v4
        with:
          repository: GlobalInvesting/globalinvesting.github.io
          token: ${{ secrets.PAT_TOKEN }}
          path: site

      - name: Checkout THIS private repo (scripts)
        uses: actions/checkout@v4
        with:
          path: engine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Create extended-data directory
        run: mkdir -p site/extended-data

      - name: Fetch inflation expectations
        # Sources (v4.2):
        #   USD: FRED T5YIE (5Y breakeven, market-implied, daily)
        #   EUR: FRED T5YIFR (EUR 5Y5Y breakeven, market-implied, daily)
        #   G6:  OECD Data Explorer SDMX API (sdmx.oecd.org)
        #          Dataflow: OECD.SDD.TPS,DSD_PRICES@DF_PRICES_ALL,1.0
        #          Key: {country}.{M|Q}.N.CPI.PA._T.N.GY
        #          Format: csvfilewithlabels
        #          Lag: ~4-6 weeks from national CPI release
        #        → FRED OECD MEI index series (structural ~12-14m lag — stale guard fallback)
        #        → World Bank annual (>12m lag — last resort)
        #
        # Patches extended-data/{CCY}.json: inflationExpectations + dates.inflationExpectations
        # All other fields in extended-data/{CCY}.json are preserved unchanged.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python engine/scripts/fetch_inflation_expectations.py site

      - name: Display summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "   INFLATION EXPECTATIONS SUMMARY"
          echo "========================================"
          for currency in USD EUR GBP JPY AUD CAD CHF NZD; do
            if [ -f "site/extended-data/$currency.json" ]; then
              val=$(python3 -c "
import json, sys
try:
    with open('site/extended-data/$currency.json') as f:
        d = json.load(f)
    v = d.get('data',{}).get('inflationExpectations')
    dt = d.get('dates',{}).get('inflationExpectations','?')
    print(f'  $currency  {v:+.4f}%  ({dt})' if v is not None else '  $currency  —')
except Exception as e:
    print(f'  $currency  ERROR: {e}')
")
              echo "$val"
            else
              echo "  $currency  (file not found)"
            fi
          done

      - name: Commit and push
        working-directory: site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extended-data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📊 Inflation expectations $(date +'%Y-%m-%d') — OECD Data Explorer / FRED breakevens"
          for i in 1 2 3; do
            git push && echo "✅ Push succeeded" && exit 0
            echo "Push rejected (attempt $i) — rebasing..."
            git pull --rebase origin main
          done
          echo "❌ All push attempts failed — data not published."
          exit 1
