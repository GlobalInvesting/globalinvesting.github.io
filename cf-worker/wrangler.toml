name = "globalinvesting-calendar-watcher"
main = "calendar-watcher.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Cron triggers ─────────────────────────────────────────────────────────────
# Every 6 minutes — respects ForexFactory rate limit (2 req / 5 min).
# CF Workers minimum cron is 1 minute; */6 fires at :00, :06, :12, ... :54.
[triggers]
crons = ["*/6 * * * *"]

# ── KV Namespace ──────────────────────────────────────────────────────────────
# Create this namespace first:
#   npx wrangler kv namespace create CALENDAR_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "CALENDAR_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ── Environment variables (non-secret) ───────────────────────────────────────
# Secrets are set separately via: npx wrangler secret put SECRET_NAME
# Do NOT put secrets here — this file is committed to the repo.

# ── Deployment notes ──────────────────────────────────────────────────────────
# v2.0 migration from Finnhub to ForexFactory public JSON:
# FINNHUB_API_KEY is no longer required. Remove it from the Worker if present:
#   npx wrangler secret delete FINNHUB_API_KEY --name globalinvesting-calendar-watcher
#
# Required secrets (unchanged):
#   npx wrangler secret put GITHUB_PAT        (scope: public_repo)
#   npx wrangler secret put GITHUB_OWNER      (value: globalinvesting)
#   npx wrangler secret put GITHUB_REPO       (value: globalinvesting.github.io)
#
# After updating wrangler.toml with the real KV id, deploy:
#   npx wrangler deploy
#
# Reset the fingerprint after deployment so the first poll runs fresh:
#   curl https://globalinvesting-calendar-watcher.YOUR_SUBDOMAIN.workers.dev/reset
#
# Verify:
#   npx wrangler tail globalinvesting-calendar-watcher
