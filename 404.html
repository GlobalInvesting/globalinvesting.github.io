<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting… | Global Investing FX Terminal</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --bg: #131722;
    --bg2: #1e222d;
    --border: #2a2e39;
    --text: #d1d4dc;
    --text2: #9096a0;
    --blue: #4f7fff;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
  }
  .logo {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--blue);
    letter-spacing: 0.05em;
  }
  .box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 0.5rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }
  #dest-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--blue);
    margin-bottom: 1.5rem;
    min-height: 18px;
  }
  .bar-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  #bar {
    height: 100%;
    background: var(--blue);
    width: 0%;
    transition: width 0.1s linear;
  }
  a.btn {
    display: inline-block;
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    border-radius: 4px;
    font-size: 13px;
    text-decoration: none;
    font-family: var(--font-ui);
    cursor: pointer;
  }
  a.btn:hover { background: rgba(79,127,255,0.08); }
</style>
</head>
<body>

<div class="logo">GLOBAL INVESTING · FX TERMINAL</div>

<div class="box">
  <h1>Page moved</h1>
  <p>This URL has been updated. You'll be redirected automatically.</p>
  <div id="dest-label">→ detecting destination…</div>
  <div class="bar-wrap"><div id="bar"></div></div>
  <a class="btn" id="go-btn" href="/">Go now</a>
</div>

<script>
  const redirects = {
    "news.html":                    "index.html",
    "en.html":                      "index.html",
    "guia-cot.html":                "guide-cot.html",
    "tecnico-vs-fundamental.html":  "guide-dashboard.html",
  };

  const path = window.location.pathname.replace(/^\//, "").replace(/\/$/, "");
  const filename = path.split("/").pop() || "";

  const dest = redirects[filename] || redirects[path] || "index.html";
  const destUrl = "/" + dest;

  document.getElementById("dest-label").textContent = "→ " + destUrl;
  document.getElementById("go-btn").href = destUrl;

  // Animated progress bar then redirect
  let pct = 0;
  const bar = document.getElementById("bar");
  const interval = setInterval(() => {
    pct += 2;
    bar.style.width = pct + "%";
    if (pct >= 100) {
      clearInterval(interval);
      window.location.replace(destUrl);
    }
  }, 60); // 60ms × 50 steps = 3 seconds
</script>

</body>
</html>
